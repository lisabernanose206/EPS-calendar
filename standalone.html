        if (!activities.length) items.push({ level: "blocking", title: "Aucune activité", detail: "Ajoutez au moins une activité et reliez-la aux installations possibles.", buildMode: "prerequisites", subMode: "facilitiesActivities" });
        if (!adminStepComplete("program")) items.push({ level: "blocking", title: "Programme incomplet", detail: "Affectez les activités attendues pour chaque niveau dans Programme.", buildMode: "prerequisites", subMode: "program" });
        if (!cycles.length) items.push({ level: "blocking", title: "Aucun cycle", detail: "D?finissez les cycles pour relier chaque cours ? une p?riode.", buildMode: "yearPrerequisites", subMode: "cycles" });
        if (cycleErrors.length) items.push({ level: "blocking", title: "Cycles ? corriger", detail: cycleErrors[0], buildMode: "yearPrerequisites", subMode: "cycles" });
        if (!hasServiceAssignments) items.push({ level: "warning", title: "Service théorique non renseigné", detail: "Affectez les classes aux profs dans Service pour limiter les choix de classes en Construction.", buildMode: "yearPrerequisites", subMode: "hours" });
        if (!facilityUnavailability.length) items.push({ level: "warning", title: "Aucune indisponibilit?", detail: "Renseignez les contraintes profs, classes ou installations si elles existent.", buildMode: "yearPrerequisites", subMode: "unavailable" });
        if (!asSessions.length) items.push({ level: "warning", title: "Aucune AS", detail: "Ajoutez les AS si elles doivent appara?tre dans le planning.", buildMode: "yearPrerequisites", subMode: "as" });
        if (!sportEvents.length) items.push({ level: "warning", title: "Aucun ?v?nement sportif", detail: "Ajoutez les événements sportifs connus pour reserver les créneaux concernes.", buildMode: "yearPrerequisites", subMode: "events" });
        return items.map(normalizeConstructionReadinessItem);
      }

      function normalizeConstructionReadinessItem(item) {
        if (item.subMode === "establishment") return { ...item, title: "Cr&eacute;neaux &agrave; compl&eacute;ter", detail: "Renseignez les cr&eacute;neaux de cours et les horaires d'AS dans &Eacute;tablissement." };
        if (item.title === "Aucune installation") return item;
        if (item.subMode === "facilitiesActivities") return { ...item, title: "Aucune activit&eacute;", detail: "Ajoutez au moins une activit&eacute; et reliez-la aux installations possibles." };
        if (item.subMode === "program") return { ...item, title: "Programme incomplet", detail: "Affectez les activit&eacute;s attendues pour chaque niveau dans Programme." };
        if (item.subMode === "cycles" && item.title === "Aucun cycle") return { ...item, title: "Aucun cycle", detail: "D&eacute;finissez les cycles pour relier chaque cours &agrave; une p&eacute;riode." };
        if (item.subMode === "cycles") return { ...item, title: "Cycles &agrave; corriger" };
        if (item.subMode === "hours") return { ...item, title: "Service th&eacute;orique non renseign&eacute;", detail: "Affectez les classes aux profs dans Service pour limiter les choix de classes en Construction." };
        if (item.subMode === "unavailable") return { ...item, title: "Aucune indisponibilit&eacute;", detail: "Renseignez les contraintes profs, classes ou installations si elles existent." };
        if (item.subMode === "as") return { ...item, title: "Aucune AS", detail: "Ajoutez les AS si elles doivent appara&icirc;tre dans le planning." };
        if (item.subMode === "events") return { ...item, title: "Aucun &eacute;v&eacute;nement sportif", detail: "Ajoutez les &eacute;v&eacute;nements sportifs connus pour r&eacute;server les cr&eacute;neaux concern&eacute;s." };
        return item;
      }

      function constructionBlockingItems() {
        return constructionReadinessItems().filter((item) => item.level === "blocking");
      }

      function canAccessConstructionPlanning() {
        return adminStepComplete("establishment")
          && teachers.length > 0
          && classes.length > 0
          && facilities.length > 0
          && activities.length > 0
          && cycles.length > 0
          && !validateCycles(cycles).length;
      }

      function constructionTrimesterSections(weeks) {
        const sections = [
          { title: "Trimestre 1", detail: "septembre - decembre", months: [8, 9, 10, 11] },
          { title: "Trimestre 2", detail: "janvier - mars", months: [0, 1, 2] },
          { title: "Trimestre 3", detail: "avril - juillet", months: [3, 4, 5, 6] }
        ];
        return sections.map((section) => ({
          ...section,
          weeks: weeks.filter((weekItem) => section.months.includes(weekDisplayStart(weekItem).getMonth()))
        })).filter((section) => section.weeks.length);
      }

      function roundHours(value) {
        return Math.round((Number(value) || 0) * 60) / 60;
      }

      function roundConstructedHours(value) {
        return Math.round((Number(value) || 0) * 2) / 2;
      }

      function formatHours(value) {
        const totalMinutes = Math.round((Number(value) || 0) * 60);
        const hours = Math.floor(totalMinutes / 60);
        const minutes = totalMinutes % 60;
        return minutes ? `${hours}h${String(minutes).padStart(2, "0")}` : `${hours}h`;
      }

      function serviceStepComplete() {
        if (serviceAlerts().length) return false;
        return teachers.every((teacher) => {
          const total = serviceTotalForTeacher(teacher.id);
          return total >= teacher.weeklyReference;
        });
      }

      function annualConstructionRules() {
        return constructionRules.filter((rule) => isAnnualConstructionRule(rule));
      }

      function annualRuleHasTeacherClasses(rule) {
        const teacherIds = teacherIdsForBlock(rule.block);
        if (rule.block?.optionBlock) {
          return optionBlockAvailableForTeachers(teacherIds)
            && Boolean(rule.block.optionId && rule.block.optionHours > 0);
        }
        return teacherIds.length > 0 && teacherIds.every((teacherId) => teacherClassForBlock(rule.block, teacherId));
      }

      function annualConstructionTeacherHours() {
        const totals = Object.fromEntries(teachers.map((teacher) => [teacher.id, 0]));
        annualConstructionRules().forEach((rule) => {
          const row = yearRows().find((item) => item.id === rule.rowId);
          if (!row?.slot) return;
          const slotHours = fullServiceSlotHours(row);
          const multiplier = (rule.weekLetter && rule.weekLetter !== "all" ? 0.5 : 1) * optionAnnualFactorForRule(rule);
          teacherIdsForBlock(rule.block).forEach((teacherId) => {
            totals[teacherId] = (totals[teacherId] || 0) + effectiveTeacherHoursForBlock(rule.block, teacherId, slotHours) * multiplier;
          });
        });
        return Object.fromEntries(Object.entries(totals).map(([teacherId, total]) => [teacherId, roundConstructedHours(total)]));
      }

      function annualConstructionClassHours() {
        const totals = Object.fromEntries(classes.map((schoolClass) => [schoolClass, 0]));
        const countedClassSlots = new Set();
        annualConstructionRules().forEach((rule) => {
          if (rule.block?.optionBlock) return;
          const row = yearRows().find((item) => item.id === rule.rowId);
          if (!row?.slot) return;
          const slotHours = fullServiceSlotHours(row);
          const multiplier = rule.weekLetter && rule.weekLetter !== "all" ? 0.5 : 1;
          const blockClasses = [...new Set(classesForBlock(rule.block)
            .map((schoolClass) => serviceClassIdForBaseClass(schoolClass))
            .filter(Boolean))];
          blockClasses.forEach((schoolClass) => {
            const countKey = `${rule.rowId}::${rule.weekLetter || "all"}::${schoolClass}`;
            if (countedClassSlots.has(countKey)) return;
            countedClassSlots.add(countKey);
            if (totals[schoolClass] === undefined) totals[schoolClass] = 0;
            totals[schoolClass] += slotHours * multiplier;
          });
        });
        return Object.fromEntries(Object.entries(totals).map(([schoolClass, total]) => [schoolClass, roundConstructedHours(total)]));
      }

      function constructionSummaryClasses() {
        const classItems = classLevels.flatMap(serviceClassesForLevel);
        specialClassInstances().forEach((instance) => {
          if (!instance.baseClassId) classItems.push(instance.schoolClass);
        });
        return [...new Set(classItems)];
      }

      function constructionClassSummaryTotal(schoolClass, classTotals) {
        return classTotals[schoolClass] || 0;
      }

      function annualConstructionTeacherClassHours() {
        const totals = Object.fromEntries(teachers.map((teacher) => [teacher.id, {}]));
        const countedTeacherClassSlots = new Set();
        annualConstructionRules().forEach((rule) => {
          if (rule.block?.optionBlock) return;
          const row = yearRows().find((item) => item.id === rule.rowId);
          if (!row?.slot) return;
          const slotHours = fullServiceSlotHours(row);
          const multiplier = rule.weekLetter && rule.weekLetter !== "all" ? 0.5 : 1;
          const countedTeacherClasses = new Set();
          teacherIdsForBlock(rule.block).forEach((teacherId) => {
            const rawClass = teacherClassForBlock(rule.block, teacherId);
            const schoolClass = rawClass ? serviceClassIdForBaseClass(rawClass) : "";
            if (!schoolClass) return;
            const countKey = `${teacherId}::${schoolClass}`;
            if (countedTeacherClasses.has(countKey)) return;
            countedTeacherClasses.add(countKey);
            const slotCountKey = `${rule.rowId}::${rule.weekLetter || "all"}::${teacherId}::${schoolClass}`;
            if (countedTeacherClassSlots.has(slotCountKey)) return;
            countedTeacherClassSlots.add(slotCountKey);
            if (!totals[teacherId]) totals[teacherId] = {};
            totals[teacherId][schoolClass] = (totals[teacherId][schoolClass] || 0) + teacherHoursForBlock(rule.block, teacherId, slotHours) * multiplier;
          });
        });
        return Object.fromEntries(Object.entries(totals).map(([teacherId, classTotals]) => [
          teacherId,
          Object.fromEntries(Object.entries(classTotals).map(([schoolClass, total]) => [schoolClass, roundConstructedHours(total)]))
        ]));
      }

      function constructionTeacherClassSummaries(teacherId, teacherClassTotals) {
        const expectedRows = serviceClassRowsForTeacher(teacherId);
        const expectedByClass = {};
        expectedRows.forEach((row) => {
          const schoolClass = row.classId ? serviceClassIdForBaseClass(row.classId) : "";
          if (!schoolClass) return;
          expectedByClass[schoolClass] = (expectedByClass[schoolClass] || 0) + (Number(row.hours) || 0);
        });
        const actualByClass = teacherClassTotals[teacherId] || {};
        return [...new Set([...Object.keys(expectedByClass), ...Object.keys(actualByClass)])]
          .sort((a, b) => a.localeCompare(b, "fr"))
          .map((schoolClass) => {
            const total = actualByClass[schoolClass] || 0;
            const target = expectedByClass[schoolClass] || 0;
            const diff = roundConstructedHours(total - target);
            return {
              schoolClass,
              total,
              target,
              missing: Math.max(0, -diff),
              excess: Math.max(0, diff),
              ok: Math.abs(diff) < 0.01
            };
          });
      }

      function annualConstructionTeacherOptionHours() {
        const totals = Object.fromEntries(teachers.map((teacher) => [teacher.id, {}]));
        annualConstructionRules().forEach((rule) => {
          if (!rule.block?.optionBlock) return;
          const row = yearRows().find((item) => item.id === rule.rowId);
          if (!row?.slot) return;
          const slotHours = fullServiceSlotHours(row);
          const multiplier = (rule.weekLetter && rule.weekLetter !== "all" ? 0.5 : 1) * optionAnnualFactorForRule(rule);
          teacherIdsForBlock(rule.block).forEach((teacherId) => {
            const optionId = rule.block.optionId || "";
            if (!optionId) return;
            if (!totals[teacherId]) totals[teacherId] = {};
            totals[teacherId][optionId] = (totals[teacherId][optionId] || 0) + effectiveTeacherHoursForBlock(rule.block, teacherId, slotHours) * multiplier;
          });
        });
        return Object.fromEntries(Object.entries(totals).map(([teacherId, optionTotals]) => [
          teacherId,
          Object.fromEntries(Object.entries(optionTotals).map(([optionId, total]) => [optionId, roundConstructedHours(total)]))
        ]));
      }

      function constructionTeacherOptionSummaries(teacherId, teacherOptionTotals) {
        const expectedRows = serviceFreeRowsForTeacher(teacherId);
        const expectedByOption = {};
        const labelsByOption = {};
        expectedRows.forEach((row) => {
          const optionId = serviceFreeOptionId(teacherId, row.id);
          expectedByOption[optionId] = (expectedByOption[optionId] || 0) + (Number(row.hours) || 0);
          labelsByOption[optionId] = row.label || "Option";
        });
        const actualByOption = teacherOptionTotals[teacherId] || {};
        return [...new Set([...Object.keys(expectedByOption), ...Object.keys(actualByOption)])]
          .sort((a, b) => (labelsByOption[a] || a).localeCompare(labelsByOption[b] || b, "fr"))
          .map((optionId) => {
            const option = serviceFreeOptionById(optionId);
            const total = actualByOption[optionId] || 0;
            const target = expectedByOption[optionId] || 0;
            const diff = roundConstructedHours(total - target);
            return {
              optionId,
              label: labelsByOption[optionId] || option?.label || "Option",
              total,
              target,
              missing: Math.max(0, -diff),
              excess: Math.max(0, diff),
              ok: Math.abs(diff) < 0.01
            };
          });
      }

      function classHourTargetForConstruction(schoolClass) {
        return serviceClassTarget(schoolClass);
      }

      function constructionClassesStepComplete() {
        const totals = annualConstructionClassHours();
        return constructionSummaryClasses().every((schoolClass) => {
          const target = classHourTargetForConstruction(schoolClass);
          if (!target) return true;
          return Math.abs(constructionClassSummaryTotal(schoolClass, totals) - target) < 0.01;
        });
      }

      function constructionBlocksStepComplete() {
        return cachedConstructionCheck("blocksComplete", () => {
        const rules = annualConstructionRules();
        if (!rules.length) return false;
        if (!rules.every(annualRuleHasTeacherClasses)) return false;
        const totals = annualConstructionTeacherHours();
        return teachers.every((teacher) => (totals[teacher.id] || 0) >= serviceTargetForTeacher(teacher)) && constructionClassesStepComplete();
        });
      }

      function constructionCycleDetailsStepComplete() {
        return cachedConstructionCheck("cycleDetailsComplete", () => {
        const rules = annualConstructionRules();
        if (!rules.length) return false;
        return rules.every((rule) => constructionCyclesForRule(rule).every((cycle) => {
          const block = blockWithCycleOverride(rule, cycle);
          if (block.optionBlock) return true;
          if (!block.facilityId && serviceFreeActivityById(block.activityId)) return true;
          if (!block.facilityId) return false;
          if (serviceFreeActivityById(block.activityId)) return true;
          return activitiesForFacility(block.facilityId).length ? Boolean(block.activityId) : true;
        }));
        });
      }

      function adminStepComplete(buildMode) {
        if (buildMode === "prerequisites") {
          return ["establishment", "team", "classes", "facilitiesActivities"].every(adminStepComplete);
        }
        if (buildMode === "yearPrerequisites") {
          return ["unavailable", "cycles", "as", "events", "hours"].every(adminStepComplete);
        }
        if (buildMode === "rules") {
          return constructionRuleSettings.length > 0;
        }
        if (buildMode === "establishment") {
          return slots.length > 0
            && slots.every((slot) => slot.label && Number(slot.hours) > 0)
            && (schoolConstraints.asSlots || []).length > 0
            && (schoolConstraints.asSlots || []).every((slot) => slot.label && Number(slot.hours) > 0 && (slot.days || []).length);
        }
        if (buildMode === "team") return teachers.length > 0;
        if (buildMode === "classes") return classes.length > 0;
        if (buildMode === "facilities" || buildMode === "activities" || buildMode === "facilitiesActivities") return facilities.length > 0 && activities.length > 0;
        if (buildMode === "program") return activities.length > 0 && classLevels.every((level) => (activityProgramByLevel[level] || []).length > 0);
        if (buildMode === "unavailable") return facilityUnavailability.length > 0;
        if (buildMode === "cycles") return cycles.length > 0 && !validateCycles(cycles).length;
        if (buildMode === "as") return asSessions.length > 0;
        if (buildMode === "events") return sportEvents.length > 0;
        if (buildMode === "hours") return serviceStepComplete();
        return false;
      }

      function renderConstructionWarnings() {
        const items = constructionReadinessItems();
        if (!items.length) return `<div class="constructionWarningPanel constructionStatusPanel"><div class="constructionWarning ready"><strong>Paramétrage prêt</strong><span>Les éléments essentiels sont renseignés pour construire l'emploi du temps.</span></div></div>`;
        return `<div class="constructionWarningPanel constructionStatusPanel">${items.map((item) => `<div class="constructionWarning ${item.level === "blocking" ? "blocking" : ""}" ${item.buildMode ? `data-warning-build-mode="${item.buildMode}" ${item.subMode ? `data-warning-sub-mode="${item.subMode}"` : ""} title="Ouvrir l'onglet concerne"` : ""}><strong>${item.title}</strong><span>${item.detail}</span></div>`).join("")}</div>`;
      }

      function renderConstructionLockedWarnings() {
        const items = constructionReadinessItems();
        if (!items.length) return "";
        return `<ul class="constructionLockedList">${items.map((item) => `<li ${item.buildMode ? `data-warning-build-mode="${item.buildMode}" ${item.subMode ? `data-warning-sub-mode="${item.subMode}"` : ""} title="Ouvrir l'onglet concern&eacute;"` : ""}><strong>${item.title}</strong><span>${item.detail}</span></li>`).join("")}</ul>`;
      }

      function renderConstructionStatusRow(helpText = "") {
        const readiness = renderConstructionWarnings();
        const conflicts = conflictsForBuildMode(constructionBuildMode);
        const conflictBadge = !conflicts.length ? `<div class="constructionOkBadge">Aucun conflit détecté</div>` : "";
        const helpButton = helpText ? `<button class="constructionHelpButton ${constructionHelpOpen ? "active" : ""}" type="button" data-toggle-construction-help aria-label="Afficher l'aide de ce sous-onglet" title="Afficher l'aide">?</button>` : "";
        const helpPanel = helpText && constructionHelpOpen ? `<div class="constructionHelpText">${helpText}</div>` : "";
        return `<div class="constructionStatusBlock"><div class="constructionStatusRow">${readiness}${conflictBadge}${helpButton}</div>${helpPanel}</div>`;
      }

      function renderConstructionServiceSummary() {
        if (constructionServiceSummaryHidden) {
          return `<div class="servicePanel compactServicePanel constructionServicePanel isCollapsed">
            <div class="hoursBalanceHeader">
              <h3>Service réel construit</h3>
              <button class="ghostButton" data-toggle-construction-service-summary>Afficher</button>
            </div>
          </div>`;
        }
        const teacherTotals = annualConstructionTeacherHours();
        const teacherClassTotals = annualConstructionTeacherClassHours();
        const teacherOptionTotals = annualConstructionTeacherOptionHours();
        const classTotals = annualConstructionClassHours();
        const classSummaries = constructionSummaryClasses().map((schoolClass) => {
          const total = constructionClassSummaryTotal(schoolClass, classTotals);
          const target = classHourTargetForConstruction(schoolClass);
          const diff = roundConstructedHours(total - (target || 0));
          const missing = Math.max(0, -diff);
          const excess = Math.max(0, diff);
          const ok = !target || Math.abs(diff) < 0.01;
          return { schoolClass, total, target, missing, excess, ok };
        });
        return `<div class="servicePanel compactServicePanel constructionServicePanel">
          <div class="hoursBalanceHeader">
            <h3>Service réel construit</h3>
            <button class="ghostButton" data-toggle-construction-service-summary>Masquer</button>
          </div>
          <div class="hoursBalanceGrid">
            ${teachers.map((teacher) => {
              const total = teacherTotals[teacher.id] || 0;
              const target = serviceTargetForTeacher(teacher);
              const overtimeHours = Math.max(0, roundConstructedHours(target - teacher.weeklyReference));
              const status = hourStatus(total - target);
              const progress = target ? Math.min(100, Math.round((total / target) * 100)) : 0;
              const classDetails = constructionTeacherClassSummaries(teacher.id, teacherClassTotals);
              const optionDetails = constructionTeacherOptionSummaries(teacher.id, teacherOptionTotals);
              const serviceDetails = [...classDetails.map((item) => ({ ...item, label: compactClassName(item.schoolClass) })), ...optionDetails.map((item) => ({ ...item, label: item.label }))];
              return `<article class="hoursCard" style="background:${teacher.color};border-color:${teacher.border}">
                <div class="hoursCardTop"><strong>${teacher.name}</strong><span class="hoursStatus ${status.className}">${status.label}</span></div>
                <div class="hoursMain"><strong>${formatHours(total)}</strong><span class="muted">/ ${formatHours(target)}${overtimeHours ? ` <span class="hoursOvertime">${formatHours(overtimeHours)} HSA</span>` : ""}</span></div>
                <div class="hoursProgress"><span style="width:${progress}%"></span></div>
                <div class="classPills">
                  ${serviceDetails.length ? serviceDetails.map((item) => {
                    const detail = item.missing ? ` &middot; manque ${formatHours(item.missing)}` : item.excess ? ` &middot; trop ${formatHours(item.excess)}` : "";
                    return `<span class="classPill ${item.ok ? "" : "needsValidation"}">${item.label} &middot; ${formatHours(item.total)} / ${formatHours(item.target)}${detail}</span>`;
                  }).join("") : `<span class="classPill">Aucun service affecté</span>`}
                </div>
              </article>`;
            }).join("")}
          </div>
          <h3>Volumes par classe</h3>
          <div class="classPills">
            ${classSummaries.map((item) => {
              const total = formatHours(item.total);
              const target = formatHours(item.target);
              const ok = item.ok;
              const schoolClass = item.schoolClass;
              return `<span class="classPill ${ok ? "" : "needsValidation"}">${compactClassName(schoolClass)} · ${total} / ${target}</span>`;
            }).join("")}
          </div>
        </div>`;
      }

      function renderPrerequisiteTabs(items, active, datasetName, lockState = () => false) {
        return `<div class="constructionTabs">
          ${items.map((item) => {
            const complete = adminStepComplete(item.id);
            const locked = lockState(item.id);
            return `<button class="${active === item.id ? "active" : ""} ${complete ? "stepComplete" : "stepIncomplete"}" ${datasetName}="${item.id}">${item.label}<span class="subtabStatusStack"><span class="subtabLockIcon ${locked ? "locked" : ""}" aria-label="${locked ? "Verrouille" : "Deverrouillé"}">&#128274;</span><span class="stepStatus" aria-label="${complete ? "Étape complète" : "Étape incomplète"}"></span></span></button>`;
          }).join("")}
        </div>`;
      }

      function renderPrerequisitesView() {
        const tabs = [
          { id: "establishment", label: "Établissement" },
          { id: "team", label: "Profs" },
          { id: "classes", label: "Classes" },
          { id: "facilitiesActivities", label: "Installations & activités" },
          { id: "program", label: "Programme" }
        ];
        const content = prerequisiteMode === "team" ? renderTeamSettings()
          : prerequisiteMode === "classes" ? renderClassesView()
            : prerequisiteMode === "facilitiesActivities" || prerequisiteMode === "facilities" || prerequisiteMode === "activities" ? renderFacilitiesActivitiesSettings()
              : prerequisiteMode === "program" ? renderActivityProgramSettings()
                : renderEstablishmentSettings();
        const currentLocked = prerequisiteLocked(prerequisiteMode);
        return `<section class="prerequisitesPage">
          <div class="prerequisitesHeader">
            <h2 class="prerequisitesPageTitle">Pré-requis établissement</h2>
          </div>
          ${renderPrerequisiteTabs(tabs, prerequisiteMode, "data-prerequisite-mode", prerequisiteLocked)}
          <div class="prerequisitesLockRow">
            <label class="lockToggle" title="Verrouiller les modifications de ce sous-onglet">
              <input type="checkbox" data-prerequisites-lock="${prerequisiteMode}" ${currentLocked ? "checked" : ""} />
              <span class="lockToggleTrack"></span>
              <span>${currentLocked ? "Sous-onglet verrouill&eacute;" : "Verrouiller ce sous-onglet"}</span>
            </label>
          </div>
          ${currentLocked ? `<div class="lockNotice">Sous-onglet verrouill&eacute; : vous pouvez consulter et naviguer, mais pas modifier cette partie.</div>` : ""}
          <div class="prerequisiteLockedBody ${currentLocked ? "locked" : ""}">
            ${content}
          </div>
        </section>`;
      }

      function renderYearPrerequisitesView() {
        const tabs = [
          { id: "unavailable", label: "Indisponibilités" },
          { id: "cycles", label: "Cycles" },
          { id: "as", label: "AS" },
          { id: "events", label: "Événements sportifs" },
          { id: "hours", label: "Service" }
        ];
        const content = yearPrerequisiteMode === "cycles" ? `<section>
            <section class="cycleDefinitionPage">
              <div class="cycleDefinitionPanel">
                ${renderCycleDefinition()}
              </div>
            </section>
          </section>`
          : yearPrerequisiteMode === "as" ? renderAsView()
            : yearPrerequisiteMode === "events" ? renderEventsView()
              : yearPrerequisiteMode === "hours" ? renderHoursBalance()
                : renderFacilityUnavailabilityView();
        return `<section class="prerequisitesPage">
          <h2 class="prerequisitesPageTitle">Pré-requis année scolaire</h2>
          ${renderPrerequisiteTabs(tabs, yearPrerequisiteMode, "data-year-prerequisite-mode", yearPrerequisiteLocked)}
          <div class="prerequisitesLockRow">
            <label class="lockToggle" title="Verrouiller les modifications de ce sous-onglet">
              <input type="checkbox" data-year-prerequisites-lock="${yearPrerequisiteMode}" ${yearPrerequisiteLocked(yearPrerequisiteMode) ? "checked" : ""} />
              <span class="lockToggleTrack"></span>

create or replace function public.create_etab_for_current_user(etab_name text, etab_slug text default null)
returns uuid
language plpgsql
security definer
set search_path = public
as $$
declare
  new_etab_id uuid;
  clean_name text;
  clean_slug text;
begin
  if auth.uid() is null then
    raise exception 'Utilisateur non connecte';
  end if;

  clean_name := nullif(trim(etab_name), '');
  if clean_name is null then
    raise exception 'Nom d''Établissement requis';
  end if;

  clean_slug := nullif(trim(etab_slug), '');
  if clean_slug is null then
    clean_slug := lower(regexp_replace(clean_name, '[^a-zA-Z0-9]+', '-', 'g'));
  end if;
  clean_slug := trim(both '-' from clean_slug);
  if clean_slug = '' then
    clean_slug := 'Établissement';
  end if;
  clean_slug := clean_slug || '-' || substr(gen_random_uuid()::text, 1, 8);

  insert into public.etabs (name, slug)
  values (clean_name, clean_slug)
  returning id into new_etab_id;

  insert into public.etab_members (etab_id, user_id, role)
  values (new_etab_id, auth.uid(), 'owner');

  return new_etab_id;
end;
$$;

grant execute on function public.create_etab_for_current_user(text, text) to authenticated;

create or replace function public.claim_etab_for_current_user(claim_etab_id uuid, etab_name text default 'Établissement EPS')
returns jsonb
language plpgsql
security definer
set search_path = public
as $$
declare
  member_count integer;
  clean_name text;
begin
  if auth.uid() is null then
    raise exception 'Utilisateur non connecte';
  end if;

  if claim_etab_id is null then
    raise exception 'etab_id requis';
  end if;

  clean_name := nullif(trim(etab_name), '');
  if clean_name is null then
    clean_name := 'Établissement EPS';
  end if;

  insert into public.etabs (id, name, slug)
  values (claim_etab_id, clean_name, 'migration-' || substr(claim_etab_id::text, 1, 8))
  on conflict (id) do nothing;

  select count(*) into member_count
  from public.etab_members
  where etab_id = claim_etab_id;

  if member_count > 0 and not exists (
    select 1 from public.etab_members
    where etab_id = claim_etab_id
    and user_id = auth.uid()
  ) then
    raise exception 'Cet ?tablissement a déjà une équipe. Demandez un lien d''invitation owner.';
  end if;

  insert into public.etab_members (etab_id, user_id, role)
  values (claim_etab_id, auth.uid(), 'owner')
  on conflict (etab_id, user_id) do update
  set role = 'owner';

  return jsonb_build_object('id', claim_etab_id, 'role', 'owner');
end;
$$;

grant execute on function public.claim_etab_for_current_user(uuid, text) to authenticated;

create or replace function public.get_current_etab_role(check_etab_id uuid)
returns text
language plpgsql
security definer
set search_path = public
as $$
declare
  found_role text;
begin
  if auth.uid() is null then
    return '';
  end if;

  select role
  into found_role
  from public.etab_members
  where etab_id = check_etab_id
    and user_id = auth.uid()
  limit 1;

  return coalesce(found_role, '');
end;
$$;

grant execute on function public.get_current_etab_role(uuid) to authenticated;

create or replace function public.get_current_user_etab()
returns jsonb
language plpgsql
security definer
set search_path = public
as $$
declare
  found_etab_id uuid;
  found_role text;
  found_etab_name text;
begin
  if auth.uid() is null then
    return jsonb_build_object();
  end if;

  select etab_id, role
  into found_etab_id, found_role
  from public.etab_members
  where user_id = auth.uid()
  order by created_at asc
  limit 1;

  if found_etab_id is null then
    return jsonb_build_object();
  end if;

  select name
  into found_etab_name
  from public.etabs
  where id = found_etab_id
  limit 1;

  return jsonb_build_object('etab_id', found_etab_id, 'role', found_role, 'etab_name', found_etab_name);
end;
$$;

grant execute on function public.get_current_user_etab() to authenticated;

create or replace function public.list_current_user_etabs()
returns jsonb
language plpgsql
security definer
set search_path = public
as $$
begin
  if auth.uid() is null then
    return '[]'::jsonb;
  end if;

  return coalesce((
    select jsonb_agg(jsonb_build_object(
      'etab_id', m.etab_id,
      'role', m.role,
      'etab_name', e.name,
      'created_at', m.created_at
    ) order by m.created_at asc)
    from public.etab_members m
    left join public.etabs e on e.id = m.etab_id
    where m.user_id = auth.uid()
  ), '[]'::jsonb);
end;
$$;

grant execute on function public.list_current_user_etabs() to authenticated;

create or replace function public.create_etab_invite(invite_etab_id uuid, invite_role text default 'member')
returns text
language plpgsql
security definer
set search_path = public
as $$
declare
  invite_token text;
begin
  if auth.uid() is null then
    raise exception 'Utilisateur non connecte';
  end if;

  if not exists (
    select 1 from public.etab_members m
    where m.etab_id = invite_etab_id
    and m.user_id = auth.uid()
    and m.role = 'owner'
  ) then
    raise exception 'Droits insuffisants pour inviter';
  end if;

  if invite_role not in ('owner', 'member') then
    invite_role := 'member';
  end if;

  insert into public.etab_invites (etab_id, created_by, role)
  values (invite_etab_id, auth.uid(), invite_role)
  returning token into invite_token;

  return invite_token;
end;
$$;

create or replace function public.accept_etab_invite(invite_token text)
returns jsonb
language plpgsql
security definer
set search_path = public
as $$
declare
  invite_row public.etab_invites%rowtype;
begin
  if auth.uid() is null then
    raise exception 'Utilisateur non connecte';
  end if;

  select * into invite_row
  from public.etab_invites
  where token = invite_token
    and expires_at > now()
    and (max_uses is null or used_count < max_uses);

  if invite_row.token is null then
    raise exception 'Invitation invalide ou expiree';
  end if;

  insert into public.etab_members (etab_id, user_id, role)
  values (invite_row.etab_id, auth.uid(), invite_row.role)
  on conflict (etab_id, user_id) do update
  set role = excluded.role;

  update public.etab_invites
  set used_count = used_count + 1
  where token = invite_row.token;

  return jsonb_build_object('id', invite_row.etab_id, 'role', invite_row.role);
end;
$$;

grant execute on function public.create_etab_invite(uuid, text) to authenticated;

      function renderCycleCoverage(scope = "default") {
        const weeks = schoolYearWeeks();
        const shownCycles = cyclesForScope(scope);
        const palette = ["#dbeafe", "#dcfce7", "#fef3c7", "#fce7f3", "#ede9fe", "#cffafe", "#fee2e2", "#e0e7ff", "#ecfccb", "#fae8ff", "#f1f5f9", "#ffedd5"];
        const cycleStyle = (cycle) => {
          if (!cycle) return "";
          const index = Math.max(0, shownCycles.findIndex((item) => item.id === cycle.id));
          return `background:${palette[index % palette.length]};border-color:#111827;color:#0f172a;`;
        };
        const groupedCoverageCells = () => {
          const groups = [];
          weeks.forEach((weekItem) => {
            const vacation = vacationForWeek(weekItem);
            const cycle = shownCycles.find((item) => weeksForCycle(item).some((cycleWeek) => cycleWeek.rank === weekItem.rank));
            const label = vacation ? "V" : cycle ? cycle.name.replace("Cycle ", "C") : "";
            const className = vacation ? "vacationCell" : cycle ? "coveredCell" : "gapCell";
            const style = cycle && !vacation ? cycleStyle(cycle) : "";
            const title = vacation?.name || (cycle ? `${cycle.start} - ${cycle.end}` : "Aucun cycle");
            const last = groups[groups.length - 1];
            if (last && last.label === label && last.className === className && last.style === style && last.title === title) {
              last.span += 1;
              last.end = weekItem;
            } else {
              groups.push({ label, className, style, title, start: weekItem, end: weekItem, span: 1 });
            }
          });
          return groups.map((group) => `<td colspan="${group.span}" class="${group.className}" style="${group.style}" title="${group.title}">
            <div class="cycleCoverageBlock">
              <strong>du ${shortDate(weekDisplayStart(group.start))} au ${shortDate(weekDisplayEnd(group.end))}</strong>
            </div>
          </td>`).join("");
        };
        return `<div class="cycleCoverage">
          <h3>Vue annuelle des cycles</h3>
          <div class="cycleLegend"><span class="cycleLegendSwatch"></span><span>Rouge fonce : trou dans les cycles</span></div>
          <div class="yearWrap"><table class="yearTable cycleCoverageTable">
            <thead>
              <tr><th class="timeHead">Repère</th>${groupedHeaderCells(weeks, monthLabelForWeek, () => "monthCell")}</tr>
              <tr><th class="timeHead">Cycle</th>${groupedHeaderCells(weeks, (weekItem) => {
                const vacation = vacationForWeek(weekItem);
                const cycle = shownCycles.find((item) => weeksForCycle(item).some((cycleWeek) => cycleWeek.rank === weekItem.rank));
                return vacation ? "V" : cycle ? cycle.name.replace("Cycle ", "C") : "";
              }, (weekItem) => vacationForWeek(weekItem) ? "vacationHeader" : shownCycles.find((item) => weeksForCycle(item).some((cycleWeek) => cycleWeek.rank === weekItem.rank)) ? "cycleHeader" : "gapCell")}</tr>
              <tr><th class="timeHead">Semaine</th>${weeks.map((weekItem) => `<th>${weekItem.rank}${weekItem.letter}</th>`).join("")}</tr>
            </thead>
            <tbody>
              <tr>
                <th class="timeHead">Dates</th>
                ${groupedCoverageCells()}
              </tr>
            </tbody>
          </table></div>
        </div>`;
      }

      function facilityIdFromName(name) {
        const base = name
          .toLowerCase()
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "")
          .replace(/[^a-z0-9]+/g, "-")
          .replace(/^-|-$/g, "") || "installation";
        let id = base;
        let index = 2;
        while (facilities.some((facility) => facility.id === id)) {
          id = `${base}-${index}`;
          index += 1;
        }
        return id;
      }

      function activityIdFromName(name) {
        const base = name
          .toLowerCase()
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "")
          .replace(/[^a-z0-9]+/g, "-")
          .replace(/^-|-$/g, "") || "activite";
        let id = base;
        let index = 2;
        while (activities.some((activity) => activity.id === id)) {
          id = `${base}-${index}`;
          index += 1;
        }
        return id;
      }

      function renderTeamSettings() {

        if (teacherDraftColor && !draftPalette.some((item) => item.color === teacherDraftColor)) {

        }

              <span class="muted">Cours classiques : ${teacherDraftHours}h · AS : 3h</span>

              <button class="addButton" id="addTeacher" ${canAddTeacher ? "" : "disabled"}>Ajouter le prof</button>
            </div>
          </div>
          <div class="eventList">
            <h3>Équipe EPS</h3>
            <div class="compactCardGrid">${teachers.map((teacher) => `<article class="eventCard teamCard">
              <div class="teamPreview" style="background:${teacher.color};border-color:${teacher.border}">
                <input class="teamNameEdit" data-rename-teacher="${teacher.id}" value="${teacher.name}" aria-label="Prenom du professeur" />
                <span>${teacher.weeklyReference}h cours classiques · 3h AS</span>

              </div>
              <div class="eventField">
                <label>Couleur</label>

                ${expandedTeacherColorId === teacher.id ? `<div class="teacherColorPalette">${availableTeacherPalette(teacher.id).map((item) => `<button class="teacherColorSwatch ${teacher.color === item.color ? "active" : ""}" data-update-teacher-color="${teacher.id}" data-color="${item.color}" style="background:${item.color};border-color:${teacher.color === item.color ? item.border : "transparent"}" title="Couleur"></button>`).join("")}</div>` : ""}
              </div>
              <div class="eventField">
                <label>Remplacant</label>
                <input class="replacementEdit" data-teacher-replacement="${teacher.id}" placeholder="Ex. Nom du remplacant" value="${teacher.replacementName || ""}" />

              <button class="ghostButton" data-delete-teacher="${teacher.id}">Supprimer</button>

      function renderConstructionCellStack(items, events, asItems, editable, key, row, alignmentTeacherIds = []) {
        const indexedItems = items.map((item, index) => ({ item, index }));
        const orderedTeacherIds = editable ? alignmentTeacherIds : teachers.map((teacher) => teacher.id);
        const showCycleDetails = constructionBuildMode !== "blocks";
        const lessonBlocks = row.isAs ? "" : editable
          ? orderedTeacherIds.map((teacherId) => {
            const matches = indexedItems.filter(({ item }) => teacherIdsForBlock(item)[0] === teacherId);
            return `<div class="buildFacilitySlot">${matches.map(({ item, index }) => `
              <div class="buildBlock ${movingBuildBlock?.type === "course" && movingBuildBlock?.key === key && movingBuildBlock?.index === index ? "moveSelected" : ""}" data-move-kind="course" data-move-index="${index}" data-block-key="${key}" style="${blockTeacherStyle(item)}">
                <button class="moveBlockButton" data-start-move-kind="course" data-move-index="${index}" data-block-key="${key}" title="Deplacer">↔</button>
                <button class="removeBlockButton" data-remove-cell="${key}" data-remove-index="${index}" title="Retirer">x</button>
                <strong>${blockClassLabel(item)}</strong>
                ${showCycleDetails ? `<span>${blockDetailLabel(item)}</span>` : ""}
              </div>`).join("") || `<div class="buildSlotSpacer"></div>`}</div>`;
          }).join("")
          : items.map((item) => `
              <div class="buildBlock" style="${blockTeacherStyle(item)}">
                <strong>${blockClassLabel(item)}</strong>
                ${showCycleDetails ? `<span>${blockDetailLabel(item)}</span>` : ""}
              </div>`).join("");
        return `<div class="buildCellStack">${lessonBlocks}${events.map((event) => `
          <div class="buildBlock eventBlock ${movingBuildBlock?.type === "event" && movingBuildBlock?.id === event.id ? "moveSelected" : ""}" data-move-kind="event" data-move-id="${event.id}" data-block-key="${key}">
            <strong>${event.name} : ${eventClassSummary(event)}</strong>
            <div class="eventBlockControls">
              <button class="moveBlockButton" data-start-move-kind="event" data-move-id="${event.id}" data-block-key="${key}" title="Deplacer">↔</button>
              ${eventTeacherDots(event)}
            </div>
          </div>`).join("")}${asItems.map((session) => `
          <div class="buildBlock asBlock ${movingBuildBlock?.type === "as" && movingBuildBlock?.id === session.id ? "moveSelected" : ""}" ${constructionBuildMode === "blocks" ? `data-move-kind="as"` : ""} data-move-id="${session.id}" data-block-key="${key}" style="${asSessionStyle(session)}">
            ${constructionBuildMode === "blocks" ? `<button class="moveBlockButton" data-start-move-kind="as" data-move-id="${session.id}" data-block-key="${key}" title="Deplacer">↔</button>` : ""}
            <strong>${asBlockLabel(session)}</strong>
          </div>`).join("")}</div>`;
      }

      function indexedConstructionItemsForKey(key, filterSelection = false, weekLetter = "") {
        return (constructionPlan[key] || [])
          .map((item, index) => ({ item, index }))
          .filter(({ item }) => (!filterSelection || blockMatchesTeacherSelection(item)) && (!weekLetter || (item.weekLetter || "all") === weekLetter));
      }

      function constructionOptimizationIssueForBlock(item, cycle) {
        if (constructionBuildMode !== "cycleDetails" || !constructionOptimizationResult?.unresolvedBlocks?.length || !item?.ruleId || !cycle?.id) return null;
        return constructionOptimizationResult.unresolvedBlocks.find((issue) => issue.ruleId === item.ruleId && issue.cycleId === cycle.id) || null;
      }

      function constructionCycleDisplayBlock(item, cycle = null) {
        if (constructionBuildMode !== "cycleDetails" || !cycle?.id || !item?.ruleId) return item;
        const rule = constructionRules.find((entry) => entry.id === item.ruleId);
        if (!rule) return item;
        return {
          ...blockWithCycleOverride(rule, cycle),
          ruleId: rule.id,
          cycleId: cycle.id,
          cycleName: cycle.name,
          weekLetter: item.weekLetter || rule.weekLetter || "all"
        };
      }

      function renderConstructionCycleBlocks(indexedItems, key, editable = true, cycle = null) {
        if (!indexedItems.length) return "";
        return `<div class="cycleBlockGrid">${indexedItems.map(({ item, index }) => {
          const displayItem = constructionCycleDisplayBlock(item, cycle);
          const optimizationIssue = constructionOptimizationIssueForBlock(displayItem, cycle);
          const showCycleDetails = constructionBuildMode !== "blocks";
          return `
          <div class="buildBlock ${movingBuildBlock?.type === "course" && movingBuildBlock?.key === key && movingBuildBlock?.index === index ? "moveSelected" : ""} ${optimizationIssue ? "optimizationIssue" : ""}" ${editable ? (constructionBuildMode === "blocks" ? `data-move-kind="course"` : `data-edit-cycle-details="${index}"`) : ""} data-move-index="${index}" data-block-key="${key}" data-rule-id="${displayItem.ruleId || ""}" data-cycle-id="${cycle?.id || ""}" title="${optimizationIssue ? escapeHtml(optimizationIssue.reason) : ""}" style="${blockTeacherStyle(displayItem)}">
            ${editable && constructionBuildMode === "blocks" ? `<button class="moveBlockButton" data-start-move-kind="course" data-move-index="${index}" data-block-key="${key}" title="Deplacer">↔</button>
            <button class="removeBlockButton" data-remove-cell="${key}" data-remove-index="${index}" title="Retirer">x</button>` : ""}
            <strong>${blockClassLabel(displayItem)}</strong>
            ${showCycleDetails && blockDetailLabel(displayItem) ? `<span>${blockDetailLabel(displayItem)}</span>` : ""}
            ${optimizationIssue ? `<span class="optimizationIssueReason">${escapeHtml(optimizationIssue.reason)}</span>` : ""}
            ${displayItem.coIntervention ? `<span>Co-intervention</span>` : ""}
          </div>
        `;
        }).join("")}</div>`;
      }

      function asSessionsForConstructionCycle(row, cycle, key, filterSelection = false) {
        if (!row?.isAs || !cycle) return [];
        const cycleStart = dateOnly(cycle.start);
        const cycleEnd = dateOnly(cycle.end);
        return asSessions
          .filter((session) => {
            const start = dateOnly(session.start);
            const end = dateOnly(session.end);
            const slotIds = Array.isArray(session.slotIds) ? session.slotIds : [];
            return start <= cycleEnd
              && end >= cycleStart
              && (session.weekdays || []).includes(row.day)
              && (!slotIds.length || slotIds.includes(row.slot.id))
              && !itemExcludedForCell(asExclusions, session.id, key);
          })
          .filter((session) => !filterSelection || asMatchesTeacherSelection(session));
      }

      function renderConstructionCycleArea(row, cycle, letter, label, filterSelection = false, editable = true) {
        const weekItem = representativeWeekForCycle(cycle, letter);
        if (!weekItem) return `<div class="cycleConstructionFull"><span class="muted">Cycle sans semaine</span></div>`;
        const key = yearCellKey(row.id, weekItem.rank);
        const indexedItems = indexedConstructionItemsForKey(key, filterSelection, letter);
        const asItems = asSessionsForConstructionCycle(row, cycle, key, filterSelection);
        const blocked = isWednesdayAfternoonCourse(row);
        const canOpenHere = editable && constructionBuildMode === "blocks" && !row.isAs && !blocked;
        const availableStyle = canOpenHere ? availableTeacherCellStyle(row, weekItem, key, blocked, cycle, letter || "all") : "";
        const availabilityTitle = canOpenHere ? availableTeacherCellTitle(row, weekItem, key, cycle, letter || "all") : "";
        const cellTitle = [label, blocked ? "Mercredi après-midi indisponible" : "", availabilityTitle].filter(Boolean).join(" | ");
        return `<div title="${cellTitle}" class="${letter ? "cycleConstructionHalf" : "cycleConstructionFull"} ${row.isAs ? "cycleConstructionAsCell" : ""} ${blocked ? "constructionBlockedCell" : ""} ${canOpenHere ? "buildDropCell availableTeacherBg" : ""}" style="${availableStyle}" ${canOpenHere ? `data-open-cell="${key}" data-open-cycle-id="${cycle.id}" data-open-week-letter="${letter || "all"}" data-move-cell="${key}"` : ""}>
          ${letter ? `<span class="cycleConstructionHalfLabel">${label}</span>` : ""}
          ${blocked ? "" : row.isAs ? `<div class="constructionAsStack">${asItems.length ? asItems.map((session) => `
            <div class="buildBlock asBlock ${movingBuildBlock?.type === "as" && movingBuildBlock?.id === session.id ? "moveSelected" : ""}" ${editable && constructionBuildMode === "blocks" ? `data-move-kind="as"` : ""} data-move-id="${session.id}" data-block-key="${key}" style="${asSessionStyle(session)}">
              ${editable && constructionBuildMode === "blocks" ? `<button class="moveBlockButton" data-start-move-kind="as" data-move-id="${session.id}" data-block-key="${key}" title="Deplacer">↔</button>` : ""}
              <strong>${asBlockLabel(session)}</strong>
              <span>${asSessionTeacherLabel(session)}</span>
            </div>`).join("") : `<span class="muted">-</span>`}</div>` : renderConstructionCycleBlocks(indexedItems, key, editable, cycle)}
        </div>`;
      }

      function constructionWeekTypeSlots() {
        return [
          ...slots.slice(0, 2),
          { id: "__as__", label: "AS", isAsSummary: true },
          ...slots.slice(2)
        ];
      }

      function constructionRowForSlot(day, slot) {
        const rows = yearRows();
        if (slot.isAsSummary) return rows.find((item) => item.day === day && item.isAs) || null;
        return rows.find((item) => item.day === day && item.slot.id === slot.id && item.slot.label === slot.label) || null;
      }

      function renderConstructionCycleTable(cycle, rows, editable, filterSelection = false) {
        if (!cycle) return `<div class="alertEmpty">Aucun cycle classique défini.</div>`;
        const slotRows = constructionWeekTypeSlots();
        return `<div class="yearWrap cycleConstructionTableWrap"><table class="yearTable constructionTable cycleConstructionTable">
          <thead>
            <tr><th class="timeHead">Créneau</th>${days.map((day) => `<th>${day}</th>`).join("")}</tr>
          </thead>
          <tbody>
            ${slotRows.map((slot) => `<tr>
              <th class="timeHead">${slot.label}</th>
              ${days.map((day) => {
                const row = constructionRowForSlot(day, slot);
                if (!row) return `<td class="mergedOff"><span class="muted">-</span></td>`;
                const weekAll = representativeWeekForCycle(cycle);
                const weekA = representativeWeekForCycle(cycle, "A");
                const weekB = representativeWeekForCycle(cycle, "B");
                const keyAll = weekAll ? yearCellKey(row.id, weekAll.rank) : "";
                const keyA = weekA ? yearCellKey(row.id, weekA.rank) : "";
                const keyB = weekB ? yearCellKey(row.id, weekB.rank) : "";
                const allItems = keyAll ? indexedConstructionItemsForKey(keyAll, filterSelection, "all") : [];
                const aItems = keyA ? indexedConstructionItemsForKey(keyA, filterSelection, "A") : [];
                const bItems = keyB ? indexedConstructionItemsForKey(keyB, filterSelection, "B") : [];
                const hasQuinzaine = aItems.length || bItems.length;
                const blockedRow = isWednesdayAfternoonCourse(row);
                return `<td class="cycleConstructionCell">
                  <div class="cycleConstructionCellInner">
                    ${hasQuinzaine
                      ? `${!blockedRow && allItems.length ? renderConstructionCycleBlocks(allItems, keyAll, editable, cycle) : ""}<div class="cycleConstructionSplit">${renderConstructionCycleArea(row, cycle, "A", "Semaine A", filterSelection, editable)}${renderConstructionCycleArea(row, cycle, "B", "Semaine B", filterSelection, editable)}</div>`
                      : renderConstructionCycleArea(row, cycle, "", "", filterSelection, editable)}
                  </div>
                </td>`;
              }).join("")}
            </tr>`).join("")}
          </tbody>
        </table></div>`;
      }

      function renderFacilityUnavailabilityView() {
        const hasUnavailableTime = unavailableCells.length;
        const cyclesAvailable = cycles.length > 0;
        const selectedCycles = unavailableSelectedCycles();
        const period = unavailableDateRange();
        const hasPeriod = unavailablePeriodMode === "cycles" ? cyclesAvailable && unavailableCycleIds.length > 0 : unavailableStart && unavailableEnd;
        const unavailableSelectionCount = unavailableType === "facility"
          ? unavailableFacilityIds.length
          : unavailableType === "class"
            ? unavailableClassIds.length
            : unavailableTeacherIds.length;
        const canSaveUnavailable = hasUnavailableTime && unavailableSelectionCount && hasPeriod;
        return `<section class="eventPage">
          <div class="eventForm">
            <h3>${editingUnavailableId ? "Modifier la contrainte" : "Ajouter une contrainte"}</h3>

      function constructionConflictDetails(conflict) {
        if (conflict.type === "teacher") {
          const teacherName = teachers.find((teacher) => teacher.id === conflict.teacher)?.name || conflict.teacher;
          return {
            label: `Professeur en conflit : ${teacherName}`,
            detail: conflict.items.map((item) => `${blockClassLabel(item) || "classe non précisée"} · ${item.facilityLabel || "installation non précisée"}`).join(" / ")
          };
        }
        if (conflict.type === "asTeacher") {
          const teacherName = teachers.find((teacher) => teacher.id === conflict.teacher)?.name || conflict.teacher;
          return {
            label: `Professeur en conflit AS : ${teacherName}`,
            detail: conflict.items.map((item) => `${item.name || "AS"} · ${item.weekdays.join(", ")}`).join(" / ")
          };
        }
        if (conflict.type === "class") {
          return {
            label: `Classe en conflit : ${conflict.schoolClass}`,
            detail: conflict.items.map((item) => `${teacherLabelForBlock(item)} · ${item.facilityLabel || "installation non précisée"}`).join(" / ")
          };
        }
        return {
          label: `Installation en conflit : ${conflict.items[0].facilityLabel || conflict.facility}`,
            detail: conflict.items.map((item) => `${teacherLabelForBlock(item)} avec ${blockClassLabel(item) || "classe non précisée"}`).join(" / ")
        };
      }

      function renderBugFixLogView() {
        const source = window.__EPS_BUG_FIX_LOG__ || fallbackBugFixLog;
        const entries = source
          .split("\n")
          .map((line) => line.trim())
          .filter((line) => line.startsWith("- "))
          .map((line) => {
            const text = line.slice(2).replace(/`/g, "");
            const separator = text.indexOf(" : ");
            return separator >= 0
              ? { title: text.slice(0, separator), details: text.slice(separator + 3) }
              : { title: text, details: "" };
          });
        const groups = entries.reduce((items, entry) => {
          const title = entry.title || "General";
          if (!items[title]) items[title] = [];
          items[title].push(entry.details || entry.title);
          return items;
        }, {});
        return `<section class="logPage">
          <h2>Log des corrections</h2>
          <article class="alertHelp">
            <strong>Historique simple</strong>
            <span>Liste des corrections et améliorations apportées au logiciel au fil des mises à jour.</span>

          ${Object.keys(groups).length ? `<div class="logGroupGrid">${Object.entries(groups).map(([title, items]) => `
              <details class="logGroup">

        </section>`;
      }

      async function submitFeedback() {
        if (!requestMessage.trim() || requestSubmitting) return;
        requestSubmitting = true;
        requestStatus = "Envoi en cours...";
        render();
        try {
          if (!cloudReady()) throw new Error("cloud non configuré");
          if (!cloudWriteAllowed()) throw new Error(cloudWriteBlockedMessage());
          const payload = {
            etab_id: cloudConfig.etabId,
            planning_id: cloudConfig.planningId,
            kind: requestKind,
            author: requestAuthor.trim() || null,
            message: requestMessage.trim(),
            context: {
              page: week,
              schoolYear: schoolYear.label,
              userAgent: navigator.userAgent,
              sentAt: new Date().toISOString()
            },
            status: "new"
          };
          const response = await fetch(feedbackEndpoint(), {
            method: "POST",
            headers: cloudHeaders({ Prefer: "return=minimal" }),
            body: JSON.stringify(payload)
          });
          if (!response.ok) throw new Error(await response.text());
          requestMessage = "";
          requestStatus = "Votre requête a bien été envoyée. Merci pour votre retour.";
        } catch (error) {
          requestStatus = `Envoi impossible : ${error.message || "erreur inconnue"}`;
        } finally {
          requestSubmitting = false;
          render();
        }
      }

              <label>Votre nom ou email</label>
              <input id="requestAuthor" value="${requestAuthor}" placeholder="Facultatif" />
            </div>
            <div class="requestField">
              <label>Message</label>
              <textarea id="requestMessage" placeholder="Décrivez le bug, ce que vous vouliez faire, ou l'amélioration souhaitée.">${requestMessage}</textarea>
            </div>

              <button class="ghostButton primaryWeekButton" id="sendFeedback" ${canSend ? "" : "disabled"}>${requestSubmitting ? "Envoi..." : "Envoyer la requête"}</button>
            </div>
            ${requestStatus ? `<div class="requestStatus ${requestStatusClass}">${requestStatus}</div>` : ""}
          </div>
        </section>`;
      }

      function showValidationPopup(message, type = "success") {
        validationPopupMessage = message;
        validationPopupType = type === "error" ? "error" : "success";
        clearTimeout(validationPopupTimer);
        validationPopupTimer = setTimeout(() => {
          validationPopupMessage = "";
          validationPopupType = "success";
          render();
        }, validationPopupType === "error" ? 5200 : 2400);
      }

      function renderValidationPopup() {
        return validationPopupMessage ? `<div class="validationPopup ${validationPopupType === "error" ? "error" : ""}">${validationPopupMessage}</div>` : "";
      }

      function renderAppError(error) {
        const message = String(error?.message || error || "Erreur inconnue")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
        return `
          <section class="panel">
            <h2>Affichage interrompu</h2>
            <p class="muted">Une erreur bloque le chargement de cet onglet. Rechargez la page, ou envoyez une requête avec le message ci-dessous si le problème revient.</p>
            <div class="warningItem">${message}</div>
          </section>`;
      }

      function applyPrerequisitesLockState() {
        const locked = week === "build" && (
          (constructionMode === "prerequisites" && prerequisiteLocked(prerequisiteMode))
          || (constructionMode === "yearPrerequisites" && yearPrerequisiteLocked(yearPrerequisiteMode))
        );
        if (!locked) return;
        const body = document.querySelector(".prerequisiteLockedBody");
        if (!body) return;
        body.querySelectorAll("input, select, textarea, button").forEach((control) => {
          control.disabled = true;
        });
      }

            ${cloudConfig.etabId && authInviteToken ? `<form class="authForm" id="acceptInviteForm"><button class="authButton" type="submit">Ajouter cet établissement</button></form>` : ""}
            ${!cloudConfig.etabId && !authInviteToken ? `<form class="authForm" id="createEtabForm"><input id="authEtabName" value="${escapeHtml(authEtabName)}" placeholder="Nom de l’établissement" aria-label="Nom de l’établissement" /><button class="authButton" type="submit">Creer l’établissement</button></form>` : ""}
            ${cloudConfig.etabId && !currentEtabRole ? `<div class="authStatus">Vérification du rôle en cours...</div>` : ""}
            ${cloudConfig.etabId && isAdmin() ? `<div class="authForm">${renderShareInviteControl()}</div>` : ""}

          authBox.querySelector("#logoutAdmin").innerHTML = "Déconnexion";

              <div class="homeBeforeAfter">
                <article class="homeComparisonCard">
