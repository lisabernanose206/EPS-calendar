      function constructionVersionLabel(version) {
        const date = version?.savedAt ? new Date(version.savedAt) : null;
        const dateLabel = date && !Number.isNaN(date.getTime())
          ? date.toLocaleString("fr-FR", { day: "2-digit", month: "2-digit", hour: "2-digit", minute: "2-digit" })
          : "";
        return [version?.name || "Version manuelle", dateLabel].filter(Boolean).join(" - ");
      }

      function constructionVersionPartOptions() {
        return [
          { id: "blocks", label: "Blocs profs/classes" },
          ...classicConstructionCycles().map((cycle, index) => ({ id: `cycle:${cycle.id}`, label: cycle.name || `Cycle ${index + 1}` }))
        ];
      }

      function normalizeConstructionVersionParts(parts) {
        const validIds = constructionVersionPartOptions().map((item) => item.id);
        if (!Array.isArray(parts) || !parts.length) return [...validIds];
        const normalized = parts.filter((part, index) => validIds.includes(part) && parts.indexOf(part) === index);
        return normalized.length ? normalized : [...validIds];
      }

      function constructionVersionPartsLabel(version) {
        const labels = new Map(constructionVersionPartOptions().map((item) => [item.id, item.label]));
        return normalizeConstructionVersionParts(version?.parts).map((part) => labels.get(part) || part.replace("cycle:", "Cycle ")).join(" + ");
      }

      function saveCurrentConstructionVersion(name = "", parts = constructionVersionPartOptions().map((item) => item.id)) {
        const savedAt = new Date().toISOString();
        const versionName = String(name || "").trim() || `Version ${constructionVersions.length + 1}`;
        const savedParts = normalizeConstructionVersionParts(parts);
        constructionVersions = [
          {
            id: `construction-version-${Date.now()}-${Math.random().toString(16).slice(2)}`,
            name: versionName,
            mode: constructionWorkspaceMode,
            parts: savedParts,
            savedAt,
            constructionRules: JSON.parse(JSON.stringify(constructionRules)),
            blockExclusions: JSON.parse(JSON.stringify(blockExclusions))
          },
          ...constructionVersions
        ].slice(0, 12);
        saveConstructionVersions();
      }

      function restoreConstructionVersion(versionId) {
        const version = constructionVersions.find((item) => item.id === versionId);
        if (!version) return false;
        const parts = normalizeConstructionVersionParts(version.parts);
        const cycleIds = parts.filter((part) => part.startsWith("cycle:")).map((part) => part.slice(6));
        const savedRules = Array.isArray(version.constructionRules) ? JSON.parse(JSON.stringify(version.constructionRules)) : [];
        const savedById = new Map(savedRules.map((rule) => [rule.id, rule]));
        if (parts.includes("blocks")) {
          const currentOverridesById = new Map(constructionRules.map((rule) => [rule.id, rule.cycleOverrides || {}]));
          constructionRules = savedRules.map((rule) => {
            const savedOverrides = rule.cycleOverrides || {};
            const mergedOverrides = { ...(currentOverridesById.get(rule.id) || {}) };
            cycleIds.forEach((cycleId) => {
              if (savedOverrides[cycleId]) mergedOverrides[cycleId] = JSON.parse(JSON.stringify(savedOverrides[cycleId]));
              else delete mergedOverrides[cycleId];
            });
            return { ...rule, cycleOverrides: mergedOverrides };
          });
          if (version.blockExclusions && typeof version.blockExclusions === "object") {
            blockExclusions = JSON.parse(JSON.stringify(version.blockExclusions));
            saveBlockExclusions();
          }
        } else if (cycleIds.length) {
          constructionRules = constructionRules.map((rule) => {
            const savedRule = savedById.get(rule.id);
            if (!savedRule) return rule;
            const savedOverrides = savedRule.cycleOverrides || {};
            const mergedOverrides = { ...(rule.cycleOverrides || {}) };
            cycleIds.forEach((cycleId) => {
              if (savedOverrides[cycleId]) mergedOverrides[cycleId] = JSON.parse(JSON.stringify(savedOverrides[cycleId]));
              else delete mergedOverrides[cycleId];
            });
            return { ...rule, cycleOverrides: mergedOverrides };
          });
        }
        rebuildConstructionPlan();
        return true;
      }

      function conflictBelongsToBuildMode(conflict, buildMode) {
        if (buildMode === "blocks") return ["teacher", "class", "asTeacher"].includes(conflict.type);
        if (buildMode === "cycleDetails") return conflict.type === "facility";
        return true;
      }

      function conflictsForBuildMode(buildMode = "") {
        if (!buildMode) return detectConflicts();
        return cachedConstructionCheck(`conflicts:${buildMode}`, () => detectConflicts().filter((conflict) => conflictBelongsToBuildMode(conflict, buildMode)));
      }

      function conflictMap(buildMode = "") {
        const cacheKey = buildMode ? `conflictMap:${buildMode}` : "conflictMap";
        return cachedConstructionCheck(cacheKey, () => new Set(conflictsForBuildMode(buildMode).map((conflict) => conflict.key)));
      }

      function builderCellKey(day, slotId) {
        return `${day}-${slotId}`;
      }

      function yearCellKey(rowId, weekRank) {
        return `${rowId}::${weekRank}`;
      }

      function parseYearCellKey(key) {
        const [rowId, weekRank] = key.split("::");
        return { rowId, weekRank: Number(weekRank) };
      }

      function teacherIdsForBlock(block) {
        const ids = Array.isArray(block.teacherIds) && block.teacherIds.length ? block.teacherIds : [block.teacherId].filter(Boolean);
        return ids.filter((id, index) => ids.indexOf(id) === index);
      }

      function teacherClassForBlock(block, teacherId) {
        if (teacherId && block?.teacherClasses?.[teacherId]) return block.teacherClasses[teacherId];
        const ids = teacherIdsForBlock(block);
        if (!teacherId || ids.length <= 1 || ids[0] === teacherId) return block?.schoolClass || "";
        return "";
      }

      function classesForBlock(block) {
        const classItems = teacherIdsForBlock(block)
          .map((teacherId) => teacherClassForBlock(block, teacherId))
          .filter(Boolean);
        if (block?.schoolClass) classItems.push(block.schoolClass);
        return classItems.filter((schoolClass, index) => classItems.indexOf(schoolClass) === index);
      }

      function blockClassLabel(block) {
        const classItems = classesForBlock(block);
        if (!classItems.length && block?.optionBlock) return block.optionLabel || block.activityLabel || "Option";
        if (!classItems.length) return block?.label || "Bloc";
        return classItems.map(compactClassName).join(" + ");
      }

      function blockDetailLabel(block) {
        const details = [block?.facilityLabel || block?.type || "", block?.activityLabel || ""]
          .filter((item) => item && item !== blockClassLabel(block));
        return details.join(" · ");
      }

      function teacherNamesForBlock(block) {
        return teacherIdsForBlock(block).map((id) => teachers.find((teacher) => teacher.id === id)?.name || id);
      }

      function teacherLabelForBlock(block) {
        return block.teacherNames || teacherNamesForBlock(block).join(" + ") || block.teacherName || "Prof";
      }

      function clampCourseHours(value, maxHours) {
        const max = Math.max(0.5, Number(maxHours) || 0.5);
        const hours = Number(value);
        if (!Number.isFinite(hours) || hours <= 0) return max;
        return Math.min(max, Math.max(0.25, hours));
      }

      function coTeacherHoursForBlock(block, teacherId, slotHours) {
        const ids = teacherIdsForBlock(block);
        if (!teacherId || ids.indexOf(teacherId) <= 0) return Number(slotHours) || 0;
        return Number(slotHours) || 0;
      }

      function teacherHoursForBlock(block, teacherId, slotHours) {
        const ids = teacherIdsForBlock(block);
        if (!ids.includes(teacherId)) return 0;
        return ids.indexOf(teacherId) === 0 ? Number(slotHours) || 0 : coTeacherHoursForBlock(block, teacherId, slotHours);
      }

      function effectiveTeacherHoursForBlock(block, teacherId, slotHours) {
        if (block?.optionBlock && block.optionId) {
          if (block.optionTeacherId && block.optionTeacherId !== teacherId) return 0;
          return normalizedOptionHours(block.optionId, block.optionHours, slotHours);
        }
        return teacherHoursForBlock(block, teacherId, slotHours);
      }

      function fullServiceSlotHours(rowOrSlot) {
        const slot = rowOrSlot?.slot || rowOrSlot || {};
        const rawHours = Number(slot.hours) || 0;
        if (rawHours <= 1.25) return 1;
        return 2;
      }

      function currentBlockSlotHours() {
        if (!activeBuildCell) return 2;
        const { rowId } = parseYearCellKey(activeBuildCell);
        return fullServiceSlotHours(yearRows().find((item) => item.id === rowId));
      }

      function secondaryTeacherLabel(block, slotHours) {
        const ids = teacherIdsForBlock(block);
        if (ids.length < 2) return "";
        const name = teachers.find((teacher) => teacher.id === ids[1])?.name || "2e prof";
        return `${name} : creneau complet`;
      }

      function blockTeacherStyle(block) {
        const blockTeachers = teacherIdsForBlock(block)
          .map((id) => teachers.find((teacher) => teacher.id === id))
          .filter(Boolean);
        if (blockTeachers.length >= 2) {
          const first = blockTeachers[0];
          const second = blockTeachers[1];
          return `background:linear-gradient(90deg, ${first.color} 0 50%, ${second.color} 50% 100%);border-color:${first.border}`;
        }
        return `background:${block.color};border-color:${block.border}`;
      }

      function transparentTeacherColor(color, alpha = 0.34) {
        const raw = (color || "#ffffff").replace("#", "");
        const normalized = raw.length === 3 ? raw.split("").map((char) => char + char).join("") : raw.padEnd(6, "f").slice(0, 6);
        const value = parseInt(normalized, 16);
        if (!Number.isFinite(value)) return `rgba(255,255,255,${alpha})`;
        return `rgba(${(value >> 16) & 255},${(value >> 8) & 255},${value & 255},${alpha})`;
      }

      function availableTeacherIdsForConstructionCell(row, weekItem, key, cycle = null, weekLetter = "all") {
        if (!row || !weekItem || row.isAs) return [];
        const busyTeacherIds = new Set();
        const weekItems = cycle
          ? weeksForCycle(cycle).filter((item) => weekLetter === "all" || item.letter === weekLetter)
          : [weekItem];
        weekItems.forEach((item) => {
          const itemKey = yearCellKey(row.id, item.rank);
          (constructionPlan[itemKey] || []).forEach((block) => {
            teacherIdsForBlock(block).forEach((teacherId) => busyTeacherIds.add(teacherId));
          });
          unavailableTeachersForCell(row, item).forEach((teacherId) => busyTeacherIds.add(teacherId));
        });
        return teachers
          .filter((teacher) => !busyTeacherIds.has(teacher.id))
          .map((teacher) => teacher.id);
      }

      function availableTeacherCellStyle(row, weekItem, key, blocked, cycle = null, weekLetter = "all") {
        if (blocked) return "";
        const availableTeachers = availableTeacherIdsForConstructionCell(row, weekItem, key, cycle, weekLetter)
          .map((teacherId) => teachers.find((teacher) => teacher.id === teacherId))
          .filter(Boolean);
        if (!availableTeachers.length) return "";
        const step = 100 / availableTeachers.length;
        const stops = availableTeachers.flatMap((teacher, index) => {
          const start = (index * step).toFixed(2);
          const end = ((index + 1) * step).toFixed(2);
          const color = transparentTeacherColor(teacher.color);
          return [`${color} ${start}%`, `${color} ${end}%`];
        });
        if (availableTeachers.length === 1) {
          return `--available-teacher-bg:linear-gradient(90deg, ${stops.join(", ")});`;
        }
        const boundaries = availableTeachers.slice(1).map((_, index) => (((index + 1) * step).toFixed(2)));
        const dots = boundaries.map(() => "repeating-linear-gradient(to bottom, rgba(15,23,42,0.52) 0 2px, transparent 2px 6px)");
        return [
          `--available-teacher-bg:linear-gradient(90deg, ${stops.join(", ")});`,
          `--available-teacher-dots:${dots.join(", ")};`,
          `--available-teacher-dot-positions:${boundaries.map((boundary) => `${boundary}% 0`).join(", ")};`,
          `--available-teacher-dot-repeats:${boundaries.map(() => "repeat-y").join(", ")};`,
          `--available-teacher-dot-sizes:${boundaries.map(() => "2px 6px").join(", ")};`
        ].join("");
      }

      function availableTeacherCellTitle(row, weekItem, key, cycle = null, weekLetter = "all") {
        const names = availableTeacherIdsForConstructionCell(row, weekItem, key, cycle, weekLetter)
          .map((teacherId) => teachers.find((teacher) => teacher.id === teacherId)?.name)
          .filter(Boolean);
        return names.length ? `Profs disponibles : ${names.join(", ")}` : "Aucun prof disponible";
      }

      function blockAllowsSharedFacility(block) {
        return Boolean(block?.coIntervention);
      }

      function blocksCanShareFacility(first, second) {
        if (!first?.facilityId || first.facilityId !== second?.facilityId) return false;
        if (!blockAllowsSharedFacility(first) && !blockAllowsSharedFacility(second)) return false;
        const sharedTeacher = teacherIdsForBlock(first).some((teacherId) => teacherIdsForBlock(second).includes(teacherId));
        if (sharedTeacher) return false;
        if (classesForBlock(first).some((firstClass) => classesForBlock(second).some((secondClass) => classesOverlap(firstClass, secondClass)))) return false;
        return true;
      }

      function teacherBorderForColor(color) {
        return teacherPalette.find((item) => item.color === color)?.border || shadeColor(color, -80);
      }

      function renderTeacherLegend(className = "") {
        const allSelected = allTeachersSelected();
        return `<div class="teacherColorLegend ${className}">
          <button class="legendItem ${allSelected ? "selected" : ""}" data-teacher="all" style="background:#d6b98c;border-color:#a6783e;color:#172033;">Tous</button>
          ${teachers.map((teacher) => {
            const selected = selectedTeacherIds.includes(teacher.id);
            return `<button class="legendItem ${selected && !allSelected ? "selected" : ""} ${!selected ? "dimmed" : ""}" data-teacher="${teacher.id}" style="background:${teacher.color};border-color:${teacher.border}">${teacher.name}</button>`;
          }).join("")}
        </div>`;
      }

      function availableTeacherPalette(currentTeacherId = "") {
        const usedColors = new Set(teachers.filter((teacher) => teacher.id !== currentTeacherId).map((teacher) => teacher.color));
        return teacherPalette.filter((item) => !usedColors.has(item.color));
      }

      function firstAvailableTeacherColor(currentTeacherId = "") {
        return availableTeacherPalette(currentTeacherId)[0]?.color || "";
      }

      function syncConstructionRulesForTeacher(teacherId) {
        constructionRules = constructionRules.map((rule) => {
          const ids = teacherIdsForBlock(rule.block);
          if (!ids.includes(teacherId)) return rule;
          const primaryTeacher = teachers.find((teacher) => teacher.id === ids[0]);
          return {
            ...rule,
            block: {
              ...rule.block,
              color: primaryTeacher?.color || rule.block.color,
              border: primaryTeacher?.border || rule.block.border,
              teacherName: primaryTeacher?.name || rule.block.teacherName,
              teacherNames: teacherNamesForBlock({ ...rule.block, teacherIds: ids }).join(" + ")
            }
          };
        });
      }

      function blockConflictMessageForItems(items, candidate) {
        const facilityConflict = items.find((item) => item.facilityId && candidate.facilityId && item.facilityId === candidate.facilityId && !blocksCanShareFacility(item, candidate));
        if (facilityConflict) return `Installation deja occupee : ${candidate.facilityLabel}.`;
        const teacherConflict = items.find((item) => teacherIdsForBlock(item).some((teacherId) =>
          teacherIdsForBlock(candidate).includes(teacherId)
          && teacherClassForBlock(item, teacherId) !== teacherClassForBlock(candidate, teacherId)
        ));
        if (teacherConflict) return `Professeur deja pris avec ${blockClassLabel(teacherConflict) || "une autre classe"}.`;
        const classConflict = items.find((item) => classesForBlock(item).some((itemClass) => classesForBlock(candidate).some((candidateClass) => classesOverlap(itemClass, candidateClass))));
        if (classConflict) return `Classe deja prise : ${blockClassLabel(candidate)}.`;
        return "";
      }

      function blockCycleConflictMessage(rowId, cycleId, candidate, ignoredRuleId = "", weekLetter = "all") {
        const cycle = cyclesForClassLevel(classParts(candidate.schoolClass).level).find((item) => item.id === cycleId) || cycles.find((item) => item.id === cycleId);
        if (!cycle) return "";
        for (const weekItem of weeksForCycle(cycle)) {
          if (weekLetter !== "all" && weekItem.letter !== weekLetter) continue;
          const key = yearCellKey(rowId, weekItem.rank);
          const items = (constructionPlan[key] || []).filter((item) => !ignoredRuleId || item.ruleId !== ignoredRuleId);
          const message = blockConflictMessageForItems(items, candidate);
          if (message) return `${message} Conflit sur la semaine ${weekItem.rank}${weekItem.letter}.`;
        }
        return "";
      }

      function blockCycleUnavailableMessage(rowId, cycleId, candidate, weekLetter = "all") {
        const cycle = cyclesForClassLevel(classParts(candidate.schoolClass).level).find((item) => item.id === cycleId) || cycles.find((item) => item.id === cycleId);
        const row = yearRows().find((item) => item.id === rowId);
        if (!cycle || !row) return "";
        for (const weekItem of weeksForCycle(cycle)) {
          if (weekLetter !== "all" && weekItem.letter !== weekLetter) continue;
          const message = blockUnavailableMessage(row, weekItem, candidate);
          if (message) return `${message} Bloc impossible sur la semaine ${weekItem.rank}${weekItem.letter}.`;
        }
        return "";
      }

      function allTeachersSelected() {
        return selectedTeacherIds.length === teachers.length;
      }

      function teacherSelectionMatches(ids) {
        return selectedTeacherIds.length > 0 && (allTeachersSelected() || ids.some((id) => selectedTeacherIds.includes(id)));
      }

      function blockMatchesTeacherSelection(block) {
        return teacherSelectionMatches(teacherIdsForBlock(block));
      }

      function eventMatchesTeacherSelection(event) {
        return teacherSelectionMatches(event.teacherIds || []);
      }

      function asMatchesTeacherSelection(session) {
        return teacherSelectionMatches(session.teacherIds || []);
      }

      function serviceRowsForTeacher(teacherId) {
        return Array.isArray(serviceAssignments[teacherId]) ? serviceAssignments[teacherId] : [];
      }

      function serviceClassRowsForTeacher(teacherId) {
        return serviceRowsForTeacher(teacherId).filter((row) => row.classId);
      }

      function serviceFreeRowsForTeacher(teacherId) {
        return serviceRowsForTeacher(teacherId).filter((row) => row.freeService);
      }

      function serviceTotalForTeacher(teacherId) {
        return serviceRowsForTeacher(teacherId).reduce((sum, row) => sum + (Number(row.hours) || 0), 0);
      }

      function serviceTargetForTeacher(teacher) {
        return Math.max(Number(teacher?.weeklyReference) || 0, serviceTotalForTeacher(teacher?.id));
      }

      function serviceFreeActivityId(label) {
        const base = String(label || "")
          .toLowerCase()
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "")
          .replace(/[^a-z0-9]+/g, "-")
          .replace(/^-|-$/g, "") || "service-libre";
        return `service-free::${base}`;
      }

      function serviceFreeActivities() {
        const seen = new Set();
        return Object.values(serviceAssignments)
          .flatMap((rows) => Array.isArray(rows) ? rows : [])
          .filter((row) => row.freeService && String(row.label || "").trim())
          .map((row) => {
            const label = String(row.label || "").trim();
            return { id: serviceFreeActivityId(label), label, freeService: true };
          })
          .filter((activity) => {
            const key = activity.id;
            if (seen.has(key)) return false;
            seen.add(key);
            return true;
          });
      }

      function serviceFreeActivityById(activityId) {
        return serviceFreeActivities().find((activity) => activity.id === activityId) || null;
      }

      function constructionActivityById(activityId) {
        return activities.find((activity) => activity.id === activityId) || serviceFreeActivityById(activityId);
      }

      function serviceFreeOptionId(teacherId, rowId) {
        return `service-option::${teacherId}::${rowId}`;
      }

      function serviceFreeOptionsForTeachers(teacherIds = []) {
        return teacherIds.flatMap((teacherId) => serviceFreeRowsForTeacher(teacherId).map((row) => ({
          id: serviceFreeOptionId(teacherId, row.id),
          teacherId,
          rowId: row.id,
          label: row.label,
          hours: Number(row.hours) || 0,
          teacherName: teachers.find((teacher) => teacher.id === teacherId)?.name || teacherId
        })));
      }

      function serviceFreeOptionById(optionId) {
        return serviceFreeOptionsForTeachers(teachers.map((teacher) => teacher.id)).find((option) => option.id === optionId) || null;
      }

      function optionBlockAvailableForTeachers(teacherIds = blockTeacherIds) {
        return teacherIds.length > 0 && teacherIds.every((teacherId) => serviceFreeRowsForTeacher(teacherId).length > 0);
      }

      function optionBlockUnavailableReason(teacherIds = blockTeacherIds) {
        if (!teacherIds.length) return "Selectionnez d'abord un professeur pour voir ses options.";
        const missingTeachers = teacherIds
          .filter((teacherId) => !serviceFreeRowsForTeacher(teacherId).length)
          .map((teacherId) => teachers.find((teacher) => teacher.id === teacherId)?.name || teacherId);
        if (missingTeachers.length) return `${missingTeachers.join(" + ")} n'a pas d'option renseignee dans le service theorique.`;
        return "Option disponible.";
      }

      function optionDurationMax(optionId, slotHours = currentBlockSlotHours()) {
        const option = serviceFreeOptionById(optionId);
        if (!option) return 0;
        return Number(option.hours) || 0;
      }

      function normalizedOptionHours(optionId, value, slotHours = currentBlockSlotHours()) {
        const fallback = optionDurationMax(optionId, slotHours);
        const hours = Number(value);
        if (!Number.isFinite(hours) || hours <= 0) return fallback || 0;
        return Math.max(0.25, hours);
      }

      function serviceAssignmentFor(teacherId, schoolClass) {
        return serviceClassRowsForTeacher(teacherId).find((item) => item.classId === schoolClass);
      }

      function serviceClassTarget(schoolClass) {
        const parts = classParts(schoolClass);
        if (parts.special) return specialClassHoursForSchoolClass(schoolClass);
        const level = parts.level;
        const legalTarget = Number(defaultServiceHours[level] ?? 0);
        const configuredTarget = Number(serviceHoursByLevel[level] ?? legalTarget);
        return legalTarget ? Math.min(configuredTarget, legalTarget) : configuredTarget;
      }

      function selectedServiceLevelForTeacher(teacherId) {
        return classLevels.includes(serviceLevelByTeacher[teacherId]) ? serviceLevelByTeacher[teacherId] : "";
      }

      function selectedServiceClassForTeacher(teacherId) {
        return classes.includes(serviceClassByTeacher[teacherId]) ? serviceClassByTeacher[teacherId] : "";
      }

      function serviceDraftKey(teacherId, schoolClass) {
        return `${teacherId}::${schoolClass}`;
      }

      function serviceDraftValue(teacherId, schoolClass) {
        const key = serviceDraftKey(teacherId, schoolClass);
        if (serviceDraftHours[key] !== undefined) return serviceDraftHours[key];
        const assignment = serviceAssignmentFor(teacherId, schoolClass);
        if (assignment) return assignment.hours;
        const maxHours = serviceMaxAssignableHours(teacherId, schoolClass);
        return maxHours > 0 ? maxHours : "";
      }

      function serviceClassTotals() {
        const totals = Object.fromEntries(classes.map((schoolClass) => [schoolClass, 0]));
        Object.values(serviceAssignments).forEach((rows) => {
          if (!Array.isArray(rows)) return;
          rows.forEach((row) => {
            if (!classes.includes(row.classId)) return;
            totals[row.classId] += Number(row.hours) || 0;
          });
        });
        return totals;
      }

      function serviceClassAssignedTotal(schoolClass, exceptTeacherId = "") {
        return Object.entries(serviceAssignments).reduce((sum, [teacherId, rows]) => {
          if (teacherId === exceptTeacherId || !Array.isArray(rows)) return sum;
          return sum + rows
            .filter((row) => row.classId === schoolClass)
            .reduce((rowSum, row) => rowSum + (Number(row.hours) || 0), 0);
        }, 0);
      }

      function serviceMaxAssignableHours(teacherId, schoolClass) {
        const target = serviceClassTarget(schoolClass);
        const assignedElsewhere = serviceClassAssignedTotal(schoolClass, teacherId);
        return Math.max(0, Math.round((target - assignedElsewhere) * 10) / 10);
      }

      function serviceClassHoursValid(teacherId, schoolClass, hours) {
        const value = Number(hours) || 0;
        return value > 0 && value <= serviceMaxAssignableHours(teacherId, schoolClass);
      }

      function serviceFreeDraftForTeacher(teacherId) {
        return serviceFreeDrafts[teacherId] || { label: "", hours: "" };
      }

      function syncServiceFreeDraft(teacherId) {
        const labelInput = document.querySelector(`[data-service-free-label="${teacherId}"]`);
        const hoursInput = document.querySelector(`[data-service-free-hours="${teacherId}"]`);
        const validateButton = document.querySelector(`[data-service-free-validate="${teacherId}"]`);
        const draft = {
          label: labelInput?.value || "",
          hours: hoursInput?.value || ""
        };
        serviceFreeDrafts = { ...serviceFreeDrafts, [teacherId]: draft };
        if (validateButton) validateButton.disabled = !(draft.label.trim() && Number(draft.hours) > 0);
      }

      function setServiceFreeAssignment(teacherId, label, hours) {
        const value = Math.max(0, Number(hours) || 0);
        const cleanLabel = label.trim();
        if (!cleanLabel || value <= 0) return false;
        const currentRows = serviceRowsForTeacher(teacherId);
        const row = {
          id: `free-${Date.now()}-${Math.random().toString(16).slice(2)}`,
          freeService: true,
          label: cleanLabel,
          hours: value
        };
        serviceAssignments = { ...serviceAssignments, [teacherId]: [...currentRows, row] };
        saveServiceAssignments(true);
        showValidationPopup("Service libre validé");
        return true;
      }

      function removeServiceFreeAssignment(teacherId, rowId) {
        const currentRows = serviceRowsForTeacher(teacherId).filter((row) => row.id !== rowId);
        serviceAssignments = { ...serviceAssignments, [teacherId]: currentRows };
        saveServiceAssignments(true);
      }

      function serviceAlerts() {
        const totals = serviceClassTotals();
        return classes
          .map((schoolClass) => ({ schoolClass, total: totals[schoolClass], target: serviceClassTarget(schoolClass) }))
          .filter((item) => item.total > item.target);
      }

      function setServiceAssignment(teacherId, schoolClass, hours) {
        const existing = serviceAssignmentFor(teacherId, schoolClass);
        const currentRows = serviceRowsForTeacher(teacherId).filter((row) => row.classId !== schoolClass);
        const value = Math.max(0, Number(hours) || 0);
        const maxHours = serviceMaxAssignableHours(teacherId, schoolClass);
        if (value > maxHours) {
          showValidationPopup(`Maximum autorise : ${maxHours}h`);
          return false;
        }
        if (value > 0) currentRows.push({ classId: schoolClass, hours: value });
        serviceAssignments = { ...serviceAssignments, [teacherId]: currentRows };
        saveServiceAssignments(true);
        const saved = true;
        if (value > 0) showValidationPopup("Service théorique validé");
        else if (existing) showValidationPopup("Service théorique supprimé");
        return saved;
      }

      function removeServiceAssignment(teacherId, schoolClass) {
        const currentRows = serviceRowsForTeacher(teacherId).filter((row) => row.classId !== schoolClass);
        serviceAssignments = { ...serviceAssignments, [teacherId]: currentRows };
        if (serviceClassByTeacher[teacherId] === schoolClass) serviceClassByTeacher = { ...serviceClassByTeacher, [teacherId]: "" };
        saveServiceAssignments(true);
      }

      function serviceAllowsClassForTeacher(teacherId, schoolClass) {
        const rows = serviceRowsForTeacher(teacherId);
        if (!rows.length) return true;
        return rows.some((row) => classesOverlap(row.classId, schoolClass));
      }

      function serviceAllowsClassForTeachers(teacherIds, schoolClass) {
        if (!teacherIds.length || !schoolClass) return true;
        return teacherIds.every((teacherId) => serviceAllowsClassForTeacher(teacherId, schoolClass));
      }

      function serviceClassRestrictionMessage(teacherIds, schoolClass) {
        const restrictedTeachers = teacherIds
          .filter((teacherId) => !serviceAllowsClassForTeacher(teacherId, schoolClass))
          .map((teacherId) => teachers.find((teacher) => teacher.id === teacherId)?.name || teacherId);
        return restrictedTeachers.length ? `${schoolClass} n'est pas affectee a ${restrictedTeachers.join(", ")} dans le service theorique.` : "";
      }

      function buildModalAvailability() {
        const occupied = { teacherIds: new Set(), facilityIds: new Set(), classes: new Set() };
        (constructionPlan[activeBuildCell] || []).forEach((item) => {
          if (editingBuildBlock?.ruleId && item.ruleId === editingBuildBlock.ruleId) return;
          teacherIdsForBlock(item).forEach((teacherId) => occupied.teacherIds.add(teacherId));
          if (item.facilityId) occupied.facilityIds.add(item.facilityId);
          if (item.schoolClass) occupied.classes.add(item.schoolClass);
        });
        const { rowId, weekRank } = parseYearCellKey(activeBuildCell);
        const row = yearRows().find((item) => item.id === rowId);
        const weekItem = schoolYearWeeks().find((item) => item.rank === weekRank);
        occupied.unavailableFacilityIds = row && weekItem ? unavailableFacilitiesForCell(row, weekItem) : new Set();
        occupied.unavailableClasses = row && weekItem ? unavailableClassesForCell(row, weekItem) : new Set();
        occupied.unavailableTeacherIds = row && weekItem ? unavailableTeachersForCell(row, weekItem) : new Set();
        return occupied;
      }

      function allowedActivityIdsForFacility(facilityId) {
        if (!facilityId) return activities.map((activity) => activity.id);
        return Array.isArray(facilityActivities[facilityId]) ? facilityActivities[facilityId] : [];
      }

      function activitiesForFacility(facilityId) {
        return allowedActivityIdsForFacility(facilityId)
          .map((activityId) => activities.find((activity) => activity.id === activityId))
          .filter(Boolean);
      }

      function activityAllowedForFacility(facilityId, activityId) {
        if (!activityId) return true;
        if (serviceFreeActivityById(activityId)) return true;
        return allowedActivityIdsForFacility(facilityId).includes(activityId);
      }

      function currentBlock() {
        const selectedTeachers = blockTeacherIds
          .map((id) => teachers.find((item) => item.id === id))
          .filter(Boolean);
        const primaryTeacher = selectedTeachers[0];
        const facility = facilities.find((item) => item.id === blockFacilityId);
        const option = blockIsOption && blockOptionId ? serviceFreeOptionById(blockOptionId) : null;
        const optionHours = option ? normalizedOptionHours(option.id, blockOptionHours) : 0;
        const optionCycleIds = blockIsOption ? normalizedOptionCycleIds() : [];
        const activity = activityAllowedForFacility(blockFacilityId, blockActivityId)
          ? constructionActivityById(blockActivityId)
          : null;
        const selectedTeacherClasses = Object.fromEntries(selectedTeachers
          .map((teacher) => [teacher.id, blockTeacherClasses[teacher.id] || ""])
          .filter(([, schoolClass]) => schoolClass));
        const primaryClass = selectedTeachers.map((teacher) => selectedTeacherClasses[teacher.id]).find(Boolean) || blockClass;
        return {
          teacherIds: selectedTeachers.map((teacher) => teacher.id),
          teacherNames: selectedTeachers.map((teacher) => teacher.name).join(" + "),
          teacherId: primaryTeacher?.id || "",
          teacherName: primaryTeacher?.name || "",
          coTeacherHours: {},
          color: primaryTeacher?.color || "#f8fafc",
          border: primaryTeacher?.border || "#cbd5e1",
          schoolClass: primaryClass,
          teacherClasses: selectedTeacherClasses,
          facilityId: facility?.id || "",
          facilityLabel: facility?.label || "",
          activityId: activity?.id || (option ? serviceFreeActivityId(option.label) : ""),
          activityLabel: activity?.label || option?.label || "",
          optionBlock: blockIsOption,
          optionId: option?.id || "",
          optionTeacherId: option?.teacherId || "",
          optionRowId: option?.rowId || "",
          optionLabel: option?.label || "",
          optionHours,
          optionCycleIds,
          coIntervention: blockCoIntervention
        };
      }

      function classParts(schoolClass) {
        if (!schoolClass) return { level: blockClassLevel || "", number: "", group: "whole" };
        if (String(schoolClass).startsWith("special::")) {
          const item = specialClassFromSchoolId(schoolClass);
          const id = specialClassTypeIdFromSchoolId(schoolClass);
          const baseClassId = specialClassBaseIdFromSchoolId(schoolClass);
          return { level: "special", number: specialClassSchoolId(id, baseClassId), group: "whole", special: true, specialId: id, baseClassId, label: item?.label || id };
        }
        const [level, number, group = "whole"] = schoolClass.split(" ");
        return {
          level: classLevels.includes(level) ? level : "",
          number: classNumbersForLevel(level).includes(number) ? number : "",
          group: classGroups.some((item) => item.id === group) ? group : "whole"
        };
      }

      function schoolClassLabel(level, number, group = "whole") {
        return group === "whole" ? `${level} ${number}` : `${level} ${number} ${group}`;
      }

      function classesOverlap(firstClass, secondClass) {
        const first = classParts(firstClass);
        const second = classParts(secondClass);
        if (first.special || second.special) return Boolean(first.special && second.special && first.number === second.number);
        if (!first.level || !second.level || first.level !== second.level || first.number !== second.number) return false;
        return first.group === "whole" || second.group === "whole" || first.group === second.group;
      }

      function classSameBase(firstClass, secondClass) {
        const first = classParts(firstClass);
        const second = classParts(secondClass);
        if (first.special || second.special) return Boolean(first.special && second.special && first.number === second.number);
        return Boolean(first.level && second.level && first.level === second.level && first.number === second.number);
      }

      function toggleExclusiveClassSelection(selectedClasses, schoolClass) {
        if (selectedClasses.includes(schoolClass)) return selectedClasses.filter((item) => item !== schoolClass);
        return [...selectedClasses.filter((item) => !classSameBase(item, schoolClass)), schoolClass];
      }

      function classBelongsToLevel(schoolClass, level) {
        return classParts(schoolClass).level === level;
      }

      function toggleWholeLevelSelection(selectedClasses, level) {
        const levelClasses = classesForLevel(level);
        const allWholeClassesSelected = levelClasses.every((schoolClass) => selectedClasses.includes(schoolClass));
        const outsideLevel = selectedClasses.filter((schoolClass) => !classBelongsToLevel(schoolClass, level));
        return allWholeClassesSelected ? outsideLevel : [...outsideLevel, ...levelClasses];
      }

      function classCollectionHasOverlap(classItems, schoolClass) {
        return [...classItems].some((item) => classesOverlap(item, schoolClass));
      }

      function updateBlockClass(part, value) {
        const current = classParts(blockClass);
        if (part === "level") {
          blockClassLevel = value;
          blockClass = "";
          return;
        }
        const nextLevel = current.level || blockClassLevel;
        const nextNumber = part === "number" ? value : current.number;
        const nextGroup = part === "group" ? value : current.group;
        if (!nextLevel || !nextNumber) return;
        blockClass = schoolClassLabel(nextLevel, nextNumber, nextGroup);
      }

      function syncPrimaryBlockClassFromTeacherClasses() {
        blockClass = blockTeacherIds.map((teacherId) => blockTeacherClasses[teacherId]).find(Boolean) || "";
        blockClassLevel = blockClass ? classParts(blockClass).level : "";
      }

      function updateBlockTeacherClass(teacherId, part, value) {
        const current = classParts(blockTeacherClasses[teacherId] || "");
        if (part === "level") {
          blockTeacherClassLevels = { ...blockTeacherClassLevels, [teacherId]: value };
          blockTeacherClasses = { ...blockTeacherClasses, [teacherId]: "" };
          syncPrimaryBlockClassFromTeacherClasses();
          return;
        }
        const nextLevel = current.level || blockTeacherClassLevels[teacherId] || "";
        const nextNumber = part === "number" ? value : current.number;
        const nextGroup = part === "group" ? value : current.group;
        if (!nextLevel || !nextNumber) return;
        blockTeacherClasses = { ...blockTeacherClasses, [teacherId]: schoolClassLabel(nextLevel, nextNumber, nextGroup) };
        syncPrimaryBlockClassFromTeacherClasses();
      }

      function setBlockTeacherClass(teacherId, schoolClass) {
        blockTeacherClasses = { ...blockTeacherClasses, [teacherId]: schoolClass };
        const baseClassId = specialClassBaseIdFromSchoolId(schoolClass);
        const displayLevel = classParts(baseClassId || schoolClass).level;
        blockTeacherClassLevels = { ...blockTeacherClassLevels, [teacherId]: displayLevel };
        syncPrimaryBlockClassFromTeacherClasses();
      }

      function updateSpecialBlockClass(id) {
        blockClassLevel = "special";
        blockClass = id.startsWith("special::") ? id : specialClassSchoolId(id);
      }

      function toggleUnavailableClass(schoolClass) {
        unavailableClassIds = toggleExclusiveClassSelection(unavailableClassIds, schoolClass);
      }

      function toggleUnavailableTeacher(teacherId) {
        unavailableTeacherIds = unavailableTeacherIds.includes(teacherId)
          ? unavailableTeacherIds.filter((item) => item !== teacherId)

      function selectedUnavailableClassNumbers() {
        return classNumbersForLevel(unavailableClassLevelFilter).filter((number) => unavailableClassIds.includes(`${unavailableClassLevelFilter} ${number}`));
      }

      function unavailableCellSelected(day, slotId) {
        return unavailableCells.some((cell) => cell.day === day && cell.slotId === slotId);
      }

      function toggleUnavailableGridCell(day, slotId) {
        if (unavailableCellSelected(day, slotId)) {
          unavailableCells = unavailableCells.filter((cell) => !(cell.day === day && cell.slotId === slotId));
        } else {
          unavailableCells = [...unavailableCells, { day, slotId }];
        }
        unavailableWeekdays = [...new Set(unavailableCells.map((cell) => cell.day))];
        unavailableSlotIds = [...new Set(unavailableCells.map((cell) => cell.slotId))];

                ${asItems.map((session) => `<div class="lesson asBlock" style="${asSessionStyle(session)}"><strong>${asBlockLabel(session)}</strong><span>${asSessionTeacherLabel(session)}</span></div>`).join("")}

      function renderFacilitiesCalendar(cycle) {
        const weekItem = displayedSchoolWeek();

        return `<div class="facilityScheduleWrap">

            <thead>
              <tr><th class="slotName">Créneau</th><th class="facilityName">Installation</th>${days.map((day) => `<th>${day}</th>`).join("")}</tr>
            </thead>
            <tbody>${slots.map((slot) => facilities.map((facility, facilityIndex) => `
              <tr>
                ${facilityIndex === 0 ? `<th class="slotName" rowspan="${facilities.length}">${slot.label}</th>` : ""}
                <th class="facilityName">${facility.label}</th>
                ${days.map((day) => {
                    const row = rows.find((item) => item.day === day && item.slot.id === slot.id);
                    const key = row ? yearCellKey(row.id, weekItem.rank) : "";
                    const facilityLessons = row ? (constructionPlan[key] || []).filter((item) => item.facilityId === facility.id) : [];
                    const unavailableItems = row ? unavailableForCell(row, weekItem).filter((item) => unavailableCoversFacility(item, facility.id)) : [];
                    const isBusy = facilityLessons.length > 0;
                    const isUnavailable = unavailableItems.length > 0;
                    return `<td><div class="facilityCell ${isBusy ? "occupied" : isUnavailable ? "unavailable" : "free"}">
                      <strong>${isBusy ? "Occupée" : isUnavailable ? "Indisponible" : row ? "Libre" : "Pas de cours"}</strong>
                      ${isBusy ? `<span>${facilityLessons.map((lesson) => `${teacherLabelForBlock(lesson)} · ${blockClassLabel(lesson)}`).join(" / ")}</span>` : ""}
                      ${!isBusy && isUnavailable ? `<span>${unavailableItems.map((item) => item.name || "Contrainte").join(" / ")}</span>` : ""}

      function cycleWeeksByLetter(cycle, letter) {
        return weeksForCycle(cycle).filter((weekItem) => weekItem.letter === letter);
      }

      function blocksForCycleLetter(row, cycle, letter, facilityId = "") {
        const seen = new Set();
        return cycleWeeksByLetter(cycle, letter).flatMap((weekItem) => {
          const key = yearCellKey(row.id, weekItem.rank);
          return (constructionPlan[key] || []).filter((block) => !facilityId || block.facilityId === facilityId);
        }).filter((block) => {
          const signature = block.ruleId || `${teacherIdsForBlock(block).join("+")}|${block.schoolClass}|${block.facilityId}`;
          if (seen.has(signature)) return false;
          seen.add(signature);
          return true;
        });
      }

      function unavailableForCycleLetter(row, cycle, letter, facilityId = "") {
        const seen = new Set();
        return cycleWeeksByLetter(cycle, letter).flatMap((weekItem) => unavailableForCell(row, weekItem)).filter((item) => {
          if (facilityId && !unavailableCoversFacility(item, facilityId)) return false;
          if (!facilityId && !(item.facilityIds || []).length) return false;
          const signature = item.id || `${item.type}|${(item.facilityIds || []).join("+")}|${(item.classIds || []).join("+")}`;
          if (seen.has(signature)) return false;
          seen.add(signature);
          return true;
        });
      }

      function renderCycleLetterCell(row, cycle, letter, facilityId = "") {
        const items = blocksForCycleLetter(row, cycle, letter, facilityId);

      function constructionReadinessItems() {
        const items = [];
        const cycleErrors = validateCycles(cycles);
        const hasServiceAssignments = teachers.some((teacher) => serviceRowsForTeacher(teacher.id).length > 0);
        if (!adminStepComplete("establishment")) items.push({ level: "blocking", title: "Creneaux a completer", detail: "Renseignez les creneaux de cours et les horaires d'AS dans Etablissement.", buildMode: "prerequisites", subMode: "establishment" });
        if (!teachers.length) items.push({ level: "blocking", title: "Aucun professeur", detail: "Ajoutez au moins un professeur avant de construire des cours.", buildMode: "prerequisites", subMode: "team" });
        if (!classes.length) items.push({ level: "blocking", title: "Aucune classe", detail: "Ajoutez au moins une classe dans l'onglet Classes.", buildMode: "prerequisites", subMode: "classes" });
        if (!facilities.length) items.push({ level: "blocking", title: "Aucune installation", detail: "Ajoutez au moins une installation pour pouvoir placer un cours.", buildMode: "prerequisites", subMode: "facilitiesActivities" });
        if (!activities.length) items.push({ level: "blocking", title: "Aucune activite", detail: "Ajoutez au moins une activite et reliez-la aux installations possibles.", buildMode: "prerequisites", subMode: "facilitiesActivities" });
        if (!adminStepComplete("program")) items.push({ level: "blocking", title: "Programme incomplet", detail: "Affectez les activites attendues pour chaque niveau dans Programme.", buildMode: "prerequisites", subMode: "program" });
        if (!cycles.length) items.push({ level: "blocking", title: "Aucun cycle", detail: "Definissez les cycles pour relier chaque cours a une periode.", buildMode: "yearPrerequisites", subMode: "cycles" });
        if (cycleErrors.length) items.push({ level: "blocking", title: "Cycles a corriger", detail: cycleErrors[0], buildMode: "yearPrerequisites", subMode: "cycles" });
        if (!hasServiceAssignments) items.push({ level: "warning", title: "Service theorique non renseigne", detail: "Affectez les classes aux profs dans Service pour limiter les choix de classes en Construction.", buildMode: "yearPrerequisites", subMode: "hours" });
        if (!facilityUnavailability.length) items.push({ level: "warning", title: "Aucune indisponibilite", detail: "Renseignez les contraintes profs, classes ou installations si elles existent.", buildMode: "yearPrerequisites", subMode: "unavailable" });
        if (!asSessions.length) items.push({ level: "warning", title: "Aucune AS", detail: "Ajoutez les AS si elles doivent apparaitre dans le planning.", buildMode: "yearPrerequisites", subMode: "as" });
        if (!sportEvents.length) items.push({ level: "warning", title: "Aucun evenement sportif", detail: "Ajoutez les evenements sportifs connus pour reserver les creneaux concernes.", buildMode: "yearPrerequisites", subMode: "events" });

      function constructionBlockingItems() {
        return constructionReadinessItems().filter((item) => item.level === "blocking");
      }

      function canAccessConstructionPlanning() {
        return adminStepComplete("establishment")
          && teachers.length > 0
          && classes.length > 0
          && facilities.length > 0
          && activities.length > 0
          && cycles.length > 0
          && !validateCycles(cycles).length;
      }

      function constructionTrimesterSections(weeks) {
        const sections = [
          { title: "Trimestre 1", detail: "septembre - decembre", months: [8, 9, 10, 11] },
          { title: "Trimestre 2", detail: "janvier - mars", months: [0, 1, 2] },
          { title: "Trimestre 3", detail: "avril - juillet", months: [3, 4, 5, 6] }
        ];
        return sections.map((section) => ({
          ...section,
          weeks: weeks.filter((weekItem) => section.months.includes(weekDisplayStart(weekItem).getMonth()))
        })).filter((section) => section.weeks.length);
      }

      function roundHours(value) {
        return Math.round((Number(value) || 0) * 60) / 60;
      }

      function roundConstructedHours(value) {
        return Math.round((Number(value) || 0) * 2) / 2;
      }

      function formatHours(value) {
        const totalMinutes = Math.round((Number(value) || 0) * 60);
        const hours = Math.floor(totalMinutes / 60);
        const minutes = totalMinutes % 60;
        return minutes ? `${hours}h${String(minutes).padStart(2, "0")}` : `${hours}h`;
      }

      function serviceStepComplete() {
        if (serviceAlerts().length) return false;
        return teachers.every((teacher) => {
          const total = serviceTotalForTeacher(teacher.id);
          return total >= teacher.weeklyReference;
        });
      }

      function annualConstructionRules() {
        return constructionRules.filter((rule) => isAnnualConstructionRule(rule));
      }

      function annualRuleHasTeacherClasses(rule) {
        const teacherIds = teacherIdsForBlock(rule.block);
        if (rule.block?.optionBlock) {
          return optionBlockAvailableForTeachers(teacherIds)
            && Boolean(rule.block.optionId && rule.block.optionHours > 0);
        }
        return teacherIds.length > 0 && teacherIds.every((teacherId) => teacherClassForBlock(rule.block, teacherId));
      }

      function annualConstructionTeacherHours() {
        const totals = Object.fromEntries(teachers.map((teacher) => [teacher.id, 0]));
        annualConstructionRules().forEach((rule) => {
          const row = yearRows().find((item) => item.id === rule.rowId);
          if (!row?.slot) return;
          const slotHours = fullServiceSlotHours(row);
          const multiplier = (rule.weekLetter && rule.weekLetter !== "all" ? 0.5 : 1) * optionAnnualFactorForRule(rule);
          teacherIdsForBlock(rule.block).forEach((teacherId) => {
            totals[teacherId] = (totals[teacherId] || 0) + effectiveTeacherHoursForBlock(rule.block, teacherId, slotHours) * multiplier;
          });
        });
        return Object.fromEntries(Object.entries(totals).map(([teacherId, total]) => [teacherId, roundConstructedHours(total)]));
      }

      function annualConstructionClassHours() {
        const totals = Object.fromEntries(classes.map((schoolClass) => [schoolClass, 0]));
        const countedClassSlots = new Set();
        annualConstructionRules().forEach((rule) => {
          if (rule.block?.optionBlock) return;
          const row = yearRows().find((item) => item.id === rule.rowId);
          if (!row?.slot) return;
          const slotHours = fullServiceSlotHours(row);
          const multiplier = rule.weekLetter && rule.weekLetter !== "all" ? 0.5 : 1;
          const blockClasses = [...new Set(classesForBlock(rule.block)
            .map((schoolClass) => serviceClassIdForBaseClass(schoolClass))
            .filter(Boolean))];
          blockClasses.forEach((schoolClass) => {
            const countKey = `${rule.rowId}::${rule.weekLetter || "all"}::${schoolClass}`;
            if (countedClassSlots.has(countKey)) return;
            countedClassSlots.add(countKey);
            if (totals[schoolClass] === undefined) totals[schoolClass] = 0;
            totals[schoolClass] += slotHours * multiplier;
          });
        });
        return Object.fromEntries(Object.entries(totals).map(([schoolClass, total]) => [schoolClass, roundConstructedHours(total)]));
      }

      function constructionSummaryClasses() {
        const classItems = classLevels.flatMap(serviceClassesForLevel);
        specialClassInstances().forEach((instance) => {
          if (!instance.baseClassId) classItems.push(instance.schoolClass);
        });
        return [...new Set(classItems)];
      }

      function constructionClassSummaryTotal(schoolClass, classTotals) {
        return classTotals[schoolClass] || 0;
      }

      function annualConstructionTeacherClassHours() {
        const totals = Object.fromEntries(teachers.map((teacher) => [teacher.id, {}]));
        const countedTeacherClassSlots = new Set();
        annualConstructionRules().forEach((rule) => {
          if (rule.block?.optionBlock) return;
          const row = yearRows().find((item) => item.id === rule.rowId);
          if (!row?.slot) return;
          const slotHours = fullServiceSlotHours(row);
          const multiplier = rule.weekLetter && rule.weekLetter !== "all" ? 0.5 : 1;
          const countedTeacherClasses = new Set();
          teacherIdsForBlock(rule.block).forEach((teacherId) => {
            const rawClass = teacherClassForBlock(rule.block, teacherId);
            const schoolClass = rawClass ? serviceClassIdForBaseClass(rawClass) : "";
            if (!schoolClass) return;
            const countKey = `${teacherId}::${schoolClass}`;
            if (countedTeacherClasses.has(countKey)) return;
            countedTeacherClasses.add(countKey);
            const slotCountKey = `${rule.rowId}::${rule.weekLetter || "all"}::${teacherId}::${schoolClass}`;
            if (countedTeacherClassSlots.has(slotCountKey)) return;
            countedTeacherClassSlots.add(slotCountKey);
            if (!totals[teacherId]) totals[teacherId] = {};
            totals[teacherId][schoolClass] = (totals[teacherId][schoolClass] || 0) + teacherHoursForBlock(rule.block, teacherId, slotHours) * multiplier;
          });
        });
        return Object.fromEntries(Object.entries(totals).map(([teacherId, classTotals]) => [
          teacherId,
          Object.fromEntries(Object.entries(classTotals).map(([schoolClass, total]) => [schoolClass, roundConstructedHours(total)]))
        ]));
      }

      function constructionTeacherClassSummaries(teacherId, teacherClassTotals) {
        const expectedRows = serviceClassRowsForTeacher(teacherId);
        const expectedByClass = {};
        expectedRows.forEach((row) => {
          const schoolClass = row.classId ? serviceClassIdForBaseClass(row.classId) : "";
          if (!schoolClass) return;
          expectedByClass[schoolClass] = (expectedByClass[schoolClass] || 0) + (Number(row.hours) || 0);
        });
        const actualByClass = teacherClassTotals[teacherId] || {};
        return [...new Set([...Object.keys(expectedByClass), ...Object.keys(actualByClass)])]
          .sort((a, b) => a.localeCompare(b, "fr"))
          .map((schoolClass) => {
            const total = actualByClass[schoolClass] || 0;
            const target = expectedByClass[schoolClass] || 0;
            const diff = roundConstructedHours(total - target);
            return {
              schoolClass,
              total,
              target,
              missing: Math.max(0, -diff),
              excess: Math.max(0, diff),
              ok: Math.abs(diff) < 0.01
            };
          });
      }

      function annualConstructionTeacherOptionHours() {
        const totals = Object.fromEntries(teachers.map((teacher) => [teacher.id, {}]));
        annualConstructionRules().forEach((rule) => {
          if (!rule.block?.optionBlock) return;
          const row = yearRows().find((item) => item.id === rule.rowId);
          if (!row?.slot) return;
          const slotHours = fullServiceSlotHours(row);
          const multiplier = (rule.weekLetter && rule.weekLetter !== "all" ? 0.5 : 1) * optionAnnualFactorForRule(rule);
          teacherIdsForBlock(rule.block).forEach((teacherId) => {
            const optionId = rule.block.optionId || "";
            if (!optionId) return;
            if (!totals[teacherId]) totals[teacherId] = {};
            totals[teacherId][optionId] = (totals[teacherId][optionId] || 0) + effectiveTeacherHoursForBlock(rule.block, teacherId, slotHours) * multiplier;
          });
        });
        return Object.fromEntries(Object.entries(totals).map(([teacherId, optionTotals]) => [
          teacherId,
          Object.fromEntries(Object.entries(optionTotals).map(([optionId, total]) => [optionId, roundConstructedHours(total)]))
        ]));
      }

      function constructionTeacherOptionSummaries(teacherId, teacherOptionTotals) {
        const expectedRows = serviceFreeRowsForTeacher(teacherId);
        const expectedByOption = {};
        const labelsByOption = {};
        expectedRows.forEach((row) => {
          const optionId = serviceFreeOptionId(teacherId, row.id);
          expectedByOption[optionId] = (expectedByOption[optionId] || 0) + (Number(row.hours) || 0);
          labelsByOption[optionId] = row.label || "Option";
        });
        const actualByOption = teacherOptionTotals[teacherId] || {};
        return [...new Set([...Object.keys(expectedByOption), ...Object.keys(actualByOption)])]
          .sort((a, b) => (labelsByOption[a] || a).localeCompare(labelsByOption[b] || b, "fr"))
          .map((optionId) => {
            const option = serviceFreeOptionById(optionId);
            const total = actualByOption[optionId] || 0;
            const target = expectedByOption[optionId] || 0;
            const diff = roundConstructedHours(total - target);
            return {
              optionId,
              label: labelsByOption[optionId] || option?.label || "Option",
              total,
              target,
              missing: Math.max(0, -diff),
              excess: Math.max(0, diff),
              ok: Math.abs(diff) < 0.01
            };
          });
      }

      function classHourTargetForConstruction(schoolClass) {
        return serviceClassTarget(schoolClass);
      }

      function constructionClassesStepComplete() {
        const totals = annualConstructionClassHours();
        return constructionSummaryClasses().every((schoolClass) => {
          const target = classHourTargetForConstruction(schoolClass);
          if (!target) return true;
          return Math.abs(constructionClassSummaryTotal(schoolClass, totals) - target) < 0.01;
        });
      }

      function constructionBlocksStepComplete() {
        return cachedConstructionCheck("blocksComplete", () => {
        const rules = annualConstructionRules();
        if (!rules.length) return false;
        if (!rules.every(annualRuleHasTeacherClasses)) return false;
        const totals = annualConstructionTeacherHours();
        return teachers.every((teacher) => (totals[teacher.id] || 0) >= serviceTargetForTeacher(teacher)) && constructionClassesStepComplete();
        });
      }

      function constructionCycleDetailsStepComplete() {
        return cachedConstructionCheck("cycleDetailsComplete", () => {
        const rules = annualConstructionRules();
        if (!rules.length) return false;
        return rules.every((rule) => constructionCyclesForRule(rule).every((cycle) => {
          const block = blockWithCycleOverride(rule, cycle);
          if (block.optionBlock) return true;
          if (!block.facilityId && serviceFreeActivityById(block.activityId)) return true;
          if (!block.facilityId) return false;
          if (serviceFreeActivityById(block.activityId)) return true;
          return activitiesForFacility(block.facilityId).length ? Boolean(block.activityId) : true;
        }));
        });
      }

      function adminStepComplete(buildMode) {
        if (buildMode === "prerequisites") {
          return ["establishment", "team", "classes", "facilitiesActivities"].every(adminStepComplete);
        }
        if (buildMode === "yearPrerequisites") {
          return ["unavailable", "cycles", "as", "events", "hours"].every(adminStepComplete);
        }
        if (buildMode === "rules") {
          return constructionRuleSettings.length > 0;
        }
        if (buildMode === "establishment") {
          return slots.length > 0
            && slots.every((slot) => slot.label && Number(slot.hours) > 0)
            && (schoolConstraints.asSlots || []).length > 0
            && (schoolConstraints.asSlots || []).every((slot) => slot.label && Number(slot.hours) > 0 && (slot.days || []).length);
        }
        if (buildMode === "team") return teachers.length > 0;
        if (buildMode === "classes") return classes.length > 0;
        if (buildMode === "facilities" || buildMode === "activities" || buildMode === "facilitiesActivities") return facilities.length > 0 && activities.length > 0;
        if (buildMode === "program") return activities.length > 0 && classLevels.every((level) => (activityProgramByLevel[level] || []).length > 0);
        if (buildMode === "unavailable") return facilityUnavailability.length > 0;
        if (buildMode === "cycles") return cycles.length > 0 && !validateCycles(cycles).length;
        if (buildMode === "as") return asSessions.length > 0;
        if (buildMode === "events") return sportEvents.length > 0;
        if (buildMode === "hours") return serviceStepComplete();
        return false;
      }

      function renderConstructionServiceSummary() {

        });
        return `<div class="servicePanel compactServicePanel">
          <h3>Service reel construit</h3>
          <div class="hoursBalanceGrid">
            ${teachers.map((teacher) => {
              const total = teacherTotals[teacher.id] || 0;
              const target = serviceTargetForTeacher(teacher);
              const overtimeHours = Math.max(0, roundConstructedHours(target - teacher.weeklyReference));
              const status = hourStatus(total - target);
              const progress = target ? Math.min(100, Math.round((total / target) * 100)) : 0;
              const classDetails = constructionTeacherClassSummaries(teacher.id, teacherClassTotals);
              const optionDetails = constructionTeacherOptionSummaries(teacher.id, teacherOptionTotals);
              const serviceDetails = [...classDetails.map((item) => ({ ...item, label: compactClassName(item.schoolClass) })), ...optionDetails.map((item) => ({ ...item, label: item.label }))];
              return `<article class="hoursCard" style="background:${teacher.color};border-color:${teacher.border}">

                <div class="hoursMain"><strong>${formatHours(total)}</strong><span class="muted">/ ${formatHours(target)}${overtimeHours ? ` · dont ${formatHours(overtimeHours)} sup` : ""}</span></div>
                <div class="hoursProgress"><span style="width:${progress}%"></span></div>
                <div class="classPills">
                  ${serviceDetails.length ? serviceDetails.map((item) => {
                    const detail = item.missing ? ` &middot; manque ${formatHours(item.missing)}` : item.excess ? ` &middot; trop ${formatHours(item.excess)}` : "";
                    return `<span class="classPill ${item.ok ? "" : "needsValidation"}">${item.label} &middot; ${formatHours(item.total)} / ${formatHours(item.target)}${detail}</span>`;
                  }).join("") : `<span class="classPill">Aucun service affecte</span>`}
                </div>
              </article>`;
            }).join("")}
          </div>
          <h3>Volumes par classe</h3>
          <div class="classPills">
            ${classSummaries.map((item) => {
              const total = formatHours(item.total);
              const target = formatHours(item.target);
              const ok = item.ok;
              const schoolClass = item.schoolClass;
              return `<span class="classPill ${ok ? "" : "needsValidation"}">${compactClassName(schoolClass)} · ${total} / ${target}</span>`;
            }).join("")}
          </div>
        </div>`;
      }

      function renderCycleCoverage(scope = "default") {
        const weeks = schoolYearWeeks();
        const shownCycles = cyclesForScope(scope);
        const palette = ["#dbeafe", "#dcfce7", "#fef3c7", "#fce7f3", "#ede9fe", "#cffafe", "#fee2e2", "#e0e7ff", "#ecfccb", "#fae8ff", "#f1f5f9", "#ffedd5"];
        const cycleStyle = (cycle) => {
          if (!cycle) return "";
          const index = Math.max(0, shownCycles.findIndex((item) => item.id === cycle.id));
          return `background:${palette[index % palette.length]};border-color:#111827;color:#0f172a;`;
        };
        const groupedCoverageCells = () => {
          const groups = [];
          weeks.forEach((weekItem) => {
            const vacation = vacationForWeek(weekItem);
            const cycle = shownCycles.find((item) => weeksForCycle(item).some((cycleWeek) => cycleWeek.rank === weekItem.rank));
            const label = vacation ? "V" : cycle ? cycle.name.replace("Cycle ", "C") : "";
            const className = vacation ? "vacationCell" : cycle ? "coveredCell" : "gapCell";
            const style = cycle && !vacation ? cycleStyle(cycle) : "";
            const title = vacation?.name || (cycle ? `${cycle.start} - ${cycle.end}` : "Aucun cycle");
            const last = groups[groups.length - 1];
            if (last && last.label === label && last.className === className && last.style === style && last.title === title) {
              last.span += 1;
              last.end = weekItem;
            } else {
              groups.push({ label, className, style, title, start: weekItem, end: weekItem, span: 1 });
            }
          });
          return groups.map((group) => `<td colspan="${group.span}" class="${group.className}" style="${group.style}" title="${group.title}">
            <div class="cycleCoverageBlock">
              <strong>du ${shortDate(weekDisplayStart(group.start))} au ${shortDate(weekDisplayEnd(group.end))}</strong>
            </div>
          </td>`).join("");
        };
        return `<div class="cycleCoverage">
          <h3>Vue annuelle des cycles</h3>
          <div class="cycleLegend"><span class="cycleLegendSwatch"></span><span>Rouge fonce : trou dans les cycles</span></div>
          <div class="yearWrap"><table class="yearTable cycleCoverageTable">
            <thead>
              <tr><th class="timeHead">Repère</th>${groupedHeaderCells(weeks, monthLabelForWeek, () => "monthCell")}</tr>
              <tr><th class="timeHead">Cycle</th>${groupedHeaderCells(weeks, (weekItem) => {
                const vacation = vacationForWeek(weekItem);
                const cycle = shownCycles.find((item) => weeksForCycle(item).some((cycleWeek) => cycleWeek.rank === weekItem.rank));
                return vacation ? "V" : cycle ? cycle.name.replace("Cycle ", "C") : "";
              }, (weekItem) => vacationForWeek(weekItem) ? "vacationHeader" : shownCycles.find((item) => weeksForCycle(item).some((cycleWeek) => cycleWeek.rank === weekItem.rank)) ? "cycleHeader" : "gapCell")}</tr>
              <tr><th class="timeHead">Semaine</th>${weeks.map((weekItem) => `<th>${weekItem.rank}${weekItem.letter}</th>`).join("")}</tr>
            </thead>
            <tbody>
              <tr>
                <th class="timeHead">Dates</th>
                ${groupedCoverageCells()}
              </tr>
            </tbody>
          </table></div>
        </div>`;
      }

      function facilityIdFromName(name) {
        const base = name
          .toLowerCase()
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "")
          .replace(/[^a-z0-9]+/g, "-")
          .replace(/^-|-$/g, "") || "installation";
        let id = base;
        let index = 2;
        while (facilities.some((facility) => facility.id === id)) {
          id = `${base}-${index}`;
          index += 1;
        }
        return id;
      }

      function activityIdFromName(name) {
        const base = name
          .toLowerCase()
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "")
          .replace(/[^a-z0-9]+/g, "-")
          .replace(/^-|-$/g, "") || "activite";
        let id = base;
        let index = 2;
        while (activities.some((activity) => activity.id === id)) {
          id = `${base}-${index}`;
          index += 1;
        }
        return id;
      }
