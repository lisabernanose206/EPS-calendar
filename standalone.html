      function renderConstructionCellStack(items, events, asItems, editable, key, row, alignmentTeacherIds = []) {
        const indexedItems = items.map((item, index) => ({ item, index }));
        const orderedTeacherIds = editable ? alignmentTeacherIds : teachers.map((teacher) => teacher.id);
        const lessonBlocks = row.isAs ? "" : editable
          ? orderedTeacherIds.map((teacherId) => {
            const matches = indexedItems.filter(({ item }) => teacherIdsForBlock(item)[0] === teacherId);
            return `<div class="buildFacilitySlot">${matches.map(({ item, index }) => `
              <div class="buildBlock ${movingBuildBlock?.type === "course" && movingBuildBlock?.key === key && movingBuildBlock?.index === index ? "moveSelected" : ""}" data-move-kind="course" data-move-index="${index}" data-block-key="${key}" style="${blockTeacherStyle(item)}">
                <button class="moveBlockButton" data-start-move-kind="course" data-move-index="${index}" data-block-key="${key}" title="Deplacer">↔</button>
                <button class="removeBlockButton" data-remove-cell="${key}" data-remove-index="${index}" title="Retirer">x</button>
                <strong>${blockClassLabel(item)}</strong>
                <span>${blockDetailLabel(item)}</span>
              </div>`).join("") || `<div class="buildSlotSpacer"></div>`}</div>`;
          }).join("")
          : items.map((item) => `
              <div class="buildBlock" style="${blockTeacherStyle(item)}">
                <strong>${blockClassLabel(item)}</strong>
                <span>${blockDetailLabel(item)}</span>
              </div>`).join("");
        return `<div class="buildCellStack">${lessonBlocks}${events.map((event) => `
          <div class="buildBlock eventBlock ${movingBuildBlock?.type === "event" && movingBuildBlock?.id === event.id ? "moveSelected" : ""}" data-move-kind="event" data-move-id="${event.id}" data-block-key="${key}">
            <strong>${event.name} : ${eventClassSummary(event)}</strong>
            <div class="eventBlockControls">
              <button class="moveBlockButton" data-start-move-kind="event" data-move-id="${event.id}" data-block-key="${key}" title="Deplacer">↔</button>
              ${eventTeacherDots(event)}
            </div>
          </div>`).join("")}${asItems.map((session) => `
          <div class="buildBlock asBlock ${movingBuildBlock?.type === "as" && movingBuildBlock?.id === session.id ? "moveSelected" : ""}" ${constructionBuildMode === "blocks" ? `data-move-kind="as"` : ""} data-move-id="${session.id}" data-block-key="${key}" style="${asSessionStyle(session)}">
            ${constructionBuildMode === "blocks" ? `<button class="moveBlockButton" data-start-move-kind="as" data-move-id="${session.id}" data-block-key="${key}" title="Deplacer">↔</button>` : ""}
            <strong>${asBlockLabel(session)}</strong>
          </div>`).join("")}</div>`;
      }

      function indexedConstructionItemsForKey(key, filterSelection = false, weekLetter = "") {
        return (constructionPlan[key] || [])
          .map((item, index) => ({ item, index }))
          .filter(({ item }) => (!filterSelection || blockMatchesTeacherSelection(item)) && (!weekLetter || (item.weekLetter || "all") === weekLetter));
      }

      function constructionOptimizationIssueForBlock(item, cycle) {
        if (constructionBuildMode !== "cycleDetails" || !constructionOptimizationResult?.unresolvedBlocks?.length || !item?.ruleId || !cycle?.id) return null;
        return constructionOptimizationResult.unresolvedBlocks.find((issue) => issue.ruleId === item.ruleId && issue.cycleId === cycle.id) || null;
      }

      function renderConstructionCycleBlocks(indexedItems, key, editable = true, cycle = null) {
        if (!indexedItems.length) return "";
        return `<div class="cycleBlockGrid">${indexedItems.map(({ item, index }) => {
          const optimizationIssue = constructionOptimizationIssueForBlock(item, cycle);
          return `
          <div class="buildBlock ${movingBuildBlock?.type === "course" && movingBuildBlock?.key === key && movingBuildBlock?.index === index ? "moveSelected" : ""} ${optimizationIssue ? "optimizationIssue" : ""}" ${editable ? (constructionBuildMode === "blocks" ? `data-move-kind="course"` : `data-edit-cycle-details="${index}"`) : ""} data-move-index="${index}" data-block-key="${key}" title="${optimizationIssue ? escapeHtml(optimizationIssue.reason) : ""}" style="${blockTeacherStyle(item)}">
            ${editable && constructionBuildMode === "blocks" ? `<button class="moveBlockButton" data-start-move-kind="course" data-move-index="${index}" data-block-key="${key}" title="Deplacer">↔</button>
            <button class="removeBlockButton" data-remove-cell="${key}" data-remove-index="${index}" title="Retirer">x</button>` : ""}
            <strong>${blockClassLabel(item)}</strong>
            <span>${blockDetailLabel(item)}</span>
            ${optimizationIssue ? `<span class="optimizationIssueReason">${escapeHtml(optimizationIssue.reason)}</span>` : ""}
            ${item.coIntervention ? `<span>Co-intervention</span>` : ""}
          </div>
        `;
        }).join("")}</div>`;
      }

      function asSessionsForConstructionCycle(row, cycle, key, filterSelection = false) {
        if (!row?.isAs || !cycle) return [];
        const cycleStart = dateOnly(cycle.start);
        const cycleEnd = dateOnly(cycle.end);
        return asSessions
          .filter((session) => {
            const start = dateOnly(session.start);
            const end = dateOnly(session.end);
            const slotIds = Array.isArray(session.slotIds) ? session.slotIds : [];
            return start <= cycleEnd
              && end >= cycleStart
              && (session.weekdays || []).includes(row.day)
              && (!slotIds.length || slotIds.includes(row.slot.id))
              && !itemExcludedForCell(asExclusions, session.id, key);
          })
          .filter((session) => !filterSelection || asMatchesTeacherSelection(session));
      }

      function renderConstructionCycleArea(row, cycle, letter, label, filterSelection = false, editable = true) {
        const weekItem = representativeWeekForCycle(cycle, letter);
        if (!weekItem) return `<div class="cycleConstructionFull"><span class="muted">Cycle sans semaine</span></div>`;
        const key = yearCellKey(row.id, weekItem.rank);
        const indexedItems = indexedConstructionItemsForKey(key, filterSelection, letter);
        const asItems = asSessionsForConstructionCycle(row, cycle, key, filterSelection);
        const blocked = isWednesdayAfternoonCourse(row);
        const canOpenHere = editable && constructionBuildMode === "blocks" && !row.isAs && !blocked;
        const availableStyle = canOpenHere ? availableTeacherCellStyle(row, weekItem, key, blocked, cycle, letter || "all") : "";
        const availabilityTitle = canOpenHere ? availableTeacherCellTitle(row, weekItem, key, cycle, letter || "all") : "";
        const cellTitle = [label, blocked ? "Mercredi apres-midi indisponible" : "", availabilityTitle].filter(Boolean).join(" | ");
        return `<div title="${cellTitle}" class="${letter ? "cycleConstructionHalf" : "cycleConstructionFull"} ${row.isAs ? "cycleConstructionAsCell" : ""} ${blocked ? "constructionBlockedCell" : ""} ${canOpenHere ? "buildDropCell availableTeacherBg" : ""}" style="${availableStyle}" ${canOpenHere ? `data-open-cell="${key}" data-open-cycle-id="${cycle.id}" data-open-week-letter="${letter || "all"}" data-move-cell="${key}"` : ""}>
          ${letter ? `<span class="cycleConstructionHalfLabel">${label}</span>` : ""}
          ${blocked ? "" : row.isAs ? `<div class="constructionAsStack">${asItems.length ? asItems.map((session) => `
            <div class="buildBlock asBlock ${movingBuildBlock?.type === "as" && movingBuildBlock?.id === session.id ? "moveSelected" : ""}" ${editable && constructionBuildMode === "blocks" ? `data-move-kind="as"` : ""} data-move-id="${session.id}" data-block-key="${key}" style="${asSessionStyle(session)}">
              ${editable && constructionBuildMode === "blocks" ? `<button class="moveBlockButton" data-start-move-kind="as" data-move-id="${session.id}" data-block-key="${key}" title="Deplacer">↔</button>` : ""}
              <strong>${asBlockLabel(session)}</strong>
              <span>${asSessionTeacherLabel(session)}</span>
            </div>`).join("") : `<span class="muted">-</span>`}</div>` : renderConstructionCycleBlocks(indexedItems, key, editable, cycle)}
        </div>`;
      }

      function constructionWeekTypeSlots() {
        return [
          ...slots.slice(0, 2),
          { id: "__as__", label: "AS", isAsSummary: true },
          ...slots.slice(2)
        ];
      }

      function constructionRowForSlot(day, slot) {
        const rows = yearRows();
        if (slot.isAsSummary) return rows.find((item) => item.day === day && item.isAs) || null;
        return rows.find((item) => item.day === day && item.slot.id === slot.id && item.slot.label === slot.label) || null;
      }

      function renderConstructionCycleTable(cycle, rows, editable, filterSelection = false) {
        if (!cycle) return `<div class="alertEmpty">Aucun cycle classique defini.</div>`;
        const slotRows = constructionWeekTypeSlots();
        return `<div class="yearWrap cycleConstructionTableWrap"><table class="yearTable constructionTable cycleConstructionTable">
          <thead>
            <tr><th class="timeHead">Créneau</th>${days.map((day) => `<th>${day}</th>`).join("")}</tr>
          </thead>
          <tbody>
            ${slotRows.map((slot) => `<tr>
              <th class="timeHead">${slot.label}</th>
              ${days.map((day) => {
                const row = constructionRowForSlot(day, slot);
                if (!row) return `<td class="mergedOff"><span class="muted">-</span></td>`;
                const weekAll = representativeWeekForCycle(cycle);
                const weekA = representativeWeekForCycle(cycle, "A");
                const weekB = representativeWeekForCycle(cycle, "B");
                const keyAll = weekAll ? yearCellKey(row.id, weekAll.rank) : "";
                const keyA = weekA ? yearCellKey(row.id, weekA.rank) : "";
                const keyB = weekB ? yearCellKey(row.id, weekB.rank) : "";
                const allItems = keyAll ? indexedConstructionItemsForKey(keyAll, filterSelection, "all") : [];
                const aItems = keyA ? indexedConstructionItemsForKey(keyA, filterSelection, "A") : [];
                const bItems = keyB ? indexedConstructionItemsForKey(keyB, filterSelection, "B") : [];
                const hasQuinzaine = aItems.length || bItems.length;
                const blockedRow = isWednesdayAfternoonCourse(row);
                return `<td class="cycleConstructionCell">
                  <div class="cycleConstructionCellInner">
                    ${hasQuinzaine
                      ? `${!blockedRow && allItems.length ? renderConstructionCycleBlocks(allItems, keyAll, editable, cycle) : ""}<div class="cycleConstructionSplit">${renderConstructionCycleArea(row, cycle, "A", "Semaine A", filterSelection, editable)}${renderConstructionCycleArea(row, cycle, "B", "Semaine B", filterSelection, editable)}</div>`
                      : renderConstructionCycleArea(row, cycle, "", "", filterSelection, editable)}
                  </div>
                </td>`;
              }).join("")}
            </tr>`).join("")}
          </tbody>
        </table></div>`;
      }

      function constructionConflictDetails(conflict) {
        if (conflict.type === "teacher") {
          const teacherName = teachers.find((teacher) => teacher.id === conflict.teacher)?.name || conflict.teacher;
          return {
            label: `Professeur en conflit : ${teacherName}`,
            detail: conflict.items.map((item) => `${blockClassLabel(item) || "classe non precisee"} · ${item.facilityLabel || "installation non precisee"}`).join(" / ")
          };
        }
        if (conflict.type === "asTeacher") {
          const teacherName = teachers.find((teacher) => teacher.id === conflict.teacher)?.name || conflict.teacher;
          return {
            label: `Professeur en conflit AS : ${teacherName}`,
            detail: conflict.items.map((item) => `${item.name || "AS"} · ${item.weekdays.join(", ")}`).join(" / ")
          };
        }
        if (conflict.type === "class") {
          return {
            label: `Classe en conflit : ${conflict.schoolClass}`,
            detail: conflict.items.map((item) => `${teacherLabelForBlock(item)} · ${item.facilityLabel || "installation non precisee"}`).join(" / ")
          };
        }
        return {
          label: `Installation en conflit : ${conflict.items[0].facilityLabel || conflict.facility}`,
            detail: conflict.items.map((item) => `${teacherLabelForBlock(item)} avec ${blockClassLabel(item) || "classe non precisee"}`).join(" / ")
        };
      }

      function renderBugFixLogView() {
        const source = window.__EPS_BUG_FIX_LOG__ || fallbackBugFixLog;
        const entries = source
          .split("\n")
          .map((line) => line.trim())
          .filter((line) => line.startsWith("- "))
          .map((line) => {
            const text = line.slice(2).replace(/`/g, "");
            const separator = text.indexOf(" : ");
            return separator >= 0
              ? { title: text.slice(0, separator), details: text.slice(separator + 3) }
              : { title: text, details: "" };
          });
        const groups = entries.reduce((items, entry) => {
          const title = entry.title || "General";
          if (!items[title]) items[title] = [];
          items[title].push(entry.details || entry.title);
          return items;
        }, {});
        return `<section class="logPage">
          <h2>Log des corrections</h2>
          <article class="alertHelp">
            <strong>Historique simple</strong>
            <span>Liste des corrections et ameliorations apportees au logiciel au fil des mises a jour.</span>

              <details class="logGroup">

        </section>`;
      }

      async function submitFeedback() {
        if (!requestMessage.trim() || requestSubmitting) return;
        requestSubmitting = true;
        requestStatus = "Envoi en cours...";
        render();
        try {
          if (!cloudReady()) throw new Error("cloud non configure");
          if (!cloudWriteAllowed()) throw new Error(cloudWriteBlockedMessage());
          const payload = {
            planning_id: cloudConfig.planningId,
            kind: requestKind,
            author: requestAuthor.trim() || null,
            message: requestMessage.trim(),
            context: {
              page: week,
              schoolYear: schoolYear.label,
              userAgent: navigator.userAgent,
              sentAt: new Date().toISOString()
            },
            status: "new"
          };
          const response = await fetch(feedbackEndpoint(), {
            method: "POST",
            headers: {
              apikey: cloudConfig.anonKey,
              Authorization: `Bearer ${cloudConfig.anonKey}`,
              "Content-Type": "application/json",
              Prefer: "return=minimal"
            },
            body: JSON.stringify(payload)
          });
          if (!response.ok) throw new Error(await response.text());
          requestMessage = "";
          requestStatus = "Votre requete a bien ete envoyee. Merci pour votre retour.";
        } catch (error) {
          requestStatus = `Envoi impossible : ${error.message || "erreur inconnue"}`;
        } finally {
          requestSubmitting = false;
          render();
        }
      }

      function updateNavigationActive() {
        document.querySelectorAll("[data-week]").forEach((item) => {
          const buildMode = item.dataset.buildMode || "";
          const isActive = buildMode
            ? week === "build" && constructionMode === buildMode
            : item.dataset.week === week && week !== "build";
          item.classList.toggle("active", isActive);
          const tracksProgress = Boolean(buildMode && buildMode !== "planning");
          const complete = tracksProgress && adminStepComplete(buildMode);
          item.classList.toggle("stepComplete", complete);
          item.classList.toggle("stepIncomplete", tracksProgress && !complete);
          if (buildMode === "planning") {
            const locked = !canAccessConstructionPlanning();
            item.disabled = locked;
            item.title = locked ? "Completez les prerequis avant d'acceder a Construction." : "";
          }
        });
      }

      function render() {
        if (!isAdmin() && (week === "build" || week === "alerts" || week === "log")) week = "current";
        const root = document.getElementById("root");
        const dateInfo = document.getElementById("dateInfo");
        const legend = document.getElementById("legend");
        if (!root || !dateInfo || !legend) return;
        dateInfo.style.display = "none";
        dateInfo.innerHTML = "";
        renderAuthBox();
        const adminNavGroup = document.getElementById("adminNavGroup");
        if (adminNavGroup) adminNavGroup.classList.toggle("locked", !isAdmin());
        try {
          updateNavigationActive();
          const cycle = generateCycle();
          const hideLegend = week === "build" || week === "guide" || week === "alerts" || week === "log" || week === "cycle" || week === "year" || week === "current";
          legend.style.display = hideLegend ? "none" : "flex";
          legend.innerHTML = hideLegend ? "" : renderTeacherLegend();
          if (week === "year") root.innerHTML = renderYearView(cycle);
          else if (week === "cycle") root.innerHTML = renderCycleView();
          else if (week === "build") root.innerHTML = renderConstructionView();
          else if (week === "guide") root.innerHTML = renderGuideView();
          else if (week === "alerts") root.innerHTML = renderAlertsView();
          else if (week === "log") root.innerHTML = renderBugFixLogView();
          else if (week === "request") root.innerHTML = renderRequestView();
          else root.innerHTML = renderCalendar(cycle);
        } catch (error) {
          console.error(error);
          legend.style.display = "none";
          legend.innerHTML = "";

            const id = button.dataset.unavailableCycle;
            unavailableCycleIds = unavailableCycleIds.includes(id)
              ? unavailableCycleIds.filter((item) => item !== id)
              : [...unavailableCycleIds, id];
            render();
          });
        });
        document.querySelectorAll("[data-unavailable-type]").forEach((button) => {
          button.addEventListener("click", () => {
            unavailableType = button.dataset.unavailableType;
            unavailableWeekdays = [...new Set(unavailableCells.map((cell) => cell.day))];
            unavailableSlotIds = [...new Set(unavailableCells.map((cell) => cell.slotId))];
            render();
          });
        });
        document.querySelectorAll("[data-unavailable-facility]").forEach((button) => {
          button.addEventListener("click", () => {
            const id = button.dataset.unavailableFacility;
            unavailableFacilityIds = unavailableFacilityIds.includes(id)
              ? unavailableFacilityIds.filter((item) => item !== id)
              : [...unavailableFacilityIds, id];
            render();
          });
        });
        document.querySelectorAll("[data-unavailable-teacher]").forEach((button) => {
          button.addEventListener("click", () => {
            toggleUnavailableTeacher(button.dataset.unavailableTeacher);
            render();
          });
        });
        document.querySelectorAll("[data-unavailable-cell-day]").forEach((button) => {
          button.addEventListener("click", () => {
            toggleUnavailableGridCell(button.dataset.unavailableCellDay, button.dataset.unavailableCellSlot);
            render();
          });
        });
        document.querySelectorAll("[data-toggle-unavailable-group]").forEach((button) => {
          button.addEventListener("click", () => {
            expandedUnavailableGroup = expandedUnavailableGroup === button.dataset.toggleUnavailableGroup ? "" : button.dataset.toggleUnavailableGroup;
            render();
          });
        });
        document.querySelectorAll("[data-unavailable-class-level-filter]").forEach((button) => {
          button.addEventListener("click", () => {
            unavailableClassLevelFilter = button.dataset.unavailableClassLevelFilter;
            render();
          });
        });
        document.querySelectorAll("[data-unavailable-class]").forEach((button) => {
          button.addEventListener("click", () => {
            toggleUnavailableClass(button.dataset.unavailableClass);
            render();
          });
        });
        const addFacilityUnavailable = document.getElementById("addFacilityUnavailable");
        if (addFacilityUnavailable) {
          addFacilityUnavailable.addEventListener("click", () => {
            const hasTime = unavailableCells.length;
            if (!hasTime) return;
            if (unavailablePeriodMode === "cycles" && !unavailableCycleIds.length) return;
            if (unavailableType === "facility" && !unavailableFacilityIds.length) return;
            if (unavailableType === "class" && !unavailableClassIds.length) return;
            if (unavailableType === "teacher" && !unavailableTeacherIds.length) return;
            const message = editingUnavailableId ? "Contrainte modifiée" : "Contrainte validée";
            saveFacilityUnavailableFromForm();
            showValidationPopup(message);
            render();
          });
        }
        const cancelUnavailableEdit = document.getElementById("cancelUnavailableEdit");
        if (cancelUnavailableEdit) {
          cancelUnavailableEdit.addEventListener("click", () => {
            resetFacilityUnavailableForm();
            render();
          });
        }
        document.querySelectorAll("[data-edit-unavailable]").forEach((button) => {
          button.addEventListener("click", () => {
            const item = facilityUnavailability.find((entry) => entry.id === button.dataset.editUnavailable);
            if (!item) return;
            editingUnavailableId = item.id;
            unavailableName = item.name;
            unavailableType = item.type || ((item.classIds || []).length ? "class" : (item.teacherIds || []).length ? "teacher" : "facility");
            unavailableFacilityIds = [...(item.facilityIds || [])];
            unavailableClassIds = [...(item.classIds || [])];
            unavailableTeacherIds = [...(item.teacherIds || [])];
            unavailableClassLevelFilter = unavailableClassIds[0] ? classParts(unavailableClassIds[0]).level : "";
            unavailablePeriodMode = item.periodMode || ((item.cycleIds || []).length ? "cycles" : "dates");
            unavailableCycleIds = [...(item.cycleIds || [])];
            unavailableStart = item.start;
            unavailableEnd = item.end;
            unavailableWeekdays = [...(item.weekdays || [])];
            unavailableSlotIds = [...(item.slotIds || [])];
            unavailableCells = item.cells
              ? [...item.cells]
              : unavailableWeekdays.flatMap((day) => unavailableSlotIds.map((slotId) => ({ day, slotId })));
            render();
          });
        });
        document.querySelectorAll("[data-delete-unavailable]").forEach((button) => {
          button.addEventListener("click", () => {
            facilityUnavailability = facilityUnavailability.filter((item) => item.id !== button.dataset.deleteUnavailable);
            if (editingUnavailableId === button.dataset.deleteUnavailable) resetFacilityUnavailableForm();
            saveFacilityUnavailability();
            rebuildConstructionPlan();
            showValidationPopup("Contrainte supprimée");
            render();
          });
        });
        const addAsSession = document.getElementById("addAsSession");
        if (addAsSession) {
          addAsSession.addEventListener("click", () => {
            if (!asTeacherIds.length || !asWeekdays.length || !asStart || !asEnd) return;
            const message = editingAsId ? "AS modifiée" : "AS validée";
            saveAsSessionFromForm();
            showValidationPopup(message);
            render();
          });
        }
        const cancelAsEdit = document.getElementById("cancelAsEdit");
        if (cancelAsEdit) {
          cancelAsEdit.addEventListener("click", () => {
            resetAsForm();
            render();
          });
        }
        document.querySelectorAll("[data-edit-as]").forEach((button) => {
          button.addEventListener("click", () => {
            const session = asSessions.find((item) => item.id === button.dataset.editAs);
            if (!session) return;
            editingAsId = session.id;
            asName = session.name;
            asStart = session.start;
            asEnd = session.end;
            asWeekdays = [...(session.weekdays || [])];
            asTeacherIds = [...(session.teacherIds || [])];
            render();
          });
        });
        document.querySelectorAll("[data-delete-as]").forEach((button) => {
          button.addEventListener("click", () => {
            asSessions = asSessions.filter((session) => session.id !== button.dataset.deleteAs);
            delete asExclusions[button.dataset.deleteAs];
            if (editingAsId === button.dataset.deleteAs) resetAsForm();
            saveAsSessions();
            saveAsExclusions();
            showValidationPopup("AS supprimée");
            render();
          });
        });
        const addBuiltBlock = document.getElementById("addBuiltBlock");
        if (addBuiltBlock && activeBuildCell) {
          addBuiltBlock.addEventListener("click", () => {
            const { rowId, weekRank } = parseYearCellKey(activeBuildCell);
            const weekItem = schoolYearWeeks().find((item) => item.rank === weekRank);
            if (!blockTeacherIds.length) return;
            const block = currentBlock();
            const cellCycle = activeBuildCycleId
              ? cycles.find((cycle) => cycle.id === activeBuildCycleId)
              : cycleForWeek(weekItem, classParts(block.schoolClass).level);
            if (!cellCycle) return;
            const row = yearRows().find((item) => item.id === rowId);
            if (blockUnavailableMessage(row, weekItem, block)) {
              render();
              return;
            }
            if (!activeBuildCycleId && blockWeekLetter !== "all" && blockWeekLetter !== weekItem.letter) {
              render();
              return;
            }
            if (blockCycleUnavailableMessage(rowId, cellCycle.id, block, blockWeekLetter)) {
              render();
              return;
            }
            if (constructionBuildMode === "cycleDetails" && editingBuildBlock?.ruleId) {
              updateConstructionRuleCycleDetails(editingBuildBlock.ruleId, block.cycleId || activeConstructionCycleId, block);
              showValidationPopup("Installation / activite mises a jour");
            } else if (editingBuildBlock?.ruleId) {
              updateAnnualConstructionRule(editingBuildBlock.ruleId, block, blockWeekLetter);
              showValidationPopup("Bloc annuel modifie");
            } else {
              applyAnnualConstructionBlock(rowId, block, blockWeekLetter);
              showValidationPopup("Bloc annuel valide");
            }
            editingBuildBlock = null;
            activeBuildCell = null;
            activeBuildCycleId = null;
            blockWeekLetter = "all";
            blockSecondTeacherHours = "";
            blockCoIntervention = false;
            blockIsOption = false;
            blockOptionId = "";
            blockOptionHours = "";
            blockOptionCycleIds = [];
            blockTeacherClasses = {};
            blockTeacherClassLevels = {};
            render();
          });
        }
        document.querySelectorAll("#closeBuildModal, #closeBuildModalFooter").forEach((button) => {
          button.addEventListener("click", () => {
            activeBuildCell = null;
            activeBuildCycleId = null;
            editingBuildBlock = null;
            blockWeekLetter = "all";
            blockSecondTeacherHours = "";
            blockCoIntervention = false;
            blockIsOption = false;
            blockOptionId = "";
            blockOptionHours = "";
            blockOptionCycleIds = [];
            blockTeacherClasses = {};
            blockTeacherClassLevels = {};
            render();
          });
        });
        document.querySelectorAll("[data-pick-week-letter]").forEach((button) => {
          button.addEventListener("click", () => {
            if (button.disabled) return;
            blockWeekLetter = button.dataset.pickWeekLetter;
            render();
          });
        });
        document.querySelectorAll("[data-construction-cycle]").forEach((button) => {
          button.addEventListener("click", () => {
            activeConstructionCycleId = button.dataset.constructionCycle;
            activeBuildCell = null;
            activeBuildCycleId = null;
            editingBuildBlock = null;
            render();
          });
        });
        const cycleCountInput = document.getElementById("cycleCount");
        if (cycleCountInput) {
          cycleCountInput.addEventListener("change", () => {
            const previousCount = activeCycles().length;
            setCycleCount(cycleCountInput.value);
            const nextCount = activeCycles().length;
            if (nextCount > previousCount) showValidationPopup("Cycle ajouté");
            else if (nextCount < previousCount) showValidationPopup("Cycle supprimé");
            else showValidationPopup("Cycles mis à jour");
            render();
          });
        }
        document.querySelectorAll("[data-cycle-scope]").forEach((button) => {
          button.addEventListener("click", () => {
            activeCycleScope = button.dataset.cycleScope;
            const scopedCycles = activeCycles();
            activeCycleId = scopedCycles[0]?.id || "";
            render();
          });
        });
        document.querySelectorAll("[data-move-cell], [data-open-cell]").forEach((cell) => {
          cell.addEventListener("click", (event) => {
            if (event.target.closest("[data-remove-cell], [data-start-move-kind]")) return;
            if (ignoreNextMoveCellClick) {
              ignoreNextMoveCellClick = false;
              return;
            }
            if (movingBuildBlock) {
              moveSelectedBlockTo(cell.dataset.moveCell || cell.dataset.openCell);
              movingBuildBlock = null;
              window.onpointermove = null;
              activeBuildCell = null;
              activeBuildCycleId = null;
              editingBuildBlock = null;
              blockCoIntervention = false;
              blockIsOption = false;
              blockOptionId = "";
              blockOptionHours = "";
              blockOptionCycleIds = [];
              blockTeacherClasses = {};
              blockTeacherClassLevels = {};
              render();
              return;
            }
            if (!cell.dataset.openCell) return;
            activeBuildCell = cell.dataset.openCell;
            activeBuildCycleId = cell.dataset.openCycleId || null;
            editingBuildBlock = null;
            blockTeacherIds = [];
            blockFacilityId = "";
            blockActivityId = "";
            blockClass = "";
            blockClassLevel = "";
            blockTeacherClasses = {};
            blockTeacherClassLevels = {};
            blockWeekLetter = cell.dataset.openWeekLetter || "all";
            blockSecondTeacherHours = "";
            blockCoIntervention = false;
            blockIsOption = false;
            blockOptionId = "";
            blockOptionHours = "";
            blockOptionCycleIds = [];
            render();
          });
        });
        const cancelMoveBlock = document.getElementById("cancelMoveBlock");
        if (cancelMoveBlock) {
          cancelMoveBlock.addEventListener("click", () => {
            movingBuildBlock = null;
            ignoreNextMoveCellClick = false;
            window.onpointermove = null;
            render();
          });
        }
        if (movingBuildBlock) {
          window.onpointermove = (event) => {
            movingBuildBlock = { ...movingBuildBlock, x: event.clientX, y: event.clientY };
            const ghost = document.getElementById("movingBlockGhost");
            if (ghost) {
              ghost.style.left = `${event.clientX}px`;
              ghost.style.top = `${event.clientY}px`;
            }
          };
        } else {
          window.onpointermove = null;
        }
        window.onkeydown = (event) => {
          if (event.key !== "Escape" || !movingBuildBlock) return;
          movingBuildBlock = null;
          ignoreNextMoveCellClick = false;
          window.onpointermove = null;
          render();
        };
        document.querySelectorAll("[data-edit-built-block]").forEach((block) => {
          block.addEventListener("dblclick", (event) => {
            event.stopPropagation();
            const index = Number(block.dataset.editBuiltBlock);
            const item = constructionPlan[activeBuildCell]?.[index];
            if (!item) return;
            activeBuildCycleId = item.cycleId || activeBuildCycleId;
            blockTeacherIds = teacherIdsForBlock(item);
            blockFacilityId = item.facilityId;
            blockActivityId = item.activityId || "";
            blockClass = item.schoolClass;
            blockClassLevel = classParts(item.schoolClass).level;
            blockTeacherClasses = item.teacherClasses && typeof item.teacherClasses === "object"
              ? Object.fromEntries(blockTeacherIds.map((teacherId) => [teacherId, item.teacherClasses[teacherId] || item.schoolClass || ""]).filter(([, schoolClass]) => schoolClass))
              : Object.fromEntries(blockTeacherIds.map((teacherId) => [teacherId, item.schoolClass || ""]).filter(([, schoolClass]) => schoolClass));
            blockTeacherClassLevels = Object.fromEntries(Object.entries(blockTeacherClasses).map(([teacherId, schoolClass]) => {
              const baseClassId = specialClassBaseIdFromSchoolId(schoolClass);
              return [teacherId, classParts(baseClassId || schoolClass).level];
            }));
            blockWeekLetter = item.weekLetter || "all";
            blockSecondTeacherHours = "";
            blockCoIntervention = Boolean(item.coIntervention);
            blockIsOption = Boolean(item.optionBlock);
            blockOptionId = item.optionId || "";
            blockOptionHours = item.optionHours ? String(item.optionHours) : "";
            blockOptionCycleIds = item.optionBlock ? normalizedOptionCycleIds(item.optionCycleIds) : [];
            editingBuildBlock = { index, ruleId: item.ruleId };
            render();
          });
        });
        document.querySelectorAll("[data-edit-cycle-details]").forEach((block) => {
          block.addEventListener("click", (event) => {
            event.stopPropagation();
            const key = block.dataset.blockKey;
            const index = Number(block.dataset.editCycleDetails);
            const item = constructionPlan[key]?.[index];
            if (!item) return;
            activeBuildCell = key;
            activeBuildCycleId = item.cycleId || activeConstructionCycleId;
            blockTeacherIds = teacherIdsForBlock(item);
            blockFacilityId = item.facilityId || "";
            blockActivityId = item.activityId || "";
            blockClass = item.schoolClass || "";
            blockClassLevel = classParts(item.schoolClass || "").level;
            blockTeacherClasses = item.teacherClasses && typeof item.teacherClasses === "object"
              ? Object.fromEntries(blockTeacherIds.map((teacherId) => [teacherId, item.teacherClasses[teacherId] || item.schoolClass || ""]).filter(([, schoolClass]) => schoolClass))
              : Object.fromEntries(blockTeacherIds.map((teacherId) => [teacherId, item.schoolClass || ""]).filter(([, schoolClass]) => schoolClass));
            blockTeacherClassLevels = Object.fromEntries(Object.entries(blockTeacherClasses).map(([teacherId, schoolClass]) => {
              const baseClassId = specialClassBaseIdFromSchoolId(schoolClass);
              return [teacherId, classParts(baseClassId || schoolClass).level];
            }));
            blockWeekLetter = item.weekLetter || "all";
            blockSecondTeacherHours = "";
            blockCoIntervention = Boolean(item.coIntervention);
            blockIsOption = Boolean(item.optionBlock);
            blockOptionId = item.optionId || "";
            blockOptionHours = item.optionHours ? String(item.optionHours) : "";
            blockOptionCycleIds = item.optionBlock ? normalizedOptionCycleIds(item.optionCycleIds) : [];
            editingBuildBlock = { index, ruleId: item.ruleId };
            render();
          });
        });
        document.querySelectorAll("[data-start-move-kind]").forEach((button) => {
          button.addEventListener("click", (event) => {
            event.stopPropagation();
            startMovingBuildBlock({
              type: button.dataset.startMoveKind,
              key: button.dataset.blockKey,
              index: Number(button.dataset.moveIndex),
              id: button.dataset.moveId
            }, event.clientX, event.clientY);
          });
        });
        document.querySelectorAll("[data-remove-cell]").forEach((button) => {
          button.addEventListener("click", (event) => {
            event.stopPropagation();
            const key = button.dataset.removeCell;
            const index = Number(button.dataset.removeIndex);
            removeConstructionBlock(key, index);
            render();
          });
        });
        document.querySelectorAll("[data-delete-cell-event]").forEach((button) => {
          button.addEventListener("click", (event) => {
            event.stopPropagation();
            excludeEventFromSlot(button.dataset.deleteCellEvent, button.dataset.deleteCellKey);
          });
        });
        document.querySelectorAll("[data-delete-cell-as]").forEach((button) => {
          button.addEventListener("click", (event) => {
            event.stopPropagation();
            excludeAsFromSlot(button.dataset.deleteCellAs, button.dataset.deleteCellKey);
          });
        });
        const deleteWholeCycle = document.getElementById("deleteWholeCycle");
        if (deleteWholeCycle) {
          deleteWholeCycle.addEventListener("click", () => {
            confirmBlockDeletion("cycle");
            render();
          });
        }
        const deleteSelectedSlot = document.getElementById("deleteSelectedSlot");
        if (deleteSelectedSlot) {
          deleteSelectedSlot.addEventListener("click", () => {
            confirmBlockDeletion("slot");
            render();
          });
        }
        document.querySelectorAll("#cancelBlockDelete, #cancelBlockDeleteTop").forEach((button) => {
          button.addEventListener("click", () => {
            pendingBlockDelete = null;
            render();
          });
        });
        const clearConstruction = document.getElementById("clearConstruction");
        if (clearConstruction) {
          clearConstruction.addEventListener("click", () => {
            clearConstructionPanelOpen = !clearConstructionPanelOpen;
            render();
          });
        }
        const cancelClearConstruction = document.getElementById("cancelClearConstruction");
        if (cancelClearConstruction) {
          cancelClearConstruction.addEventListener("click", () => {
            clearConstructionPanelOpen = false;
            render();
          });
        }
        const confirmClearConstruction = document.getElementById("confirmClearConstruction");
        if (confirmClearConstruction) {
          confirmClearConstruction.addEventListener("click", () => {
            const options = {
              construction: Boolean(document.querySelector("[data-clear-option='construction']")?.checked)
            };
            if (!options.construction) return;
            const firstConfirm = window.confirm("Supprimer uniquement les creneaux prof construits ?\n\nLes pre-requis, regles, AS et evenements sportifs seront conserves.");
            if (!firstConfirm) return;
            const typedConfirm = window.prompt("Deuxieme validation : tapez VIDER pour confirmer.");
            if (typedConfirm !== "VIDER") return;
            clearPlanningParts(options);
            showValidationPopup("Construction videe, pre-requis conserves");
            render();
          });
        }
        const openConstructionOptimizer = document.getElementById("openConstructionOptimizer");
        if (openConstructionOptimizer) {
          openConstructionOptimizer.addEventListener("click", () => {
            constructionOptimizeConfirmOpen = true;
            render();
          });
        }
        const closeConstructionOptimizer = () => {
          constructionOptimizeConfirmOpen = false;
          render();
        };
        ["cancelConstructionOptimizer", "cancelConstructionOptimizerFooter"].forEach((id) => {
          const button = document.getElementById(id);
          if (button) button.addEventListener("click", closeConstructionOptimizer);
        });
        const confirmConstructionOptimizer = document.getElementById("confirmConstructionOptimizer");
        if (confirmConstructionOptimizer) {
          confirmConstructionOptimizer.addEventListener("click", () => {
            constructionOptimizeConfirmOpen = false;
            constructionWorkspaceMode = "optimized";
            constructionBuildMode = "cycleDetails";
            const result = optimizeConstructionCycleDetails();
            saveConstructionWorkspaceMode();
            showValidationPopup(result.message);
            render();
          });
        }
        document.querySelectorAll("[data-construction-build-mode]").forEach((button) => {
          button.addEventListener("click", () => {
            constructionBuildMode = ["cycleDetails", "versions"].includes(button.dataset.constructionBuildMode) ? button.dataset.constructionBuildMode : "blocks";
            activeBuildCell = null;
            activeBuildCycleId = null;
            editingBuildBlock = null;
            movingBuildBlock = null;
            render();
          });
        });
        const saveConstructionVersionButton = document.getElementById("saveConstructionVersion");
        if (saveConstructionVersionButton) {
          saveConstructionVersionButton.addEventListener("click", () => {
            constructionVersionDraftName = `Version ${constructionVersions.length + 1}`;
            constructionVersionDraftParts = constructionVersionPartOptions().map((item) => item.id);
            constructionVersionPanelOpen = true;
            render();
          });
        }
        const constructionVersionName = document.getElementById("constructionVersionName");
        if (constructionVersionName) {
          constructionVersionName.addEventListener("input", () => {
            constructionVersionDraftName = constructionVersionName.value;
          });
        }
        document.querySelectorAll("[data-construction-version-part]").forEach((input) => {
          input.addEventListener("change", () => {
            const part = input.dataset.constructionVersionPart;
            constructionVersionDraftParts = input.checked
              ? [...constructionVersionDraftParts, part].filter((item, index, list) => list.indexOf(item) === index)
              : constructionVersionDraftParts.filter((item) => item !== part);
            render();
          });
        });
        document.querySelectorAll("#cancelConstructionVersionSave, #cancelConstructionVersionSaveTop").forEach((button) => {
          button.addEventListener("click", () => {
            constructionVersionPanelOpen = false;
            render();
          });
        });
        const confirmConstructionVersionSave = document.getElementById("confirmConstructionVersionSave");
        if (confirmConstructionVersionSave) {
          confirmConstructionVersionSave.addEventListener("click", () => {
            const options = constructionVersionPartOptions().map((item) => item.id);
            const selectedParts = constructionVersionDraftParts.filter((part, index) => options.includes(part) && constructionVersionDraftParts.indexOf(part) === index);
            if (!selectedParts.length) return;
            saveCurrentConstructionVersion(constructionVersionDraftName, selectedParts);
            constructionVersionPanelOpen = false;
            showValidationPopup("Version de construction sauvegardee");
            constructionBuildMode = "versions";
            render();
          });
        }
        document.querySelectorAll("[data-restore-construction-version]").forEach((button) => {
          button.addEventListener("click", () => {
            if (!window.confirm("Charger cette version dans la construction actuelle ?")) return;
            if (restoreConstructionVersion(button.dataset.restoreConstructionVersion)) showValidationPopup("Version recuperee");
            constructionBuildMode = "blocks";
            render();
          });
        });
        document.querySelectorAll("[data-delete-construction-version]").forEach((button) => {
          button.addEventListener("click", () => {
            const version = constructionVersions.find((item) => item.id === button.dataset.deleteConstructionVersion);
            if (!version || !window.confirm(`Supprimer la version ${constructionVersionLabel(version)} ?`)) return;
            constructionVersions = constructionVersions.filter((item) => item.id !== version.id);
            saveConstructionVersions();
            showValidationPopup("Version supprimee");
            render();
          });
        });
        document.querySelectorAll("[data-teacher]").forEach((button) => {
          button.addEventListener("click", () => {
            const teacherId = button.dataset.teacher;
            if (teacherId === "all") {
              selectedTeacherIds = teachers.map((teacher) => teacher.id);
            } else {
              const allSelected = selectedTeacherIds.length === teachers.length;
              if (allSelected) selectedTeacherIds = [teacherId];
              else if (selectedTeacherIds.includes(teacherId)) {
                selectedTeacherIds = selectedTeacherIds.filter((id) => id !== teacherId);
              } else {
                selectedTeacherIds = [...selectedTeacherIds, teacherId];
              }
            }
            render();
          });
        });
      }

      document.querySelectorAll("[data-week]").forEach((button) => {
        button.addEventListener("click", () => {
          if (button.disabled) return;
          if (!isAdmin() && (button.dataset.week === "build" || button.dataset.week === "alerts" || button.dataset.week === "log")) {
            authStatus = "Connexion admin requise.";
            render();
            return;
          }
          week = button.dataset.week;
          if (week === "current") displayedCurrentWeekRank = null;
          if (week === "build") constructionMode = button.dataset.buildMode || "planning";
          updateNavigationActive();
          render();
        });
      });
      render();
      if (cloudReady() && cloudConfig.autoLoad) {
        setTimeout(() => cloudLoadFromRemote(true, false, true), 300);
      } else {
        restartCloudAutoRefresh();
      }
    </script>
  </body>
</html>
