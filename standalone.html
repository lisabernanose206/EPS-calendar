        localStorage.setItem("planningEpsServiceHoursByLevel2026", JSON.stringify(serviceHoursByLevel));
        localStorage.setItem("planningEpsServiceAssignments2026", JSON.stringify(serviceAssignments));
        localStorage.setItem("planningEpsSchoolConstraints2026", JSON.stringify(schoolConstraints));
        localStorage.setItem(PREREQUISITE_LOCKS_KEY, JSON.stringify(prerequisiteLocks));
        localStorage.setItem(YEAR_PREREQUISITE_LOCKS_KEY, JSON.stringify(yearPrerequisiteLocks));
        localStorage.setItem(PREREQUISITES_LOCK_KEY, prerequisiteSubModes.every((mode) => prerequisiteLocked(mode)) ? "true" : "false");
        localStorage.setItem("planningEpsConstructionWorkspaceMode2026", constructionWorkspaceMode);
        localStorage.setItem("planningEpsConstructionVersions2026", JSON.stringify(constructionVersions));
        localStorage.setItem("planningEpsConstructionLocks2026", JSON.stringify(constructionLocks));
        localStorage.setItem("planningEpsConstructionRuleSettings2026", JSON.stringify(constructionRuleSettings));
        localStorage.setItem("planningEpsConstructionRules2026", JSON.stringify(constructionRules));
        localStorage.setItem("planningEpsConstruction2026", JSON.stringify(constructionPlan));
        localStorage.setItem("planningEpsBlockExclusions2026", JSON.stringify(blockExclusions));
        localStorage.setItem("planningEpsSportEvents2026", JSON.stringify(sportEvents));
        localStorage.setItem("planningEpsAsSessions2026", JSON.stringify(asSessions));
        localStorage.setItem("planningEpsFacilityUnavailability2026", JSON.stringify(facilityUnavailability));
        localStorage.setItem("planningEpsEventExclusions2026", JSON.stringify(eventExclusions));
        localStorage.setItem("planningEpsAsExclusions2026", JSON.stringify(asExclusions));
        invalidateConstructionChecksCache();
      }

      function scheduleCloudSave(keys = []) {
        if (!isAdmin()) {
          cloudStatus = "Modification refusee : rechargement de la source Supabase.";
          discardLocalChangesFromCloudSoon();
          return;
        }
        if (!cloudReady()) {
          cloudStatus = "Modification refusee : cloud non configure.";
          return;
        }
        if (!cloudConfig.autoSave) {
          cloudStatus = "Modification refusee : autosauvegarde cloud desactivee.";
          discardLocalChangesFromCloudSoon();
          return;
        }
        if (!cloudWriteAllowed()) {
          cloudStatus = cloudWriteBlockedMessage();
          discardLocalChangesFromCloudSoon();
          return;
        }
        markLocalChangedForCloud(keys);
        if (cloudSyncing) {
          cloudSaveQueued = true;
          return;
        }
        clearTimeout(cloudSaveTimer);
        cloudStatus = "Sauvegarde cloud en attente...";
        cloudSaveTimer = setTimeout(() => cloudSaveToRemote(false), 900);
      }

      async function cloudSaveToRemote(shouldRender = true) {
        clearTimeout(cloudSaveTimer);
        cloudSaveTimer = null;
        let cloudSaveSucceeded = false;
        let shouldDiscardLocalChanges = false;
        const changedKeys = [...cloudDirtyKeys].filter((key) => cloudDataKeys.includes(key));
        if (!isAdmin()) {
          cloudStatus = "Lecture seule : connexion admin requise pour sauvegarder.";
          discardLocalChangesFromCloudSoon();
          if (shouldRender) render();
          return;
        }
        if (!cloudReady()) {
          cloudStatus = "Cloud non configuré.";
          if (shouldRender) render();
          return;
        }
        if (!cloudWriteAllowed()) {
          cloudStatus = cloudWriteBlockedMessage();
          discardLocalChangesFromCloudSoon();
          if (shouldRender) render();
          return;
        }
        if (!changedKeys.length) {
          cloudStatus = "Aucune modification locale recente a envoyer. Supabase reste la source officielle.";
          clearLocalChangedForCloud();
          if (shouldRender) render();
          return;
        }
        cloudSyncing = true;
        cloudStatus = "Sauvegarde cloud en cours...";
        if (shouldRender) render();
        try {
          const updatedAt = new Date().toISOString();
          const currentData = collectPlanningData();
          const remoteResponse = await fetch(`${cloudEndpoint()}?select=data,updated_at&id=eq.${encodeURIComponent(cloudConfig.planningId)}`, {
            headers: cloudHeaders()
          });
          if (!remoteResponse.ok) throw new Error(await remoteResponse.text());
          const remoteRows = await remoteResponse.json();
          const remoteData = remoteRows[0]?.data && typeof remoteRows[0].data === "object" ? remoteRows[0].data : null;
          const dataToSave = remoteData
            ? { ...remoteData, version: currentData.version, planningId: cloudConfig.planningId, savedAt: updatedAt }
            : { ...currentData, savedAt: updatedAt };
          if (remoteData) {
            changedKeys.forEach((key) => {
              dataToSave[key] = currentData[key];
            });
          }
          const response = await fetch(`${cloudEndpoint()}?on_conflict=id`, {
            method: "POST",
            headers: cloudHeaders({ Prefer: "resolution=merge-duplicates,return=minimal" }),
            body: JSON.stringify({ id: cloudConfig.planningId, data: dataToSave, updated_at: updatedAt })
          });
          if (!response.ok) throw new Error(await response.text());
          cloudSaveSucceeded = true;
          cloudLastUpdatedAt = updatedAt;
          cloudStatus = `Sauvegardé dans le cloud à ${new Date().toLocaleTimeString("fr-FR", { hour: "2-digit", minute: "2-digit" })} (${changedKeys.length} zone${changedKeys.length > 1 ? "s" : ""}).`;
        } catch (error) {
          const message = error.message || "sauvegarde impossible";
          cloudStatus = message.includes("42501") || message.includes("permission denied")
            ? "Erreur cloud : droits Supabase manquants. Dans Supabase SQL Editor, lance GRANT INSERT, SELECT, UPDATE ON public.eps_plannings TO anon, authenticated;"
            : `Erreur cloud : ${message}`;
          shouldDiscardLocalChanges = true;
        } finally {
          cloudSyncing = false;
          if (cloudSaveSucceeded && !cloudSaveQueued) clearLocalChangedForCloud();
          if (cloudSaveQueued) {
            cloudSaveQueued = false;
            scheduleCloudSave();
          } else if (shouldDiscardLocalChanges) {
            discardLocalChangesFromCloudSoon();
          }
          if (shouldRender) render();
        }
      }

      function cloudRemoteIsNewer(updatedAt) {
        if (!updatedAt) return true;
        if (!cloudLastUpdatedAt) return true;
        return updatedAt !== cloudLastUpdatedAt;
      }

      async function cloudLoadFromRemote(shouldRender = true, silent = false, forceApply = false) {
        if (!cloudReady()) {
          cloudStatus = "Cloud non configuré.";
          if (shouldRender) render();
          return;
        }
        if (cloudSaveTimer || cloudSaveQueued) {
          if (!silent) cloudStatus = "Chargement reporte : une sauvegarde locale est en attente.";
          if (shouldRender) render();
          return;
        }
        clearLocalChangedForCloud();
        cloudSyncing = true;
        if (!silent) cloudStatus = "Chargement depuis le cloud...";
        if (shouldRender) render();
        try {
          const response = await fetch(`${cloudEndpoint()}?select=data,updated_at&id=eq.${encodeURIComponent(cloudConfig.planningId)}`, {
            headers: cloudHeaders()
          });
          if (!response.ok) throw new Error(await response.text());
          const rows = await response.json();
          if (!rows.length) {
            if (!silent) cloudStatus = "Aucune sauvegarde cloud trouvée pour cet identifiant.";
          } else if (!forceApply && !cloudRemoteIsNewer(rows[0].updated_at)) {
            if (!silent) cloudStatus = `Données déjà à jour (${new Date(rows[0].updated_at).toLocaleString("fr-FR")}).`;
          } else {
            applyPlanningData(rows[0].data);
            cloudLastUpdatedAt = rows[0].updated_at;
            cloudStatus = `Données cloud chargées (${new Date(rows[0].updated_at).toLocaleString("fr-FR")}).`;
            if (silent) showValidationPopup("Synchronisation cloud reçue");
          }
        } catch (error) {
          if (!silent) cloudStatus = `Erreur cloud : ${error.message || "chargement impossible"}`;
        } finally {
          cloudSyncing = false;
          if (shouldRender) render();
        }
      }

      function restartCloudAutoRefresh() {
        clearInterval(cloudRefreshTimer);
        cloudRefreshTimer = null;
      }

      function setCycleCount(count) {
        const targetCycles = activeCycles();
        const safeCount = Math.max(1, Math.min(12, Number(count) || 1));
        const defaults = defaultCycles(safeCount);
        const nextCycles = Array.from({ length: safeCount }, (_, index) => targetCycles[index] || cycleForScope(defaults[index], activeCycleScope));
        setActiveCycles(nextCycles);
        if (!activeCycles().some((cycle) => cycle.id === activeCycleId)) activeCycleId = activeCycles()[0]?.id || "";
        saveCycles();
        rebuildConstructionPlan();
      }

      function activeCycle() {
        return activeCycles().find((cycle) => cycle.id === activeCycleId) || activeCycles()[0];
      }

      function cycleForScope(cycle, scope) {
        if (scope === "default") return cycle;
        return {
          ...cycle,
          id: cycle.id.startsWith(`${scope}-`) ? cycle.id : `${scope}-${cycle.id}`,
          name: cycle.name
        };
      }

      function ensureCyclesForLevel(level) {
        if (!classLevels.includes(level)) return cycles;
        if (!Array.isArray(cyclesByLevel[level]) || !cyclesByLevel[level].length) {
          cyclesByLevel[level] = cycles.map((cycle) => cycleForScope(cycle, level));
        }
        return cyclesByLevel[level];
      }

      function cyclesForScope(scope) {
        return scope === "default" ? cycles : ensureCyclesForLevel(scope);
      }

      function activeCycles() {
        return cyclesForScope(activeCycleScope);
      }

      function setActiveCycles(nextCycles) {
        if (activeCycleScope === "default") cycles = nextCycles;
        else cyclesByLevel[activeCycleScope] = nextCycles;
      }

      function isWorkdayDate(value) {
        const day = dateOnly(value).getDay();
        return day >= 1 && day <= 5;
      }

      function cycleDateRange(cycle) {
        return {
          start: dateOnly(cycle.start),
          end: dateOnly(cycle.end)
        };
      }

      function cyclesOverlap(firstCycle, secondCycle) {
        const first = cycleDateRange(firstCycle);
        const second = cycleDateRange(secondCycle);
        return first.start <= second.end && second.start <= first.end;
      }

      function validateCycle(cycle, cycleList = activeCycles()) {
        if (!cycle.start || !cycle.end) return `${cycle.name} : renseignez une date de debut et une date de fin.`;
        if (cycleDateRange(cycle).start > cycleDateRange(cycle).end) return `${cycle.name} : la date de fin doit etre apres la date de debut.`;
        if (!isWorkdayDate(cycle.start) || !isWorkdayDate(cycle.end)) return `${cycle.name} : les dates doivent commencer et finir un jour travaille, du lundi au vendredi.`;
        const overlapping = cycleList.find((item) => item.id !== cycle.id && cyclesOverlap(cycle, item));
        if (overlapping) return `${cycle.name} se superpose avec ${overlapping.name}.`;
        return "";
      }

      function validateCycles(cycleList = activeCycles()) {
        return cycleList.map((cycle) => validateCycle(cycle, cycleList)).filter(Boolean);
      }

      function cyclesForClassLevel(level) {
        return classLevels.includes(level) && Array.isArray(cyclesByLevel[level]) && cyclesByLevel[level].length
          ? cyclesByLevel[level]
          : cycles;
      }

      function allCycleSets() {
        return [
          { scope: "default", cycles },
          ...classLevels.map((level) => ({ scope: level, cycles: cyclesForClassLevel(level) }))
        ];
      }

      function userCycleChoices() {
        const levelCycles = classLevels
          .filter((level) => Array.isArray(cyclesByLevel[level]) && cyclesByLevel[level].length)
          .flatMap((level) => cyclesByLevel[level].map((cycle) => ({ ...cycle, scope: level, displayName: `${cycle.name.replace("Cycle ", "C")} · ${level}` })));
        return [
          ...cycles.map((cycle) => ({ ...cycle, scope: "default", displayName: cycle.name.replace("Cycle ", "C") })),
          ...levelCycles
        ];
      }

      function dateOnly(value) {
        return new Date(`${value}T00:00:00`);
      }

      function formatDate(value) {
        return dateOnly(value).toLocaleDateString("fr-FR", { day: "2-digit", month: "2-digit", year: "numeric" });
      }

      function monthKeyForDate(value) {
        const date = value instanceof Date ? new Date(value) : value ? dateOnly(value) : new Date(schoolYear.start);
        return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}`;
      }

      function dateFromMonthKey(value) {
        const [year, month] = (value || monthKeyForDate(schoolYear.start)).split("-").map(Number);
        return new Date(year, month - 1, 1);
      }

      function shiftMonthKey(value, delta) {
        const date = dateFromMonthKey(value);
        date.setMonth(date.getMonth() + delta);
        return monthKeyForDate(dateKey(date));
      }

      function dateRangeLabel(start, end) {
        return start && end ? `${formatDate(start)} -> ${formatDate(end)}` : "Choisir une periode";
      }

      function renderDateRangePicker(id, start, end, disabled = false) {
        const isOpen = activeDateRangePicker === id;
        const monthDate = dateFromMonthKey(isOpen ? dateRangeMonth : monthKeyForDate(start || schoolYear.start));
        const monthLabel = monthDate.toLocaleDateString("fr-FR", { month: "long", year: "numeric" });
        const firstDay = new Date(monthDate);
        const startOffset = (firstDay.getDay() || 7) - 1;
        const daysInMonth = new Date(monthDate.getFullYear(), monthDate.getMonth() + 1, 0).getDate();
        const draftStart = isOpen ? dateRangeDraftStart : start;
        const draftEnd = isOpen ? dateRangeDraftEnd : end;
        const dayButtons = [
          ...Array.from({ length: startOffset }, () => `<span class="dateRangeDay blank"></span>`),
          ...Array.from({ length: daysInMonth }, (_, index) => {
            const day = index + 1;
            const value = dateKey(new Date(monthDate.getFullYear(), monthDate.getMonth(), day));
            const selected = value === draftStart || value === draftEnd;
            const inRange = draftStart && draftEnd && value > draftStart && value < draftEnd;
            const blockedReason = dateRangeBlockedReason(value);
            return `<button type="button" class="dateRangeDay ${selected ? "selected" : ""} ${inRange ? "inRange" : ""} ${blockedReason ? "blocked" : ""}" data-date-range-day="${value}" ${blockedReason ? `disabled title="${blockedReason}"` : ""}>${day}</button>`;
          })
        ].join("");
        return `<div class="dateRangeField">
          <button class="dateRangeButton" data-open-date-range="${id}" data-range-start="${start || ""}" data-range-end="${end || ""}" ${disabled ? "disabled" : ""}>${dateRangeLabel(start, end)}</button>
          ${isOpen ? `<div class="dateRangePicker">
            <div class="dateRangeHead">
              <button type="button" data-date-range-month="-">‹</button>
              <strong>${monthLabel}</strong>
              <button type="button" data-date-range-month="+">›</button>
            </div>
            <div class="dateRangeGrid">${["L", "M", "M", "J", "V", "S", "D"].map((day) => `<span class="dateRangeWeekday">${day}</span>`).join("")}${dayButtons}</div>
            <span class="dateRangeHint ${dateRangeSelectionError ? "error" : ""}">${dateRangeSelectionError || (dateRangeDraftStart && !dateRangeDraftEnd ? "Choisissez la date de fin." : "Choisissez la date de debut.")}</span>
            <div class="dateRangeActions">
              <button type="button" class="dateRangeValidate" data-validate-date-range="${id}" ${dateRangeDraftStart && dateRangeDraftEnd ? "" : "disabled"}>Valider les dates</button>
            </div>
          </div>` : ""}
        </div>`;
      }

      function applyDateRangeSelection(id, start, end) {
        if (!start || !end) return;
        if (id === "event") {
          eventStart = start;
          eventEnd = end;
          return;
        }
        if (id === "as") {
          asStart = start;
          asEnd = end;
          return;
        }
        if (id === "unavailable") {
          unavailableStart = start;
          unavailableEnd = end;
          return;
        }
        if (id.startsWith("cycle:")) {
          const cycleId = id.replace("cycle:", "");
          const cycle = activeCycles().find((item) => item.id === cycleId);
          if (!cycle) return;
          cycle.start = start;
          cycle.end = end;
          const cycleErrors = validateCycles(activeCycles());
          if (cycleErrors.length) {
            cycleSaveStatus = cycleErrors[0];
            return;
          }
          saveCycles();
          rebuildConstructionPlan();
        }
      }

      function shortDate(value) {
        return value.toLocaleDateString("fr-FR", { day: "numeric", month: "short" });
      }

      function weekDisplayStart(weekItem) {
        return weekItem.start;
      }

      function weekDisplayEnd(weekItem) {
        const friday = new Date(weekItem.start);
        friday.setDate(weekItem.start.getDate() + 4);
        return friday > schoolYear.end ? schoolYear.end : friday;
      }

      function weekDateLabel(weekItem) {
        return `du ${shortDate(weekDisplayStart(weekItem))} au ${shortDate(weekDisplayEnd(weekItem))}`;
      }

      function weekWorkingDaysLabel(weekItem) {
        return days.map((day, index) => {
          const date = new Date(weekItem.start);
          date.setDate(weekItem.start.getDate() + index);
          return date.toLocaleDateString("fr-FR", { weekday: "long", day: "numeric", month: "short" });
        }).join(", ");
      }

      function weeksForCycle(cycle) {
        const start = dateOnly(cycle.start);
        const end = dateOnly(cycle.end);
        return schoolYearWeeks().filter((weekItem) => weekItem.end >= start && weekItem.start <= end);
      }

      function classicConstructionCycles() {
        return cycles.slice(0, 4);
      }

      function activeConstructionCycle() {
        const choices = classicConstructionCycles();
        if (!choices.some((cycle) => cycle.id === activeConstructionCycleId)) activeConstructionCycleId = choices[0]?.id || "";
        return choices.find((cycle) => cycle.id === activeConstructionCycleId) || choices[0] || null;
      }

      function representativeWeekForCycle(cycle, letter = "") {
        const cycleWeeks = weeksForCycle(cycle);
        if (!cycleWeeks.length) return null;
        const isRequestedLetter = (weekItem) => !["A", "B"].includes(letter) || weekItem.letter === letter;
        const usableWeeks = cycleWeeks.filter((weekItem) =>
          isRequestedLetter(weekItem)
          && days.every((day) => {
            const rowDate = rowDateForWeek({ day }, weekItem);
            const inVacation = schoolVacations().some((vacation) => rowDate >= dateOnly(vacation.start) && rowDate <= dateOnly(vacation.end));
            const holiday = schoolYearHolidays().has(dateKey(rowDate));
            return !inVacation && !holiday;
          })
        );
        if (usableWeeks.length) return usableWeeks[0];
        if (letter === "A" || letter === "B") return cycleWeeks.find((weekItem) => weekItem.letter === letter) || cycleWeeks[0];
        return cycleWeeks[0];
      }

      function cycleForWeek(weekItem, classLevel = "") {
        return cyclesForClassLevel(classLevel).find((cycle) => weeksForCycle(cycle).some((cycleWeek) => cycleWeek.rank === weekItem.rank));
      }

      function findCycleForRule(rule) {
        const level = rule.classLevel || classParts(rule.block?.schoolClass || "").level || "";
        return cyclesForClassLevel(level).find((item) => item.id === rule.cycleId)
          || cycles.find((item) => item.id === rule.cycleId)
          || allCycleSets().flatMap((set) => set.cycles).find((item) => item.id === rule.cycleId);
      }

      function plannedHoursForWeeks(weeks) {
        const rows = yearRows();
        const stats = Object.fromEntries(teachers.map((teacher) => [teacher.id, {
          total: 0,
          details: []
        }]));
        weeks.forEach((weekItem) => {
          rows.forEach((row) => {
            if (row.isAs) return;
            if (vacationForCell(row, weekItem) || holidayFor(row, weekItem)) return;
            const key = yearCellKey(row.id, weekItem.rank);
            (constructionPlan[key] || []).forEach((item) => {
              teacherIdsForBlock(item).forEach((teacherId) => {
                if (!stats[teacherId]) return;
                const blockHours = effectiveTeacherHoursForBlock(item, teacherId, fullServiceSlotHours(row));
                stats[teacherId].total += blockHours;
                stats[teacherId].details.push({
                  week: weekItem,
                  day: row.day,
                  slot: row.slot,
                  hours: blockHours,
                  schoolClass: item.schoolClass || "Classe",
                  facility: item.facilityLabel || "Installation"
                });
              });
            });
          });
        });
        return stats;
      }

      function asHoursForWeeks(weeks) {
        const rows = yearRows().filter((row) => row.isAs);
        const stats = Object.fromEntries(teachers.map((teacher) => [teacher.id, 0]));
        weeks.forEach((weekItem) => {
          rows.forEach((row) => {
            const duration = row.day === "Mercredi" ? 2.5 : 0.75;
            asSessionsForCell(row, weekItem).forEach((session) => {
              (session.teacherIds || []).forEach((teacherId) => {
                if (stats[teacherId] === undefined) return;
                stats[teacherId] += duration;
              });
            });
          });
        });
        return stats;
      }

      function completeCycleCourseAverages() {
        const rows = yearRows();
        const workingRanks = new Set(workingSchoolWeeks().map((weekItem) => weekItem.rank));
        const byTeacher = Object.fromEntries(teachers.map((teacher) => [teacher.id, {
          total: 0,
          weeks: 0,
          classes: new Set(),
          cycles: []
        }]));
        const cycleEntries = allCycleSets()
          .flatMap((set) => set.cycles)
          .filter((cycle, index, list) => list.findIndex((item) => item.id === cycle.id) === index);
        cycleEntries.forEach((cycle) => {
          const cycleWeeks = weeksForCycle(cycle).filter((weekItem) => workingRanks.has(weekItem.rank));
          teachers.forEach((teacher) => {
            const cycleStats = { total: 0, weeks: cycleWeeks.length, classes: new Set() };
            annualConstructionRules().filter((rule) => constructionCyclesForRule(rule).some((item) => item.id === cycle.id)).forEach((rule) => {
              const row = rows.find((item) => item.id === rule.rowId);
              if (!row || row.isAs) return;
              cycleWeeks.forEach((weekItem) => {
                if (rule.weekLetter && rule.weekLetter !== "all" && rule.weekLetter !== weekItem.letter) return;
                if (vacationForCell(row, weekItem) || holidayFor(row, weekItem)) return;
                const block = blockWithCycleOverride(rule, cycle);
                const teacherIds = teacherIdsForBlock(block);
                if (!teacherIds.includes(teacher.id)) return;
                cycleStats.total += effectiveTeacherHoursForBlock(block, teacher.id, fullServiceSlotHours(row));
                classesForBlock(block).forEach((schoolClass) => cycleStats.classes.add(schoolClass));
              });
            });
            const average = cycleStats.weeks ? Math.round((cycleStats.total / cycleStats.weeks) * 10) / 10 : 0;
            byTeacher[teacher.id].total += cycleStats.total;
            byTeacher[teacher.id].weeks += cycleStats.weeks;
            cycleStats.classes.forEach((schoolClass) => byTeacher[teacher.id].classes.add(schoolClass));
            byTeacher[teacher.id].cycles.push({ name: cycle.name.replace("Cycle ", "C"), average });
          });
        });
        return byTeacher;
      }

      function uniqueClasses(details) {
        return [...new Set(details.map((detail) => detail.schoolClass))].sort((a, b) => a.localeCompare(b, "fr"));
      }

      function weeksInSameSchoolMonth(weekItem) {
        const reference = displayDateForSchoolWeek(weekItem);
        return schoolYearWeeks().filter((item) => {
          const displayed = displayDateForSchoolWeek(item);
          return displayed.getMonth() === reference.getMonth() && displayed.getFullYear() === reference.getFullYear();
        });
      }

      function workingSchoolWeeks() {
        return schoolYearWeeks().filter((weekItem) =>
          yearRows().some((row) => !vacationForCell(row, weekItem) && !holidayFor(row, weekItem))
        );
      }

      function monthLabelForWeek(weekItem) {
        return displayDateForSchoolWeek(weekItem).toLocaleDateString("fr-FR", { month: "short" });
      }

      function compactClassName(schoolClass) {
        const { level, number, group, special, label, baseClassId } = classParts(schoolClass);
        if (special) {
          const item = specialClassFromSchoolId(schoolClass);
          const baseLabel = baseClassId ? compactClassName(baseClassId) : specialClassBaseLabel(item);
          return baseClassId ? `${baseLabel} ${label || "Specifique"}` : `${label || "Classe spec."}${baseLabel !== "Non rattachee" ? ` (${baseLabel})` : ""}`;
        }
        if (!level || !number) return (schoolClass || "").replace("eme ", "e").replace("eme", "e").replace(/\s+/g, "");
        return `${level.replace("eme", "e")}${number}${group === "whole" ? "" : group}`;
      }

      function eventClassSummary(event) {
        const selectedClasses = [...new Set(event.classes || [])];
        if (!selectedClasses.length) return "Classes";
        const labels = [];
        classLevels.forEach((level) => {
          const wholeLevelClasses = classesForLevel(level);
          if (wholeLevelClasses.every((schoolClass) => selectedClasses.includes(schoolClass))) labels.push(level);
        });
        selectedClasses.forEach((schoolClass) => {
          const { level } = classParts(schoolClass);
          const wholeLevelClasses = classesForLevel(level);
          if (classLevels.includes(level) && wholeLevelClasses.every((item) => selectedClasses.includes(item))) return;
          labels.push(compactClassName(schoolClass));
        });
        return labels.join(", ");
      }

      function eventShortName(name) {
        const words = (name || "EV")
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "")
          .replace(/[^a-zA-Z0-9 ]/g, " ")
          .trim()
          .split(/\s+/)
          .filter(Boolean);
        if (!words.length) return "EV";
        if (words.length === 1) return words[0].slice(0, 4).toUpperCase();
        return words.map((word) => word[0]).join("").slice(0, 5).toUpperCase();
      }

      function facilityShortLabel(facilityId, fallbackLabel = "") {
        const stopWords = new Set(["salle", "de", "du", "des", "la", "le", "les", "l", "d", "municipal", "municipale", "interne", "externe"]);
        const simplify = (value) => (value || "")
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "")
          .toLowerCase()
          .replace(/[^a-z0-9 ]/g, " ")
          .trim();
        const baseToken = (facility) => {
          const words = simplify(facility.label || facility.id).split(/\s+/).filter(Boolean);
          return words.find((word) => !stopWords.has(word)) || words[0] || simplify(facility.id) || "inst";
        };
        const tokenForDisplay = (facility) => {
          const words = (facility.label || facility.id || "").replace(/[-_]/g, " ").split(/\s+/).filter(Boolean);
          return words.find((word) => !stopWords.has(simplify(word))) || words[0] || facility.id || fallbackLabel || "Inst";
        };
        const current = facilities.find((facility) => facility.id === facilityId) || { id: facilityId, label: fallbackLabel };
        const currentBase = baseToken(current);
        const currentDisplay = tokenForDisplay(current);
        const otherBases = facilities
          .filter((facility) => facility.id !== current.id)
          .map(baseToken);
        let length = 1;
        while (length < currentBase.length && otherBases.some((base) => base.slice(0, length) === currentBase.slice(0, length))) length += 1;
        const shortLabel = currentDisplay.slice(0, Math.max(1, length));
        return shortLabel ? shortLabel[0].toUpperCase() + shortLabel.slice(1) : "";
      }

      function groupedHeaderCells(weeks, labelForWeek, classForWeek) {
        const groups = [];
        weeks.forEach((weekItem) => {
          const label = labelForWeek(weekItem);
          const className = classForWeek(weekItem);
          const last = groups[groups.length - 1];
          if (last && last.label === label && last.className === className) last.span += 1;
          else groups.push({ label, className, span: 1 });
        });
        return groups.map((group) => `<th class="${group.className}" colspan="${group.span}">${group.label}</th>`).join("");
      }

      function hourStatus(diff) {
        if (diff < -0.25) return { label: "À compléter", className: "statusLow" };
        if (diff > 0.25) return { label: "Au-dessus", className: "statusHigh" };
        return { label: "Équilibré", className: "statusOk" };
      }

      function escapeHtml(value) {
        return String(value || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function applyBlockToCycle(rowId, cycleId, block, weekLetter = "all") {
        const classLevel = classParts(block.schoolClass).level;
        const cycle = cyclesForClassLevel(classLevel).find((item) => item.id === cycleId) || cycles.find((item) => item.id === cycleId);
        if (!cycle) return;
        constructionRules.push({
          id: `rule-${Date.now()}-${Math.random().toString(16).slice(2)}`,
          rowId,
          cycleId: cycle.id,
          classLevel,
          weekLetter,
          block
        });
        rebuildConstructionPlan();
      }

      function skeletonBlockForStorage(block) {
        const { facilityId, facilityLabel, activityId, activityLabel, ...storedBlock } = blockForRuleStorage(block);
        return storedBlock;
      }

      function applyAnnualConstructionBlock(rowId, block, weekLetter = "all") {
        const classLevel = classParts(block.schoolClass).level;
        constructionRules.push({
          id: `rule-${Date.now()}-${Math.random().toString(16).slice(2)}`,
          rowId,
          cycleId: "year",
          scope: "year",
          classLevel,
          weekLetter,
          block: skeletonBlockForStorage(block),
          cycleOverrides: {}
        });
        rebuildConstructionPlan();
      }

      function updateConstructionRule(ruleId, block, weekLetter = "all", weekItem = null) {
        const rule = constructionRules.find((item) => item.id === ruleId);
        if (!rule) return;
        const classLevel = classParts(block.schoolClass).level;
        const targetCycle = weekItem ? cycleForWeek(weekItem, classLevel) : null;
        rule.block = block;
        rule.classLevel = classLevel;
        if (targetCycle) rule.cycleId = targetCycle.id;
        rule.weekLetter = weekLetter;
        rebuildConstructionPlan();
      }

      function updateAnnualConstructionRule(ruleId, block, weekLetter = "all") {
        const rule = constructionRules.find((item) => item.id === ruleId);
        if (!rule) return;
        rule.block = skeletonBlockForStorage(block);
        rule.classLevel = classParts(block.schoolClass).level;
        rule.cycleId = "year";
        rule.scope = "year";
        rule.weekLetter = weekLetter;
        if (!rule.cycleOverrides) rule.cycleOverrides = {};
        rebuildConstructionPlan();
      }

      function updateConstructionRuleCycleDetails(ruleId, cycleId, block) {
        const rule = constructionRules.find((item) => item.id === ruleId);
        if (!rule || !cycleId) return;
        rule.cycleOverrides = {
          ...(rule.cycleOverrides || {}),
          [cycleId]: {
            facilityId: block.facilityId || "",
            activityId: block.activityId || ""
          }
        };
        rebuildConstructionPlan();
      }

      function constructionRuleAppliesToCycle(rule, cycle) {
        return constructionCyclesForRule(rule).some((item) => item.id === cycle.id);
      }

      function constructionRuleSettingEnabled(id) {
        return constructionRuleSettings.some((rule) => rule.id === id);
      }

      function rulesShareCycleWeeks(firstRule, secondRule, cycle) {
        const firstLetter = firstRule.weekLetter || "all";
        const secondLetter = secondRule.weekLetter || "all";
        return weeksForCycle(cycle).some((weekItem) =>
          (firstLetter === "all" || firstLetter === weekItem.letter)
          && (secondLetter === "all" || secondLetter === weekItem.letter)
        );
      }

      function optimizedCandidateBlock(rule, facility, activity) {
        return {
          ...rule.block,
          facilityId: facility?.id || "",
          facilityLabel: facility?.label || "",
          activityId: activity?.id || "",
          activityLabel: activity?.label || ""
        };
      }

      function optimizedCycleCandidates(rule, cycle) {
        if (!rule?.block || rule.block.optionBlock) return [];
        const enforceActivityLinks = constructionRuleSettingEnabled("facility-activity-link");
        const enforceUnavailableFacilities = constructionRuleSettingEnabled("facility-unavailable");
        const enforceProgram = constructionRuleSettingEnabled("class-activity-program");
        const level = rule.classLevel || classParts(rule.block?.schoolClass || "").level || "";
        const programActivityIds = enforceProgram ? (activityProgramByLevel[level] || []) : [];
        return facilities.flatMap((facility) => {
          const linkedActivities = activitiesForFacility(facility.id);
          const activityChoices = enforceActivityLinks
            ? (linkedActivities.length ? linkedActivities : [null])
            : activities;
          return activityChoices
            .filter((activity) => !enforceProgram || !programActivityIds.length || (activity && programActivityIds.includes(activity.id)))
            .map((activity) => optimizedCandidateBlock(rule, facility, activity))
            .filter((block) => !enforceUnavailableFacilities || !blockCycleUnavailableMessage(rule.rowId, cycle.id, block, rule.weekLetter || "all"));
        });
      }

      function optimizedRuleClassKeys(rule) {
        return classesForBlock(rule.block).filter(Boolean);
      }

      function optimizedCycleActivityLimitForClass(schoolClass) {
        return classParts(schoolClass).level === "6eme" && constructionRuleSettingEnabled("sixth-grade-dual-activity-swimming") ? 2 : 1;
      }

      function optimizedSwimmingActivityIds() {
        const swimmingFacilityIds = facilities
          .filter((facility) => /piscine|natation/i.test(String(facility.label || "").normalize("NFD").replace(/[\u0300-\u036f]/g, "")))
          .map((facility) => facility.id);
        const linkedSwimmingActivityIds = swimmingFacilityIds.flatMap((facilityId) => facilityActivities[facilityId] || []);
        return [...new Set([
          ...activities
          .filter((activity) => /natation|piscine/i.test(String(activity.label || "").normalize("NFD").replace(/[\u0300-\u036f]/g, "")))
          .map((activity) => activity.id),
          ...linkedSwimmingActivityIds
        ])];
      }

      function optimizedCycleIsSixthSwimmingCycle(cycle) {
        return classicConstructionCycles().slice(0, 3).some((item) => item.id === cycle.id);
      }

      function optimizedCandidateViolatesClassCycleActivity(rule, cycle, block, usage) {
        if (!block.activityId) return false;
        const enforceSingleActivity = constructionRuleSettingEnabled("class-single-activity-per-cycle");
        const enforceSixthProgram = constructionRuleSettingEnabled("sixth-grade-dual-activity-swimming");
        if (!enforceSingleActivity && !enforceSixthProgram) return false;
        return optimizedRuleClassKeys(rule).some((schoolClass) => {
          const key = `${schoolClass}::${cycle.id}`;
          const existing = usage.classCycleActivities.get(key) || new Set();
          const isSixth = classParts(schoolClass).level === "6eme" && enforceSixthProgram;
          if (isSixth && existing.size === 1 && existing.has(block.activityId)) return true;
          if (existing.has(block.activityId)) return false;
          return existing.size >= optimizedCycleActivityLimitForClass(schoolClass);
        });
      }

      function optimizedSwimmingPenalty(rule, cycle, block, usage) {
        if (!constructionRuleSettingEnabled("sixth-grade-dual-activity-swimming")) return 0;
        const swimmingIds = optimizedSwimmingActivityIds();
        if (!swimmingIds.length) return 0;
        return optimizedRuleClassKeys(rule).reduce((sum, schoolClass) => {
          if (classParts(schoolClass).level !== "6eme") return sum;
          const isSwimming = swimmingIds.includes(block.activityId);
          const classCycleKey = `${schoolClass}::${cycle.id}`;
          const currentActivities = usage.classCycleActivities.get(classCycleKey) || new Set();
          const hasSwimmingThisCycle = [...currentActivities].some((activityId) => swimmingIds.includes(activityId));
          const firstThreeCycle = optimizedCycleIsSixthSwimmingCycle(cycle);
          if (firstThreeCycle && !hasSwimmingThisCycle && !isSwimming) return sum + 5000;
          if (firstThreeCycle && hasSwimmingThisCycle && isSwimming) return sum + 600;
          if (!firstThreeCycle && isSwimming) return sum + 900;
          if (currentActivities.size === 1 && currentActivities.has(block.activityId)) return sum + 450;
          return sum;
        }, 0);
      }

      function optimizedSeasonalLocationPenalty(cycle, block) {
        if (!constructionRuleSettingEnabled("seasonal-location-preference")) return 0;
        const cyclesList = classicConstructionCycles();
        if (cyclesList.length < 2) return 0;
        const cycleIndex = cyclesList.findIndex((item) => item.id === cycle.id);
        if (cycleIndex < 0) return 0;
        const locationType = facilities.find((facility) => facility.id === block.facilityId)?.locationType || "";
        if (!locationType) return 0;
        const edgeCycle = cycleIndex === 0 || cycleIndex === cyclesList.length - 1;
        const preferredLocationType = edgeCycle ? "outdoor" : "indoor";
        return locationType === preferredLocationType ? 0 : 320;
      }

      function optimizedAnnualProgramPenalty(rule, block, usage) {
        if (!constructionRuleSettingEnabled("class-activity-program") || !block.activityId) return 0;
        return optimizedRuleClassKeys(rule).reduce((sum, schoolClass) => {
          const programActivityIds = activityProgramByLevel[classParts(schoolClass).level] || [];
          if (!programActivityIds.includes(block.activityId)) return sum;
          const doneActivityIds = usage.classYearActivities.get(schoolClass) || new Set();
          return sum + (doneActivityIds.has(block.activityId) ? 520 : 0);
        }, 0);
      }

      function optimizedRuleNeedsSixthSwimming(rule, cycle, usage) {
        if (!constructionRuleSettingEnabled("sixth-grade-dual-activity-swimming") || !optimizedCycleIsSixthSwimmingCycle(cycle)) return false;
        const swimmingIds = optimizedSwimmingActivityIds();
        if (!swimmingIds.length) return false;
        return optimizedRuleClassKeys(rule).some((schoolClass) => {
          if (classParts(schoolClass).level !== "6eme") return false;
          const classCycleKey = `${schoolClass}::${cycle.id}`;
          const currentActivities = usage.classCycleActivities.get(classCycleKey) || new Set();
          return ![...currentActivities].some((activityId) => swimmingIds.includes(activityId));
        });
      }

      function optimizedCandidateHasSwimming(candidates) {
        const swimmingIds = optimizedSwimmingActivityIds();
        return candidates.some((block) => swimmingIds.includes(block.activityId));
      }

      function optimizedRuleProgramMissingCount(rule, usage) {
        if (!constructionRuleSettingEnabled("class-activity-program")) return 0;
        return optimizedRuleClassKeys(rule).reduce((sum, schoolClass) => {
          const programActivityIds = activityProgramByLevel[classParts(schoolClass).level] || [];
          if (!programActivityIds.length) return sum;
          const doneActivityIds = usage.classYearActivities.get(schoolClass) || new Set();
          return sum + programActivityIds.filter((activityId) => !doneActivityIds.has(activityId)).length;
        }, 0);
      }

      function optimizedRulePriority(rule, cycle, candidates, usage) {
        const swimmingNeed = optimizedRuleNeedsSixthSwimming(rule, cycle, usage) && optimizedCandidateHasSwimming(candidates) ? 10000 : 0;
        const programNeed = optimizedRuleProgramMissingCount(rule, usage) * 120;
        return swimmingNeed + programNeed - candidates.length;
      }

      function optimizedAnnualProgramViolations() {
        if (!constructionRuleSettingEnabled("class-activity-program")) return [];
        return classes.flatMap((schoolClass) => {
          const programActivityIds = activityProgramByLevel[classParts(schoolClass).level] || [];
          if (!programActivityIds.length) return [];
          const doneActivityIds = new Set();
          classicConstructionCycles().forEach((cycle) => {
            constructionRules.forEach((rule) => {
              if (!constructionRuleAppliesToCycle(rule, cycle) || rule.block?.optionBlock) return;
              if (!classesForBlock(rule.block).some((item) => classesOverlap(item, schoolClass))) return;
              const block = blockWithCycleOverride(rule, cycle);
              if (block.activityId) doneActivityIds.add(block.activityId);
            });
          });
          const missingActivities = programActivityIds
            .filter((activityId) => !doneActivityIds.has(activityId))
            .map((activityId) => constructionActivityById(activityId)?.label || activityId);
          return missingActivities.length
            ? [`${compactClassName(schoolClass)} : ${missingActivities.join(", ")} non faite(s)`]
            : [];
        });
      }

      function optimizedSixthProgramViolations() {
        if (!constructionRuleSettingEnabled("sixth-grade-dual-activity-swimming")) return [];
        const swimmingIds = optimizedSwimmingActivityIds();
        const sixthClasses = classes.filter((schoolClass) => classParts(schoolClass).level === "6eme");
        const cyclesToCheck = classicConstructionCycles();
        return sixthClasses.flatMap((schoolClass) => cyclesToCheck.flatMap((cycle, cycleIndex) => {
          const activityIds = new Set();
          constructionRules.forEach((rule) => {
            if (!constructionRuleAppliesToCycle(rule, cycle) || rule.block?.optionBlock) return;
            if (!classesForBlock(rule.block).some((item) => classesOverlap(item, schoolClass))) return;
            const block = blockWithCycleOverride(rule, cycle);
            if (block.activityId) activityIds.add(block.activityId);
          });
          const issues = [];
          if (activityIds.size !== 2) issues.push(`${compactClassName(schoolClass)} ${cycle.name || `cycle ${cycleIndex + 1}`} : ${activityIds.size || 0} activite(s) au lieu de 2`);
          if (cycleIndex < 3 && ![...activityIds].some((activityId) => swimmingIds.includes(activityId))) {
            issues.push(`${compactClassName(schoolClass)} ${cycle.name || `cycle ${cycleIndex + 1}`} : natation manquante`);
          }
          return issues;
        }));
      }

      function optimizedAssignmentHasConflict(rule, cycle, block, assignments) {
        if (!constructionRuleSettingEnabled("facility-single-place")) return false;
        return assignments.some((assignment) => {
          if (assignment.rule.rowId !== rule.rowId) return false;
          if (!rulesShareCycleWeeks(assignment.rule, rule, cycle)) return false;
          if (!assignment.block.facilityId || assignment.block.facilityId !== block.facilityId) return false;
          return !blocksCanShareFacility(assignment.block, block);
        });
      }

      function optimizedUnresolvedReason(rule, cycle, candidates, assignments, usage) {
        if (!candidates.length) {
          const level = rule.classLevel || classParts(rule.block?.schoolClass || "").level || "";
          const programActivityIds = constructionRuleSettingEnabled("class-activity-program") ? (activityProgramByLevel[level] || []) : [];
          if (constructionRuleSettingEnabled("class-activity-program") && programActivityIds.length) return "Aucune installation ne propose une activite du programme compatible.";
          if (constructionRuleSettingEnabled("facility-unavailable")) return "Aucune installation/activite compatible ou disponible sur ce creneau.";
          return "Aucun couple installation/activite compatible.";
        }
        const withoutConflicts = candidates.filter((block) => !optimizedAssignmentHasConflict(rule, cycle, block, assignments));
        if (!withoutConflicts.length) return "Toutes les installations compatibles sont deja occupees sur ce creneau.";
        const withoutActivityLimit = withoutConflicts.filter((block) => !optimizedCandidateViolatesClassCycleActivity(rule, cycle, block, usage));
        if (!withoutActivityLimit.length) {
          const hasSixth = optimizedRuleClassKeys(rule).some((schoolClass) => classParts(schoolClass).level === "6eme");
          return hasSixth
            ? "La classe de 6eme a deja atteint ses deux activites distinctes sur ce cycle."
            : "La classe a deja une activite affectee sur ce cycle.";
        }
        return "Aucune affectation n'a respecte toutes les contraintes actives.";
      }

      function optimizedCandidateScore(rule, cycle, block, usage) {
        const rowFacilityKey = `${rule.rowId}::${block.facilityId}`;
        const teacherIds = teacherIdsForBlock(rule.block);
        const teacherFacilityPenalty = teacherIds.reduce((sum, teacherId) => sum + (usage.teacherFacility.get(`${teacherId}::${block.facilityId}`) || 0), 0);
        const teacherActivityPenalty = teacherIds.reduce((sum, teacherId) => sum + (usage.teacherActivity.get(`${teacherId}::${block.activityId}`) || 0), 0);
        const level = rule.classLevel || classParts(rule.block?.schoolClass || "").level || "";
        const programPenalty = constructionRuleSettingEnabled("class-activity-program") && block.activityId
          ? (usage.levelActivity.get(`${level}::${block.activityId}`) || 0) * 70
          : 0;
        const swimmingIds = optimizedSwimmingActivityIds();
        const scarceSwimmingBoost = optimizedRuleNeedsSixthSwimming(rule, cycle, usage) && swimmingIds.includes(block.activityId) ? -9000 : 0;
        return (
          (usage.rowFacility.get(rowFacilityKey) || 0) * 50
          + (usage.facility.get(block.facilityId) || 0) * 8
          + (usage.activity.get(block.activityId) || 0) * 4
          + teacherFacilityPenalty * 3
          + teacherActivityPenalty * 2
          + programPenalty
          + optimizedAnnualProgramPenalty(rule, block, usage)
          + optimizedSwimmingPenalty(rule, cycle, block, usage)
          + optimizedSeasonalLocationPenalty(cycle, block)
          + scarceSwimmingBoost
        );
      }

      function bumpOptimizedUsage(rule, cycle, block, usage) {
        const bump = (map, key) => map.set(key, (map.get(key) || 0) + 1);
        const swimmingIds = optimizedSwimmingActivityIds();
        bump(usage.facility, block.facilityId);
        bump(usage.activity, block.activityId || "__none__");
        bump(usage.rowFacility, `${rule.rowId}::${block.facilityId}`);
        const level = rule.classLevel || classParts(rule.block?.schoolClass || "").level || "";
        if (level && block.activityId) bump(usage.levelActivity, `${level}::${block.activityId}`);
        if (block.activityId) {
          optimizedRuleClassKeys(rule).forEach((schoolClass) => {
            const classCycleKey = `${schoolClass}::${cycle.id}`;
            if (!usage.classCycleActivities.has(classCycleKey)) usage.classCycleActivities.set(classCycleKey, new Set());
            usage.classCycleActivities.get(classCycleKey).add(block.activityId);
            if (!usage.classYearActivities.has(schoolClass)) usage.classYearActivities.set(schoolClass, new Set());
            usage.classYearActivities.get(schoolClass).add(block.activityId);
            if (classParts(schoolClass).level === "6eme" && swimmingIds.includes(block.activityId)) {
              if (!usage.sixthSwimmingCycles.has(schoolClass)) usage.sixthSwimmingCycles.set(schoolClass, new Set());
              usage.sixthSwimmingCycles.get(schoolClass).add(cycle.id);
            }
          });
        }
        teacherIdsForBlock(rule.block).forEach((teacherId) => {
          bump(usage.teacherFacility, `${teacherId}::${block.facilityId}`);
          bump(usage.teacherActivity, `${teacherId}::${block.activityId || "__none__"}`);
        });
      }

      function solveOptimizedCycleDetailsForCycle(cycle, usage) {
        const rules = constructionRules
          .filter((rule) => constructionRuleAppliesToCycle(rule, cycle) && rule?.block && !rule.block.optionBlock)
          .map((rule) => ({ rule, candidates: optimizedCycleCandidates(rule, cycle) }))
          .sort((first, second) =>
            optimizedRulePriority(second.rule, cycle, second.candidates, usage) - optimizedRulePriority(first.rule, cycle, first.candidates, usage)
            || first.candidates.length - second.candidates.length
          );
        const assignments = [];
        const unresolved = [];
        rules.forEach(({ rule, candidates }) => {
          const viable = candidates
            .filter((block) => !optimizedAssignmentHasConflict(rule, cycle, block, assignments))
            .filter((block) => !optimizedCandidateViolatesClassCycleActivity(rule, cycle, block, usage))
            .sort((first, second) => optimizedCandidateScore(rule, cycle, first, usage) - optimizedCandidateScore(rule, cycle, second, usage));
          const selected = viable[0];
          if (!selected) {
            unresolved.push({
              rule,
              cycleId: cycle.id,
              reason: optimizedUnresolvedReason(rule, cycle, candidates, assignments, usage)
            });
            return;
          }
          assignments.push({ rule, block: selected });
          bumpOptimizedUsage(rule, cycle, selected, usage);
        });
        return { assignments, unresolved };
      }

      function optimizeConstructionCycleDetails() {
        if (!facilities.length || !activities.length) {
          const result = { saved: 0, unresolved: constructionRules.length, message: "Ajoutez d'abord des installations et des activites.", detail: "La construction optimisee a besoin de couples installation/activite pour proposer une solution." };
          constructionOptimizationResult = result;
          return result;
        }
        const usage = {
          facility: new Map(),
          activity: new Map(),
          levelActivity: new Map(),
          classCycleActivities: new Map(),
          classYearActivities: new Map(),
          sixthSwimmingCycles: new Map(),
          rowFacility: new Map(),
          teacherFacility: new Map(),
          teacherActivity: new Map()
        };
        let saved = 0;
        let unresolved = 0;
        const unresolvedBlocks = [];
        const cyclesToOptimize = classicConstructionCycles();
        const optimizedCycleIds = new Set(cyclesToOptimize.map((cycle) => cycle.id));
        constructionRules = constructionRules.map((rule) => ({
          ...rule,
          cycleOverrides: Object.fromEntries(Object.entries(rule.cycleOverrides || {}).filter(([cycleId]) => !optimizedCycleIds.has(cycleId)))
        }));
        cyclesToOptimize.forEach((cycle) => {
          const result = solveOptimizedCycleDetailsForCycle(cycle, usage);
          unresolved += result.unresolved.length;
          result.unresolved.forEach(({ rule, cycleId, reason }) => {
            unresolvedBlocks.push({
              ruleId: rule.id,
              rowId: rule.rowId,
              cycleId,
              weekLetter: rule.weekLetter || "all",
              label: blockClassLabel(rule.block),
              reason
            });
          });
          result.assignments.forEach(({ rule, block }) => {
            rule.cycleOverrides = {
              ...(rule.cycleOverrides || {}),
              [cycle.id]: {
                facilityId: block.facilityId || "",
                activityId: block.activityId || ""
              }
            };
            saved += 1;
          });
        });
        rebuildConstructionPlan();
        const annualProgramIssues = optimizedAnnualProgramViolations();
        const sixthProgramIssues = optimizedSixthProgramViolations();
        const unresolvedBlockIssues = unresolvedBlocks.map((issue) => {
          const cycleName = classicConstructionCycles().find((cycle) => cycle.id === issue.cycleId)?.name || "cycle";
          return `${issue.label || "Bloc"} ${cycleName} : ${issue.reason}`;
        });
        const detailIssues = [...unresolvedBlockIssues, ...annualProgramIssues, ...sixthProgramIssues];
        unresolved += annualProgramIssues.length + sixthProgramIssues.length;
        const checkDetail = detailIssues.length
          ? `${detailIssues.slice(0, 3).join(" ; ")}${detailIssues.length > 3 ? ` (+${detailIssues.length - 3})` : ""}`
          : "";
        const result = {
          saved,
          unresolved,
          message: unresolved
            ? `${saved} detail(s) optimise(s), ${unresolved} point(s) a verifier`
            : `${saved} detail(s) optimise(s)`
        };
        constructionOptimizationResult = {
          ...result,
          unresolvedBlocks,
          level: unresolved ? "warning" : "ready",
          detail: checkDetail || (saved
            ? "Les installations et activites ont ete renseignees dans les cycles, sans modifier les blocs profs/classes."
            : "Aucun detail n'a ete ajoute. Verifiez qu'il existe des blocs profs/classes et des couples installation/activite compatibles.")
        };
        return result;
      }

      function blockForRuleStorage(block) {
        const { ruleId, cycleId, cycleName, weekLetter, ...storedBlock } = block;
        return storedBlock;
      }

      function movingBlockGhostHtml() {
        if (!movingBuildBlock) return "";
        const block = movingBlockPayload();
        if (!block) return "";
        const x = Number(movingBuildBlock.x || 0);
        const y = Number(movingBuildBlock.y || 0);
        return `<div class="movingBlockGhost" id="movingBlockGhost" style="left:${x}px;top:${y}px;"><strong>${block.title}</strong><span>${block.detail || ""}</span></div>`;
      }

      function movingBlockPayload() {
        if (!movingBuildBlock) return null;
        if (movingBuildBlock.type === "course") {
          const block = constructionPlan[movingBuildBlock.key]?.[movingBuildBlock.index];
          return block ? { title: block.schoolClass || "Cours", detail: [block.facilityLabel || "", block.activityLabel || ""].filter(Boolean).join(" · "), raw: block } : null;
        }
        if (movingBuildBlock.type === "event") {
          const event = sportEvents.find((item) => item.id === movingBuildBlock.id);
          return event ? { title: event.name || "Evenement sportif", detail: eventClassSummary(event), raw: event } : null;
        }
        if (movingBuildBlock.type === "as") {
          const session = asSessions.find((item) => item.id === movingBuildBlock.id);
          return session ? { title: asBlockLabel(session), detail: asSessionTeacherLabel(session), raw: session } : null;
        }
        return null;
      }

      function moveConstructionBlock(sourceKey, index, targetKey) {
        const block = constructionPlan[sourceKey]?.[index];
        if (!block || sourceKey === targetKey) return false;
        const targetParts = parseYearCellKey(targetKey);
        const targetRow = yearRows().find((item) => item.id === targetParts.rowId);
        const targetWeek = schoolYearWeeks().find((item) => item.rank === targetParts.weekRank);
        if (!targetRow || !targetWeek) return false;
        if (targetRow.isAs) {
          showValidationPopup("Impossible de deplacer un cours sur un creneau AS");
          return false;
        }
        const classLevel = classParts(block.schoolClass).level;
        const targetCycle = cycleForWeek(targetWeek, classLevel);
        if (!targetCycle) {
          showValidationPopup("Aucun cycle pour cette classe sur la case cible");
          return false;
        }
        const nextWeekLetter = (block.weekLetter && block.weekLetter !== "all") ? targetWeek.letter : "all";
        const storedBlock = blockForRuleStorage(block);
        const unavailableMessage = blockUnavailableMessage(targetRow, targetWeek, storedBlock);
        const cycleUnavailableMessage = blockCycleUnavailableMessage(targetRow.id, targetCycle.id, storedBlock, nextWeekLetter);
        const conflictMessage = unavailableMessage || cycleUnavailableMessage || blockCycleConflictMessage(targetRow.id, targetCycle.id, storedBlock, block.ruleId, nextWeekLetter);
        if (conflictMessage) {
          showValidationPopup(conflictMessage);
          return false;
        }
        const rule = constructionRules.find((item) => item.id === block.ruleId);
        if (rule) {
          rule.rowId = targetRow.id;
          if (isAnnualConstructionRule(rule)) {
            rule.cycleId = "year";
            rule.scope = "year";
          } else {
            rule.cycleId = targetCycle.id;
          }
          rule.classLevel = classLevel;
          rule.weekLetter = nextWeekLetter;
          rule.block = isAnnualConstructionRule(rule) ? skeletonBlockForStorage(storedBlock) : storedBlock;
          delete blockExclusions[rule.id];
          saveBlockExclusions();
          rebuildConstructionPlan();
        } else {
          removeBlockFromSingleSlot(sourceKey, block);
          applyBlockToCycle(targetRow.id, targetCycle.id, storedBlock, nextWeekLetter);
        }
        showValidationPopup("Bloc deplace");
        return true;
      }

      function moveSportEventBlock(eventId, targetKey) {
        const event = sportEvents.find((item) => item.id === eventId);
        if (!event) return false;
        const targetParts = parseYearCellKey(targetKey);
        const targetRow = yearRows().find((item) => item.id === targetParts.rowId);
        const targetWeek = schoolYearWeeks().find((item) => item.rank === targetParts.weekRank);
        if (!targetRow || !targetWeek) return false;
        const targetDate = rowDateForWeek(targetRow, targetWeek);
        const durationDays = Math.max(0, Math.round((dateOnly(event.end) - dateOnly(event.start)) / 86400000));
        const nextEnd = new Date(targetDate);
        nextEnd.setDate(nextEnd.getDate() + durationDays);
        const nextEvent = {
          ...event,
          start: dateKey(targetDate),
          end: dateKey(nextEnd),
          halfDay: `slot-${targetRow.slot.id}`
        };
        const exclusions = eventExclusionsFor(nextEvent);
        sportEvents = sportEvents.map((item) => item.id === eventId ? nextEvent : item);
        delete eventExclusions[eventId];
        if (exclusions.length) eventExclusions[eventId] = exclusions;
        saveSportEvents();
        saveEventExclusions();
        rebuildConstructionPlan();
        showValidationPopup("Evenement deplace");
        return true;
      }

      function moveAsBlock(sessionId, targetKey) {
        const session = asSessions.find((item) => item.id === sessionId);
        if (!session) return false;
        const targetParts = parseYearCellKey(targetKey);
        const targetRow = yearRows().find((item) => item.id === targetParts.rowId);
        const targetWeek = schoolYearWeeks().find((item) => item.rank === targetParts.weekRank);
        if (!targetRow || !targetWeek) return false;
        if (!targetRow.isAs) {
          showValidationPopup("Une AS doit rester sur un creneau AS");
          return false;
        }
        const blockedTeacherIds = unavailableTeachersForCell(targetRow, targetWeek, true);
        if ((session.teacherIds || []).some((teacherId) => blockedTeacherIds.has(teacherId))) {
          showValidationPopup("Impossible de deplacer l'AS : un professeur est indisponible sur ce creneau");
          return false;
        }
        asSessions = asSessions.map((item) => item.id === sessionId ? {
          ...item,
          weekdays: [targetRow.day],
          slotIds: [targetRow.slot.id]
        } : item);
        delete asExclusions[sessionId];
        saveAsSessions();
        saveAsExclusions();
        showValidationPopup("AS deplacee");
        return true;
      }

      function moveSelectedBlockTo(targetKey) {
        if (!movingBuildBlock) return false;
        if (movingBuildBlock.type === "event") return moveSportEventBlock(movingBuildBlock.id, targetKey);
        if (movingBuildBlock.type === "as") return moveAsBlock(movingBuildBlock.id, targetKey);
        return moveConstructionBlock(movingBuildBlock.key, movingBuildBlock.index, targetKey);
      }

      function startMovingBuildBlock(payload, x = 0, y = 0, suppressImmediateCellClick = false) {
        movingBuildBlock = {
          type: payload.type,
          key: payload.key,
          index: Number(payload.index),
          id: payload.id,
          x,
          y
        };
        if (suppressImmediateCellClick) {
          ignoreNextMoveCellClick = true;
          setTimeout(() => {
            ignoreNextMoveCellClick = false;
          }, 350);
        }
        activeBuildCell = null;
        editingBuildBlock = null;
        showValidationPopup("Bloc selectionne : cliquez sur la case cible");
        render();
      }

      function removeBlockFromCycle(rowId, blockIndex, block) {
        if (block.ruleId) {
          constructionRules = constructionRules.filter((rule) => rule.id !== block.ruleId);
          delete blockExclusions[block.ruleId];
        } else {
          constructionRules = constructionRules.filter((rule) => !(rule.rowId === rowId && rule.cycleId === block.cycleId));
        }
        saveBlockExclusions();
        rebuildConstructionPlan();
      }

      function removeBlockFromSingleSlot(key, block) {
        if (!block.ruleId) return removeBlockFromCycle(parseYearCellKey(key).rowId, 0, block);
        const existing = blockExclusions[block.ruleId] || [];
        if (!existing.includes(key)) blockExclusions[block.ruleId] = [...existing, key];
        saveBlockExclusions();
        rebuildConstructionPlan();
      }

      function removeConstructionBlock(key, index) {
        if (!constructionPlan[key]) return;
        const block = constructionPlan[key][index];
        if (!block) return;
        pendingBlockDelete = { key, index };
      }

      function confirmBlockDeletion(scope) {
        if (!pendingBlockDelete) return;
        const { key, index } = pendingBlockDelete;
        const block = constructionPlan[key]?.[index];
        pendingBlockDelete = null;
        if (!block) return;
        if (scope === "cycle") removeBlockFromCycle(parseYearCellKey(key).rowId, index, block);
        if (scope === "slot") removeBlockFromSingleSlot(key, block);
        showValidationPopup(scope === "cycle" ? "Créneau supprimé du cycle" : "Créneau supprimé");
      }

      function confirmSlotItemDeletion(label) {
        const firstConfirm = window.confirm(`Supprimer ${label} uniquement sur ce creneau ?`);
        if (!firstConfirm) return false;
        return window.confirm("Confirmer une deuxieme fois la suppression sur ce creneau ?");
      }

      function excludeEventFromSlot(eventId, key) {
        const event = sportEvents.find((item) => item.id === eventId);
        if (!event || !confirmSlotItemDeletion(`l'evenement ${event.name || "sportif"}`)) return;
        const existing = eventExclusions[eventId] || [];

      function excludeAsFromSlot(sessionId, key) {
        const session = asSessions.find((item) => item.id === sessionId);
        if (!session || !window.confirm(`Supprimer l'AS ${session.name || ""} uniquement sur ce creneau ?`.trim())) return;
        const existing = asExclusions[sessionId] || [];
        if (!existing.includes(key)) asExclusions[sessionId] = [...existing, key];
        saveAsExclusions();
        showValidationPopup("AS supprimée du créneau");
        render();
      }

      function detectConflicts() {
        return cachedConstructionCheck("conflicts", () => {
        const conflicts = [];
        const rows = yearRows();
        const weeks = schoolYearWeeks();
        const rowById = new Map(rows.map((row) => [row.id, row]));
        const weekByRank = new Map(weeks.map((weekItem) => [weekItem.rank, weekItem]));
        Object.entries(constructionPlan).forEach(([key, items]) => {
          if (!Array.isArray(items) || items.length < 2) return;
          const { rowId, weekRank } = parseYearCellKey(key);
          const row = rowById.get(rowId);
          const weekItem = weekByRank.get(weekRank);
          const byFacility = items.reduce((acc, item, index) => {
            const facility = item.facilityId || item.facilityLabel || "";
            if (!facility) return acc;
            if (!acc[facility]) acc[facility] = [];
            acc[facility].push({ ...item, index });
            return acc;
          }, {});
          Object.entries(byFacility).forEach(([facility, facilityItems]) => {
            if (facilityItems.length < 2) return;
            if (facilityItems.length === 2 && blocksCanShareFacility(facilityItems[0], facilityItems[1])) return;
            conflicts.push({
              type: "facility",
              key,
              facility,
              row,
              weekItem,
              items: facilityItems
            });
          });
          const byTeacher = {};
          items.forEach((item, index) => {
            teacherIdsForBlock(item).forEach((teacherId) => {
              if (!byTeacher[teacherId]) byTeacher[teacherId] = [];
              byTeacher[teacherId].push({ ...item, index });
            });
          });
          Object.entries(byTeacher).forEach(([teacher, teacherItems]) => {
            const classesInConflict = [...new Set(teacherItems.map((item) => teacherClassForBlock(item, teacher)).filter(Boolean))];
            if (classesInConflict.length < 2) return;
            conflicts.push({
              type: "teacher",
              key,
              teacher,
              row,
              weekItem,
              items: teacherItems
            });
          });
          items.forEach((item, index) => {
            const classItems = items
              .map((other, otherIndex) => ({ ...other, index: otherIndex }))
              .filter((other) => other.index !== index && classesForBlock(item).some((itemClass) => classesForBlock(other).some((otherClass) => classesOverlap(itemClass, otherClass))));
            if (!classItems.length) return;
            conflicts.push({
              type: "class",
              key,
              schoolClass: blockClassLabel(item),
              row,
              weekItem,
              items: [{ ...item, index }, ...classItems]
            });
          });
        });
        rows.filter((row) => row.isAs).forEach((row) => {
          weeks.forEach((weekItem) => {
            const sessions = asSessionsForCell(row, weekItem);
            if (sessions.length < 2) return;
            const byTeacher = {};
            sessions.forEach((session) => {
              (session.teacherIds || []).forEach((teacherId) => {
                if (!byTeacher[teacherId]) byTeacher[teacherId] = [];
                byTeacher[teacherId].push(session);
              });
            });
            Object.entries(byTeacher).forEach(([teacherId, teacherSessions]) => {
              if (teacherSessions.length < 2) return;
              conflicts.push({
                type: "asTeacher",
                key: yearCellKey(row.id, weekItem.rank),
                teacher: teacherId,
                row,
                weekItem,
                items: teacherSessions
              });
            });
          });
        });
        return conflicts;
        });
      }

      function eventExclusionsFor(event) {
        const exclusions = [];
        const rows = yearRows();
        const weeks = schoolYearWeeks();
        constructionRules.forEach((rule) => {
          const row = rows.find((item) => item.id === rule.rowId);
          if (!row || !eventTouchesBlock(event, rule.block) || !rowMatchesEventHalfDay(row, event)) return;
          const cycle = findCycleForRule(rule);
          if (!cycle) return;
          weeksForCycle(cycle).forEach((weekItem) => {
            if (!rowDateInEvent(row, weekItem, event)) return;
            exclusions.push({
              key: yearCellKey(row.id, weekItem.rank),
              ruleId: rule.id
            });
          });
        });
        return exclusions;
      }

      function confirmSportEventCleanup(exclusions, isEditing) {
        if (!exclusions.length) return true;
        const restoreNote = isEditing
          ? "Les créneaux de cycle qui ne sont plus concernés par la nouvelle version de l'événement seront rétablis automatiquement."
          : "La suppression concerne uniquement la durée et la demi-journée de l'événement.";
        const message = `${exclusions.length} créneau(x) déjà renseigné(s) concernent les profs ou classes sélectionnés pour cet événement. Confirmer leur suppression ?\n\n${restoreNote}`;
        return window.confirm(message);
      }

      function applySportEventChange(event, exclusions, isEditing) {
        if (isEditing) sportEvents = sportEvents.map((item) => item.id === event.id ? event : item);
        else sportEvents.push(event);

        delete eventExclusions[event.id];
        if (exclusions.length) eventExclusions[event.id] = exclusions;

        saveSportEvents();
        saveEventExclusions();
        rebuildConstructionPlan();
      }

      function resetFacilityUnavailableForm() {
        editingUnavailableId = null;
        unavailableName = "Installation occupée";
        unavailableType = "facility";
        unavailableFacilityIds = [];
        unavailableClassIds = [];
        unavailableTeacherIds = [];
        unavailableClassLevelFilter = "";
        unavailablePeriodMode = "dates";
        unavailableCycleIds = [];
        unavailableStart = "2026-09-01";
        unavailableEnd = "2027-07-02";
        unavailableWeekdays = [];
        unavailableSlotIds = [];
        unavailableCells = [];
      }

      function unavailableSelectedCycles() {
        return unavailableCycleIds
          .map((id) => cycles.find((cycle) => cycle.id === id))
          .filter(Boolean);
      }

      function unavailableDateRange() {
        if (unavailablePeriodMode !== "cycles") return { start: unavailableStart, end: unavailableEnd };
        const selectedCycles = unavailableSelectedCycles();
        if (!selectedCycles.length) return { start: unavailableStart, end: unavailableEnd };
        const starts = selectedCycles.map((cycle) => cycle.start).sort();
        const ends = selectedCycles.map((cycle) => cycle.end).sort();
        return { start: starts[0], end: ends[ends.length - 1] };
      }

      function unavailableCellSummary(item) {
        const cells = (item.cells || []).length
          ? item.cells
          : (item.weekdays || []).flatMap((day) => (item.slotIds || []).map((slotId) => ({ day, slotId })));
        if (!cells.length) return "aucun";
        const morning = ["8", "10"];
        const afternoon = ["13", "15"];
        return days
          .map((day) => {
            const daySlotIds = cells.filter((cell) => cell.day === day).map((cell) => cell.slotId);
            if (!daySlotIds.length) return "";
            const uniqueSlotIds = [...new Set(daySlotIds)];
            const hasSameSlots = (expected) => uniqueSlotIds.length === expected.length && expected.every((slotId) => uniqueSlotIds.includes(slotId));
            if (hasSameSlots(slots.map((slot) => slot.id))) return `${day} toute la journee`;
            if (hasSameSlots(morning)) return `${day} matin`;
            if (hasSameSlots(afternoon)) return `${day} apres-midi`;
            return uniqueSlotIds.map((slotId) => `${day} ${slots.find((slot) => slot.id === slotId)?.label || slotId}`).join(", ");
          })
          .filter(Boolean)
          .join(", ");
      }

      function unavailableTypeForItem(item) {
        if ((item.type || "") === "teacher" || (item.teacherIds || []).length) return "teacher";
        if ((item.type || "") === "class" || (item.classIds || []).length) return "class";
        return "facility";
      }

      function unavailableTitle(item) {
        const type = unavailableTypeForItem(item);
        if (type === "teacher") return teacherNamesFromIds(item.teacherIds || []).join(", ") || "Prof indisponible";
        if (type === "class") return (item.classIds || []).join(", ") || "Classe indisponible";
        return (item.facilityIds || []).map((id) => facilities.find((facility) => facility.id === id)?.label || id).join(", ") || item.name;
      }

      function renderUnavailableCard(item) {
        return `<article class="eventCard unavailableCard">
          <strong>${unavailableTitle(item)}</strong>

          <span>${item.start} -> ${item.end} · ${(item.weekdays || []).join(", ")}</span>
          <span>${unavailableCellSummary(item)}</span>
          <button class="ghostButton" data-edit-unavailable="${item.id}">Modifier</button>
          <button class="ghostButton" data-delete-unavailable="${item.id}">Supprimer</button>
        </article>`;

      function renderUnavailableGroup(label, type) {

        if (!items.length) return "";
        const isOpen = expandedUnavailableGroup === type;
        return `<section class="unavailableGroup">
          <button class="${isOpen ? "active" : ""}" data-toggle-unavailable-group="${type}">
            <span>${label}</span>
            <span>${items.length} · ${isOpen ? "Masquer" : "Afficher"}</span>
          </button>
          ${isOpen ? `<div class="unavailableGrid">${items.map(renderUnavailableCard).join("")}</div>` : ""}
        </section>`;
      }

      function saveFacilityUnavailableFromForm() {
        const facilityLabel = unavailableFacilityIds.map((id) => facilities.find((facility) => facility.id === id)?.label || id).join(", ");
        const selectedCells = unavailableCells.length
          ? unavailableCells
          : unavailableWeekdays.flatMap((day) => unavailableSlotIds.map((slotId) => ({ day, slotId })));
        const slotLabel = selectedCells.map((cell) => `${cell.day} ${slots.find((slot) => slot.id === cell.slotId)?.label || cell.slotId}`).join(", ");
        const period = unavailableDateRange();
        const generatedName = unavailableType === "class"
          ? `Classe indisponible : ${unavailableClassIds.join(", ")}`
          : unavailableType === "teacher"
            ? `Prof indisponible : ${teacherNamesFromIds(unavailableTeacherIds).join(", ")}`
            : `${facilityLabel} · ${slotLabel}`;
        const item = {

          classIds: unavailableType === "class" ? [...unavailableClassIds] : [],
          teacherIds: unavailableType === "teacher" ? [...unavailableTeacherIds] : [],
          periodMode: unavailablePeriodMode,

          end: period.end,

          cells: [...selectedCells]
        };
        if (editingUnavailableId) facilityUnavailability = facilityUnavailability.map((entry) => entry.id === editingUnavailableId ? item : entry);
        else facilityUnavailability.push(item);
        purgeConstructionForUnavailableItems([item]);
        saveBlockExclusions();
        saveFacilityUnavailability();
        rebuildConstructionPlan();
        resetFacilityUnavailableForm();
