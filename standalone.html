    <style>

      .workspace { display: block; margin-top: 6px; }

      .homeBeforeAfter { align-items: stretch; display: grid; gap: clamp(10px, 1.5vw, 18px); grid-template-columns: repeat(2, minmax(0, 1fr)); height: 100%; min-height: 0; width: 100%; }
      .homeComparisonCard { background: rgba(248, 250, 252, .96); border: 1px solid rgba(255,255,255,.72); border-radius: 8px; box-shadow: 0 18px 44px rgba(0,0,0,.18); display: grid; gap: 8px; grid-template-rows: minmax(0, 1fr) auto auto; min-height: 0; padding: clamp(8px, 1vw, 12px); }

      .homeComparisonCard span { color: #64748b; font-size: clamp(11px, 1vw, 13px); font-weight: 800; line-height: 1.28; }
      .homeKicker { color: #b8e2cf; font-size: 12px; font-weight: 950; letter-spacing: .08em; text-transform: uppercase; }
      .homeHero h2 { color: #fff; font-size: clamp(38px, 7vw, 86px); line-height: .98; margin: 0; max-width: 760px; }
      .homeHero p { color: #e4f3ec; font-size: clamp(16px, 2vw, 20px); font-weight: 750; line-height: 1.55; margin: 14px 0 0; max-width: 560px; }
      .homePanel { align-content: center; background: #fff; display: grid; gap: clamp(12px, 1.8vh, 18px); min-height: 0; overflow: hidden; padding: clamp(18px, 3vw, 42px); }
      .homePanelLogo { align-items: center; display: flex; gap: 12px; }

      .homePanelLogo strong { color: #0f172a; display: block; font-size: clamp(19px, 2vw, 22px); font-weight: 950; line-height: 1; }
      .homePanelLogo span { color: #64748b; display: block; font-size: 12px; font-weight: 850; margin-top: 4px; }
      .homePanel h3 { color: #0f172a; font-size: clamp(28px, 3.4vw, 40px); line-height: 1.02; margin: 0; }
      .homePanel p { color: #475569; font-size: clamp(13px, 1.2vw, 15px); font-weight: 750; line-height: 1.45; margin: 0; }
      .homePanel .googleAuthButton { justify-content: center; min-height: 48px; width: 100%; }
      .homeFeatures { display: grid; gap: 10px; }
      .homeFeature { align-items: start; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; display: grid; gap: 10px; grid-template-columns: 30px 1fr; padding: 10px; }
      .homeFeatureIcon { align-items: center; background: #d9f99d; border-radius: 999px; color: #113f36; display: inline-flex; font-size: 15px; font-weight: 950; height: 30px; justify-content: center; width: 30px; }
      .homeFeature:nth-child(2) .homeFeatureIcon { background: #bae6fd; color: #075985; }
      .homeFeature:nth-child(3) .homeFeatureIcon { background: #fbcfe8; color: #9d174d; }
      .homeFeatureText { display: grid; gap: 4px; min-width: 0; }
      .homeFeature strong { color: #0f172a; font-size: 13px; font-weight: 950; }
      .homeFeatureText span { color: #64748b; display: block; font-size: 12px; font-weight: 750; line-height: 1.28; }
      .homeInviteNotice { background: #e0f2fe; border: 1px solid #bae6fd; border-radius: 8px; color: #075985; font-size: 13px; font-weight: 850; padding: 10px 12px; }

        .homePanel { gap: 10px; padding-bottom: 18px; padding-top: 18px; }
        .homePanel p { line-height: 1.34; }
        .homeFeature:nth-child(3) { display: none; }
        .homeComparisonCard span { display: none; }
        .homeComparisonCard img { max-height: calc(100vh - 118px); }
      }
      @media (max-width: 900px) {
        .homeShell { height: auto; grid-template-columns: 1fr; min-height: 100vh; overflow: visible; }
        .homeHero { min-height: 360px; }
        .homeComparisonCard img { max-height: none; }
        .homePanel { overflow: visible; }
      }
      .sideNav { align-content: center; background: transparent; border: 0; border-radius: 0; display: grid; gap: 4px; min-width: 0; overflow: hidden; padding: 0; position: static; z-index: 70; }
      .navGroup { align-items: center; display: grid; gap: 4px; grid-template-columns: 80px minmax(0, max-content); min-width: 0; }

      .navGroup + .navGroup { margin-top: 0; }

      .tabs { margin-top: 10px; }
      .weeks button, .tabs button { background: transparent; border: 0; border-radius: 7px; color: #334155; cursor: pointer; font-size: 11px; font-weight: 900; line-height: 1.1; min-height: 26px; padding: 0 7px; text-align: center; white-space: nowrap; width: auto; }
      .stepNav { align-items: center; display: inline-flex; gap: 5px; }
      .constructionHammerIcon { display: inline-block; flex: 0 0 auto; height: 20px; width: 20px; }
      .stepBadge { align-items: center; background: #000; border-radius: 999px; color: #fff; display: inline-flex; font-size: 10px; font-weight: 950; height: 18px; justify-content: center; min-width: 18px; padding: 0 5px; }

      .tabs button.active { background: #0f172a; color: white; }
      .mainContent { min-width: 0; }
      .utilityNav { display: flex; grid-template-columns: none; width: max-content; }

        return Object.fromEntries(teachers.map((teacher) => [teacher.id, {

      function score(stats, teacher, weekName, day, slot, facility, round) {
        const current = stats[teacher.id];
        const targetHours = teacher.weekTargets[weekName];
        const remaining = targetHours - current.total;
        const maxExternal = Math.ceil(targetHours * 0.6);
        if (remaining < slot.hours || current.busy[`${day}-${slot.id}`]) return Infinity;
        if (facility.type === "external" && current.external + slot.hours > maxExternal) return Infinity;
        if (slot.hours === 1 && remaining !== 1 && current.total < 12) return Infinity;
        if (slot.hours === 2 && remaining === 1) return Infinity;
        const facilityLoad = facility.type === "external" ? current.external : current.internal;
        const dayPenalty = current.dayHours[day] >= 4 ? 30 : current.dayHours[day] * 6;
        return current.total * 12 + facilityLoad * 2 + dayPenalty + (slot.id === "15" ? 5 : 0) + ((round + teacher.id.charCodeAt(1)) % 7) / 10;
      }

      function mark(stats, teacherId, day, slot, facility) {
        const current = stats[teacherId];
        current.busy[`${day}-${slot.id}`] = true;
        current.total += slot.hours;
        current.sessions += 1;
        current.dayHours[day] += slot.hours;
        if (facility.type === "external") current.external += slot.hours;
        else current.internal += slot.hours;
      }

      function generateWeek(weekName) {
        const stats = emptyStats();
        const assignments = [];
        const classBusy = {};
        const orderedFacilities = facilities.filter((item) => item.type === "external").concat(facilities.filter((item) => item.type === "internal"));
        let round = seed + (weekName === "B" ? 31 : 0);
        orderedFacilities.forEach((facility) => {
          days.forEach((day) => {
            slots.forEach((slot) => {
              const candidates = teachers
                .map((teacher) => ({ teacher, score: score(stats, teacher, weekName, day, slot, facility, round) }))
                .filter((item) => Number.isFinite(item.score))
                .sort((a, b) => a.score - b.score);
              if (!candidates.length) return;
              const teacher = candidates[0].teacher;
              const schoolClass = pickClass(classBusy, day, slot, round);
              assignments.push({ id: `${weekName}-${day}-${slot.id}-${facility.id}`, week: weekName, day, slot, facility, teacher, schoolClass });
              mark(stats, teacher.id, day, slot, facility);
              classBusy[`${day}-${slot.id}-${schoolClass}`] = true;
              round += 1;
            });
          });
        });
        return { assignments, stats };
      }

          if (!classBusy[`${day}-${slot.id}-${schoolClass}`]) return schoolClass;
        }
        return classes[start];
      }

      function normalizeSchoolConstraints(value = {}) {

          if (!match) return null;
          const start = normalizeTime(`${match[1]}:${match[2] || "00"}`);

      function parseCsvRows(text) {

            } else if (char === '"') {

          } else if (char === '"') {

          } else if (char === ";" || char === "," || char === "\t") {

          } else if (char === "\n") {
            row.push(cell);
            rows.push(row);
            row = [];
            cell = "";
          } else if (char !== "\r") {

          }

        row.push(cell);
        rows.push(row);

          const saved = localStorage.getItem(PREREQUISITE_LOCKS_KEY);
          if (saved) {
            const parsed = JSON.parse(saved);
            return { ...defaultPrerequisiteLocks(false), ...parsed };
          }
          return defaultPrerequisiteLocks(localStorage.getItem(PREREQUISITES_LOCK_KEY) === "true");
        } catch {
          return defaultPrerequisiteLocks(false);
        }
      }

      function prerequisiteLocked(mode = prerequisiteMode) {
        return Boolean(prerequisiteLocks[mode]);
      }

      function loadYearPrerequisiteLocks() {
        try {
          const saved = localStorage.getItem(YEAR_PREREQUISITE_LOCKS_KEY);
          const parsed = saved ? JSON.parse(saved) : {};
          return { ...defaultYearPrerequisiteLocks(false), ...parsed };
        } catch {
          return defaultYearPrerequisiteLocks(false);
        }
      }

      function yearPrerequisiteLocked(mode = yearPrerequisiteMode) {
        return Boolean(yearPrerequisiteLocks[mode]);
      }

      function savePrerequisiteLocks() {
        localStorage.setItem(PREREQUISITE_LOCKS_KEY, JSON.stringify({ ...defaultPrerequisiteLocks(false), ...prerequisiteLocks }));
        localStorage.setItem(PREREQUISITES_LOCK_KEY, prerequisiteSubModes.every((mode) => prerequisiteLocked(mode)) ? "true" : "false");
        saveLocksToCloudNow(["prerequisiteLocks"]);
      }

      function saveYearPrerequisiteLocks() {
        localStorage.setItem(YEAR_PREREQUISITE_LOCKS_KEY, JSON.stringify({ ...defaultYearPrerequisiteLocks(false), ...yearPrerequisiteLocks }));
        saveLocksToCloudNow(["yearPrerequisiteLocks"]);
      }

      function loadCloudDirtyKeys() {
        try {
          const saved = JSON.parse(localStorage.getItem(CLOUD_DIRTY_KEYS_KEY) || "[]");
          return Array.isArray(saved) ? saved.filter((key) => cloudDataKeys.includes(key)) : [];
        } catch {
          return [];
        }
      }

      function normalizeCloudDirtyKeys(keys = []) {
        const list = Array.isArray(keys) ? keys : [keys];
        return list.filter((key) => cloudDataKeys.includes(key));
      }

      function markLocalChangedForCloud(keys = []) {
        localUnsyncedChanges = new Date().toISOString();
        localStorage.setItem(CLOUD_LOCAL_UNSYNCED_KEY, localUnsyncedChanges);
        normalizeCloudDirtyKeys(keys).forEach((key) => cloudDirtyKeys.add(key));
        localStorage.setItem(CLOUD_DIRTY_KEYS_KEY, JSON.stringify([...cloudDirtyKeys]));
      }

      function clearLocalChangedForCloud() {
        localUnsyncedChanges = "";
        cloudDirtyKeys = new Set();
        localStorage.removeItem(CLOUD_LOCAL_UNSYNCED_KEY);
        localStorage.removeItem(CLOUD_DIRTY_KEYS_KEY);
      }

      function hasPendingCloudSave() {
        return Boolean(cloudSaveTimer || cloudSaveQueued || cloudDirtyKeys.size);
      }

      function discardLocalChangesFromCloudSoon() {
        clearTimeout(cloudSaveTimer);
        cloudSaveTimer = null;
        cloudSaveQueued = false;
        clearLocalChangedForCloud();
      }

      function cloudCurrentLoadKey() {
        return [adminSession?.user?.id || "", cloudConfig.etabId || "", cloudConfig.planningId || ""].join("|");
      }

      function requestInitialCloudLoad(silent = false, forceApply = true) {
        if (!cloudReady() || !cloudConfig.autoLoad || !isSignedIn()) return false;
        const loadKey = cloudCurrentLoadKey();
        if (!loadKey || cloudInitialLoadKey === loadKey || cloudSourceLoaded || cloudSyncing) return false;
        cloudInitialLoadKey = loadKey;
        setTimeout(() => cloudLoadFromRemote(true, silent, forceApply), 0);
        return true;
      }

      function saveCloudNowIfPossible(keys = []) {
        if (!isAdmin()) {
          cloudStatus = "Modification refusée : rechargement de la source Supabase.";
          discardLocalChangesFromCloudSoon();
          return false;
        }
        if (!cloudReady()) {
          cloudStatus = "Modification refusée : cloud non configuré.";
          return false;
        }
        if (!cloudConfig.autoSave) {
          cloudStatus = "Modification refusée : autosauvegarde cloud désactivée.";
          discardLocalChangesFromCloudSoon();
          return false;
        }
        if (!cloudWriteAllowed()) {
          cloudStatus = cloudWriteBlockedMessage();
          return false;
        }
        markLocalChangedForCloud(keys);
        clearTimeout(cloudSaveTimer);
        cloudSaveTimer = null;
        if (cloudSyncing) {
          cloudSaveQueued = true;
          showValidationPopup("Synchronisation Supabase en attente...");
          return true;
        }
        showValidationPopup("Synchronisation Supabase en cours...");
        cloudSaveToRemote(false, { allowBeforeSourceLoaded: true });
        return true;
      }

      function saveCloudPatchNow(keys = []) {
        const normalizedKeys = normalizeCloudDirtyKeys(keys);
        if (!isAdmin() || !cloudReady() || !cloudConfig.autoSave) {
          return saveCloudNowIfPossible(normalizedKeys);
        }
        if (!cloudWriteAllowed()) {
          cloudStatus = cloudWriteBlockedMessage();
          return false;
        }
        markLocalChangedForCloud(normalizedKeys);
        clearTimeout(cloudSaveTimer);
        cloudSaveTimer = null;
        if (cloudSyncing) {
          cloudSaveQueued = true;
          return true;
        }
        cloudSaveToRemote(false, { allowBeforeSourceLoaded: true });
        return true;
      }

      function saveLocksToCloudNow(keys = ["prerequisiteLocks", "yearPrerequisiteLocks"]) {
        return saveCloudPatchNow(keys);
      }

      function readCloudConfigInputs() {
        const urlInput = document.getElementById("cloudUrl");
        const anonKeyInput = document.getElementById("cloudAnonKey");
        const etabIdInput = document.getElementById("cloudEtabId");
        const planningIdInput = document.getElementById("cloudPlanningId");
        if (!urlInput && !anonKeyInput && !etabIdInput && !planningIdInput) return cloudConfig;
        cloudConfig = {
          ...cloudConfig,
          url: urlInput?.value.trim() || cloudConfig.url || "",
          anonKey: anonKeyInput?.value.trim() || cloudConfig.anonKey || "",
          etabId: etabIdInput?.value.trim() || cloudConfig.etabId || "",
          planningId: planningIdInput?.value.trim() || cloudConfig.planningId || "planning-eps-2026-2027"
        };
        return cloudConfig;
      }

      function cloudReady() {
        return Boolean(cloudConfig.enabled && cloudConfig.url && cloudConfig.anonKey && cloudConfig.etabId && cloudConfig.planningId);
      }

      function isLocalRuntime() {
        const protocol = window.location.protocol;
        const hostname = window.location.hostname;
        return protocol === "file:" || hostname === "localhost" || hostname === "127.0.0.1" || hostname === "::1" || hostname.endsWith(".local");
      }

      function cloudWriteAllowed() {
        return cloudReady() && !isLocalRuntime();
      }

      function cloudSourceReadyForWrite() {
        return cloudWriteAllowed() && (!cloudConfig.autoLoad || cloudSourceLoaded);
      }

      function cloudWriteBlockedMessage() {
        if (cloudReady() && cloudConfig.autoLoad && !cloudSourceLoaded) return "Chargement Supabase requis avant toute sauvegarde.";
        return "Mode local : lecture cloud possible, ecriture Supabase bloquee. Seul le vrai site peut sauvegarder dans le cloud.";
      }

      function cloudConfigSavedMessage() {
        if (!cloudReady()) return "Cloud non configuré.";
        return cloudWriteAllowed() ? "Configuration cloud enregistrée." : cloudWriteBlockedMessage();
      }

      function criticalCloudNotice(label = "Modifications") {
        if (!cloudReady()) return "";
        const message = hasPendingCloudSave()
          ? `${label} en cours d'envoi Supabase.`
          : cloudStatus;
        return `<div class="cloudStatus">${message}</div>`;
      }

      function cloudEndpoint() {
        const base = cloudConfig.url.replace(/\/$/, "");
        return `${base}/rest/v1/eps_plannings`;
      }

      function feedbackEndpoint() {
        const base = cloudConfig.url.replace(/\/$/, "");
        return `${base}/rest/v1/eps_feedback`;
      }

      function etabMembersEndpoint() {
        const base = cloudConfig.url.replace(/\/$/, "");

      }

      function etabsEndpoint() {
        const base = cloudConfig.url.replace(/\/$/, "");
        return `${base}/rest/v1/etabs`;
      }

      function etabByIdQuery(etabId = cloudConfig.etabId) {
        return `id=eq.${encodeURIComponent(etabId)}`;
      }

      function planningQuery() {
        return `etab_id=eq.${encodeURIComponent(cloudConfig.etabId)}`;
      }

      function cloudPlanningRowId() {
        return cloudConfig.etabId || cloudConfig.planningId || "planning-eps";
      }

      function planningRowQuery(rowId) {
        return `etab_id=eq.${encodeURIComponent(cloudConfig.etabId)}&id=eq.${encodeURIComponent(rowId)}`;
      }

      function sortedPlanningRowsForCurrentEtab(rows = []) {
        const preferredId = cloudPlanningRowId();
        return rows
          .filter((row) => row?.etab_id === cloudConfig.etabId || row?.data?.etabId === cloudConfig.etabId)
          .sort((first, second) => {
            const firstPreferred = first.id === preferredId ? 0 : 1;
            const secondPreferred = second.id === preferredId ? 0 : 1;
            if (firstPreferred !== secondPreferred) return firstPreferred - secondPreferred;
            return new Date(second.updated_at || 0).getTime() - new Date(first.updated_at || 0).getTime();
          });
      }

      function cloudHeaders(extra = {}) {
        const token = adminSession?.access_token || cloudConfig.anonKey;
        return {
          apikey: cloudConfig.anonKey,
          Authorization: `Bearer ${token}`,
          "Content-Type": "application/json",
          ...extra
        };
      }

      function authEndpoint(path) {
        const base = cloudConfig.url.replace(/\/$/, "");
        return `${base}/auth/v1/${path}`;
      }

      function rpcEndpoint(name) {
        const base = cloudConfig.url.replace(/\/$/, "");

      function inviteTokenFromUrl() {
        try {
          const token = new URL(window.location.href).searchParams.get("invite") || "";
          if (token) localStorage.setItem(AUTH_INVITE_KEY, token);
          return token;
        } catch {
          return "";
        }
      }

      function inviteLinkForToken(token) {
        const url = new URL(window.location.href);
        url.searchParams.set("invite", token);
        return url.toString();
      }

      function cleanAuthUrl(removeInvite = false) {
        try {
          const url = new URL(window.location.href);
          url.hash = "";
          if (removeInvite) url.searchParams.delete("invite");
          window.history.replaceState({}, document.title, url.toString());
        } catch {}
      }

      function oauthRedirectUrl() {
        const url = new URL(window.location.href);
        url.hash = "";
        return url.toString();
      }

      function startOAuthProvider(provider) {
        if (!cloudConfig.url || !cloudConfig.anonKey) {
          authStatus = "Configuration Supabase incomplete.";
          render();
          return;
        }
        if (authInviteToken) localStorage.setItem(AUTH_INVITE_KEY, authInviteToken);
        const target = `${authEndpoint("authorize")}?provider=${encodeURIComponent(provider)}&redirect_to=${encodeURIComponent(oauthRedirectUrl())}`;
        window.location.assign(target);
      }

      async function fetchAuthUser(accessToken) {
        const response = await fetch(authEndpoint("user"), {
          headers: {
            apikey: cloudConfig.anonKey,
            Authorization: `Bearer ${accessToken}`,
            "Content-Type": "application/json"
          }
        });
        if (!response.ok) return null;
        return response.json();
      }

      async function handleOAuthRedirect() {
        const hash = window.location.hash?.startsWith("#") ? window.location.hash.slice(1) : "";
        if (!hash) return false;
        const params = new URLSearchParams(hash);
        const error = params.get("error_description") || params.get("error");
        if (error) {
          authStatus = `Connexion OAuth refusée : ${error}`;
          cleanAuthUrl(false);
          return true;
        }
        const accessToken = params.get("access_token");
        if (!accessToken) return false;
        const expiresIn = Number(params.get("expires_in") || 3600);
        const user = await fetchAuthUser(accessToken);
        saveAdminSession({
          access_token: accessToken,
          refresh_token: params.get("refresh_token") || "",
          token_type: params.get("token_type") || "bearer",
          expires_at: Math.floor(Date.now() / 1000) + expiresIn,
          user
        });
        const token = authInviteToken || localStorage.getItem(AUTH_INVITE_KEY) || "";
        if (token) {
          const previousEtabId = cloudConfig.etabId;
          await acceptEtabInvite(token);
          authStatus = previousEtabId
            ? "Invitation acceptée. Le nouvel établissement a été ajouté à votre compte."
            : "Invitation acceptée.";
          cleanAuthUrl(true);
        } else {
          await ensureCurrentUserEtab();
          authStatus = "";
          cleanAuthUrl(false);
        }
        requestInitialCloudLoad(false, true);
        return true;
      }

      function loadAdminSession() {
        try {
          const saved = localStorage.getItem(AUTH_SESSION_KEY);
          if (!saved) return null;
          const session = JSON.parse(saved);
          const expiresAt = Number(session.expires_at || 0) * 1000;
          return session.access_token && (!expiresAt || expiresAt > Date.now()) ? session : null;
        } catch {
          return null;
        }
      }

      function saveAdminSession(session) {
        adminSession = session;
        if (session) localStorage.setItem(AUTH_SESSION_KEY, JSON.stringify(session));
        else {
          localStorage.removeItem(AUTH_SESSION_KEY);
          currentEtabRole = "";
          currentEtabName = "";
          currentUserEtabs = [];
          localStorage.removeItem(AUTH_ROLE_KEY);
          localStorage.removeItem(AUTH_ETAB_NAME_KEY);
        }

      async function refreshCurrentEtabRole() {
        if (!isSignedIn() || !cloudConfig.etabId) return "";
        const knownEtab = currentUserEtabs.find((item) => item.etab_id === cloudConfig.etabId || item.id === cloudConfig.etabId);
        if (knownEtab) {
          setCurrentEtabName(knownEtab.etab_name || knownEtab.name || currentEtabName);
          return setCurrentEtabRole(knownEtab.role || "");
        }
        const userEtabResponse = await fetch(rpcEndpoint("get_current_user_etab"), {
          method: "POST",
          headers: cloudHeaders(),
          body: JSON.stringify({})
        });
        if (userEtabResponse.ok) {
          const userEtab = await userEtabResponse.json().catch(() => null);
          const userEtabId = userEtab?.etab_id || userEtab?.id || "";
          if (userEtabId === cloudConfig.etabId) {
            setCurrentEtabName(userEtab?.etab_name || userEtab?.name || currentEtabName);
            return setCurrentEtabRole(userEtab?.role || "");
          }
        }
        const rpcResponse = await fetch(rpcEndpoint("get_current_etab_role"), {
          method: "POST",
          headers: cloudHeaders(),
          body: JSON.stringify({ check_etab_id: cloudConfig.etabId })
        });
        if (rpcResponse.ok) {
          const result = await rpcResponse.json().catch(() => "");
          const role = typeof result === "string" ? result : result?.role || "";
          return setCurrentEtabRole(role);
        }
        const response = await fetch(`${etabMembersEndpoint()}?select=role&etab_id=eq.${encodeURIComponent(cloudConfig.etabId)}&limit=1`, {
          headers: cloudHeaders()
        });
        if (!response.ok) throw new Error(await response.text());
        const rows = await response.json();
        return setCurrentEtabRole(rows[0]?.role || "");
      }

      function normalizeUserEtabRow(row) {
        const etabId = row?.etab_id || row?.id || "";
        if (!etabId) return null;
        const joinedEtab = Array.isArray(row.etabs) ? row.etabs[0] : row.etabs;
        return {
          etab_id: etabId,
          role: normalizeEtabRole(row.role || ""),
          etab_name: normalizeEtabDisplayName(row.etab_name || row.name || joinedEtab?.name || etabId)
        };
      }

      function uniqueUserEtabs(rows = []) {
        const byId = new Map();
        rows.map(normalizeUserEtabRow).filter(Boolean).forEach((item) => {
          if (!byId.has(item.etab_id)) byId.set(item.etab_id, item);
        });
        return [...byId.values()];
      }

      async function fetchCurrentUserEtabsFromTables() {
        if (!isSignedIn()) return [];
        const userId = adminSession?.user?.id || "";
        if (!userId) return [];
        const membersResponse = await fetch(`${etabMembersEndpoint()}?select=etab_id,role,created_at&user_id=eq.${encodeURIComponent(userId)}&order=created_at.asc`, {
          headers: cloudHeaders()
        });
        if (!membersResponse.ok) throw new Error(await membersResponse.text());
        const memberships = await membersResponse.json().catch(() => []);
        if (!memberships.length) return [];
        const etabIds = memberships.map((item) => item.etab_id).filter(Boolean);
        let namesById = {};
        if (etabIds.length) {
          try {
            const etabsResponse = await fetch(`${etabsEndpoint()}?select=id,name&id=in.(${etabIds.join(",")})`, {
              headers: cloudHeaders()
            });
            if (etabsResponse.ok) {
              const etabs = await etabsResponse.json().catch(() => []);
              namesById = Object.fromEntries(etabs.map((item) => [item.id, item.name]));
            }
          } catch {
            namesById = {};
          }
        }
        return uniqueUserEtabs(memberships.map((item) => ({
          ...item,
          etab_name: namesById[item.etab_id] || item.etab_id
        })));
      }

      async function fetchCurrentUserEtabs() {
        if (!isSignedIn()) return [];
        let rpcRows = [];
        try {
          const response = await fetch(rpcEndpoint("list_current_user_etabs"), {
            method: "POST",
            headers: cloudHeaders(),
            body: JSON.stringify({})
          });
          if (response.ok) {
            const result = await response.json().catch(() => []);
            const parsed = typeof result === "string" ? JSON.parse(result) : result;
            const rows = Array.isArray(parsed) ? parsed : parsed?.items || [];
            rpcRows = uniqueUserEtabs(rows);
          }
        } catch (error) {
          // Fallback below for projects where the RPC has not been installed yet.
        }
        try {
          const tableRows = await fetchCurrentUserEtabsFromTables();
          if (tableRows.length >= rpcRows.length) return tableRows;
        } catch (error) {
          // Fallback below.
        }
        if (rpcRows.length) return rpcRows;
        try {
          const response = await fetch(`${etabMembersEndpoint()}?select=etab_id,role,etabs(name)&user_id=eq.${encodeURIComponent(adminSession?.user?.id || "")}&order=created_at.asc`, {
            headers: cloudHeaders()
          });
          if (response.ok) {
            const rows = await response.json().catch(() => []);
            return uniqueUserEtabs(rows);
          }
        } catch (error) {
          // Fallback below.
        }
        const fallbackId = await resolveCurrentUserEtabLegacy();
        return fallbackId ? [{ etab_id: fallbackId, role: currentEtabRole, etab_name: currentEtabName || fallbackId }] : [];
      }

      function setActiveEtabFromRow(row) {
        const item = normalizeUserEtabRow(row);
        if (!item) return "";
        cloudConfig = { ...cloudConfig, etabId: item.etab_id };
        saveCloudConfig();
        setCurrentEtabRole(item.role || "");
        setCurrentEtabName(item.etab_name || "");
        return item.etab_id;

        return rows.find((item) => item.etab_id === cloudConfig.etabId)

        if (!isSignedIn()) return "";

      async function resolveCurrentUserEtabs() {
        currentUserEtabs = await fetchCurrentUserEtabs();
        if (!currentUserEtabs.length) return "";
        if (!getDefaultEtabId() && currentUserEtabs.length === 1) setDefaultEtabId(currentUserEtabs[0].etab_id);
        const active = choosePreferredUserEtab(currentUserEtabs);
        return setActiveEtabFromRow(active);

      async function ensureCurrentUserEtab() {
        if (!isSignedIn()) return "";
        try {

          authStatus = `Établissement non retrouvé automatiquement : ${error.message || "erreur Supabase"}`;

        if (cloudConfig.etabId) {

        }
        return "";

      async function acceptEtabInvite(token = authInviteToken, options = {}) {
        const cleanToken = String(token || "").trim();
        if (!cleanToken) return "";
        const previousEtab = {
          etab_id: cloudConfig.etabId,
          role: currentEtabRole,
          etab_name: currentEtabName
        };
        const shouldPreserveCurrent = options.preserveCurrent ?? Boolean(previousEtab.etab_id);
        const response = await fetch(rpcEndpoint("accept_etab_invite"), {
          method: "POST",
          headers: cloudHeaders(),
          body: JSON.stringify({ invite_token: cleanToken })
        });
        const result = await response.json().catch(() => null);
        if (!response.ok) throw new Error(result?.message || result?.error_description || result?.msg || await response.text());
        const etabId = typeof result === "string" ? result : result?.id || result;
        if (!etabId) throw new Error("etab_id non retourné par Supabase");
        currentUserEtabs = await fetchCurrentUserEtabs();
        const invitedEtab = currentUserEtabs.find((item) => item.etab_id === etabId) || {
          etab_id: etabId,
          role: result?.role || "member",
          etab_name: result?.etab_name || result?.name || etabId
        };
        if (shouldPreserveCurrent && previousEtab.etab_id) {
          const previousKnownEtab = currentUserEtabs.find((item) => item.etab_id === previousEtab.etab_id) || previousEtab;
          setActiveEtabFromRow(previousKnownEtab);
          if (!getDefaultEtabId()) setDefaultEtabId(previousEtab.etab_id);
        } else {
          setActiveEtabFromRow(invitedEtab);
          if (!getDefaultEtabId()) setDefaultEtabId(etabId);
        }
        authInviteToken = "";
        localStorage.removeItem(AUTH_INVITE_KEY);
        return etabId;
      }

      async function createEtabInvite(role = "member") {
        if (!cloudConfig.etabId) throw new Error("aucun Établissement actif");
        const response = await fetch(rpcEndpoint("create_etab_invite"), {
          method: "POST",
          headers: cloudHeaders(),
          body: JSON.stringify({ invite_etab_id: cloudConfig.etabId, invite_role: role === "owner" ? "owner" : "member" })
        });
        const result = await response.json().catch(() => null);
        if (!response.ok) throw new Error(result?.message || result?.error_description || result?.msg || await response.text());
        const token = typeof result === "string" ? result : result?.token || result;
        if (!token) throw new Error("invitation non retournée par Supabase");
        authInviteLink = inviteLinkForToken(token);
        return authInviteLink;
      }

        authStatus = "Connexion en cours...";

        try {

          const response = await fetch(authEndpoint("token?grant_type=password"), {
            method: "POST",
            headers: cloudHeaders(),

        } finally {
          render();
        }
      }

      function etabSlugFromName(name) {
        return String(name || "")
          .toLowerCase()
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "")
          .replace(/[^a-z0-9]+/g, "-")
          .replace(/^-|-$/g, "")
          .slice(0, 80) || "Établissement";
      }

      async function createEtabForCurrentUser(name) {
        const label = String(name || "").trim();
        if (!label) throw new Error("nom d’établissement requis");
        const response = await fetch(rpcEndpoint("create_etab_for_current_user"), {
          method: "POST",
          headers: cloudHeaders(),
          body: JSON.stringify({ etab_name: label, etab_slug: etabSlugFromName(label) })
        });
        const result = await response.json().catch(() => null);
        if (!response.ok) {
          const rawMessage = result?.message || result?.error_description || result?.msg || await response.text();
          const normalized = String(rawMessage || "").toLowerCase();
          if (normalized.includes("create_etab_for_current_user") || normalized.includes("schema cache")) {
            throw new Error("fonction Supabase create_etab_for_current_user manquante. Lancez le SQL de création des fonctions dans Supabase, puis rechargez le cache/API.");
          }
          throw new Error(rawMessage);
        }
        const etabId = typeof result === "string" ? result : result?.id || result;
        if (!etabId) throw new Error("etab_id non retourné par Supabase");
        cloudConfig = { ...cloudConfig, etabId };
        saveCloudConfig();
        setCurrentEtabName(label);
        setCurrentEtabRole("owner");
        currentUserEtabs = await fetchCurrentUserEtabs();
        setDefaultEtabId(etabId);
        return etabId;
      }

        return (!dataEtabId || dataEtabId === cloudConfig.etabId)
          && (!dataPlanningId || dataPlanningId === cloudConfig.planningId);

        }
