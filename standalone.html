      function updateNavigationActive() {
        document.querySelectorAll("[data-week]").forEach((item) => {
          const buildMode = item.dataset.buildMode || "";
          const isActive = buildMode
            ? week === "build" && constructionMode === buildMode
            : item.dataset.week === week && week !== "build";
          item.classList.toggle("active", isActive);
          const tracksProgress = Boolean(buildMode && buildMode !== "planning");
          const complete = tracksProgress && adminStepComplete(buildMode);
          item.classList.toggle("stepComplete", complete);
          item.classList.toggle("stepIncomplete", tracksProgress && !complete);
          if (buildMode === "planning") {
            const locked = !canAccessConstructionPlanning();
            item.disabled = locked;
            item.title = locked ? "Complétez les prérequis avant d’accéder à Construction." : "";
          }
        });
      }

      function attachAuthControls() {
        document.querySelectorAll("[data-oauth-provider]").forEach((button) => {
          button.addEventListener("click", () => startOAuthProvider(button.dataset.oauthProvider));
        });
        const openEtabSwitch = document.getElementById("openEtabSwitch");
        if (openEtabSwitch) openEtabSwitch.addEventListener("click", () => {
          authSwitchModalOpen = true;
          render();
        });
        const shareInviteToggle = document.getElementById("shareInviteToggle");
        if (shareInviteToggle) shareInviteToggle.addEventListener("click", () => {
          authInviteModalOpen = true;
          authInviteMenuOpen = false;
          render();
        });
        const logoutAdmin = document.getElementById("logoutAdmin");
        if (logoutAdmin) logoutAdmin.addEventListener("click", signOutAdmin);
        document.querySelectorAll("[data-set-default-etab]").forEach((button) => {
          button.addEventListener("click", () => {
            const etabId = button.dataset.setDefaultEtab;
            const etab = currentUserEtabs.find((item) => item.etab_id === etabId) || null;
            if (!etabId) return;
            setDefaultEtabId(etabId);
            authStatus = `Établissement par défaut : ${etab?.etab_name || etabId}`;
            showValidationPopup("Établissement défini par défaut");
            render();
          });
        });
        document.querySelectorAll("[data-close-switch-modal]").forEach((target) => {
          target.addEventListener("click", (event) => {
            if (target.classList.contains("modalBackdrop") && event.target !== target) return;
            authSwitchModalOpen = false;
            render();
          });
        });
        document.querySelectorAll("[data-switch-etab]").forEach((button) => {
          button.addEventListener("click", () => {
          const selected = currentUserEtabs.find((item) => item.etab_id === button.dataset.switchEtab);
          if (!selected || selected.etab_id === cloudConfig.etabId) return;
          if (!window.confirm(`Changer vers ${selected.etab_name || selected.etab_id} ?\n\nLa page va se recharger et relire les données Supabase de cet établissement.`)) return;
          if (hasPendingCloudSave() && !window.confirm("Une sauvegarde cloud est encore en attente. Changer d'établissement peut ignorer cette modification locale. Continuer ?")) {
            return;
          }
          discardLocalChangesFromCloudSoon();
          setActiveEtabFromRow(selected);
          clearLocalPlanningStorageForEtabSwitch();
          resetCloudLoadState();
          authStatus = `Établissement actif : ${selected.etab_name || selected.etab_id}`;
          window.location.reload();
          });
        });
      }

      function render() {
        if (week === "alerts" || week === "log") week = "current";
        if (!isAdmin() && week === "build") week = "current";
        const root = document.getElementById("root");
        const dateInfo = document.getElementById("dateInfo");
        const legend = document.getElementById("legend");
        if (!root || !dateInfo || !legend) return;
        const app = document.querySelector(".app");
        if (app) {
          app.classList.toggle("hasSidebar", isSignedIn());
          app.classList.toggle("sidebarCollapsed", isSignedIn() && sidebarCollapsed);
        }
        const sidebarToggle = document.getElementById("sidebarToggle");
        if (sidebarToggle) {
          sidebarToggle.textContent = sidebarCollapsed ? "›" : "‹";
          sidebarToggle.setAttribute("aria-label", sidebarCollapsed ? "Afficher le menu" : "Masquer le menu");
          sidebarToggle.setAttribute("title", sidebarCollapsed ? "Afficher le menu" : "Masquer le menu");
        }
        dateInfo.style.display = "none";
        dateInfo.innerHTML = "";
        renderAuthBox();
        const adminNavGroup = document.getElementById("adminNavGroup");
        if (adminNavGroup) adminNavGroup.classList.toggle("locked", !isAdmin());
        if (!isSignedIn()) {
          updateNavigationActive();
          const top = document.querySelector(".top");
          if (top) top.style.display = "none";
          legend.style.display = "none";
          legend.innerHTML = "";
          root.innerHTML = renderLoggedOutHome();
          root.insertAdjacentHTML("beforeend", renderValidationPopup());
          root.insertAdjacentHTML("beforeend", renderShareInviteModal());
          root.insertAdjacentHTML("beforeend", renderEtabSwitchModal());
          attachAuthControls();
          return;
        }
        const top = document.querySelector(".top");
        if (top) top.style.display = "";
        try {
          updateNavigationActive();
          const cycle = generateCycle();
          const hideLegend = week === "build" || week === "guide" || week === "request" || week === "account" || week === "cycle" || week === "year" || week === "current";
          legend.style.display = hideLegend ? "none" : "flex";
          legend.innerHTML = hideLegend ? "" : renderTeacherLegend();
          if (week === "year") root.innerHTML = renderYearView(cycle);
          else if (week === "cycle") root.innerHTML = renderCycleView();
          else if (week === "build") root.innerHTML = renderConstructionView();
          else if (week === "guide") root.innerHTML = renderGuideView();
          else if (week === "request") root.innerHTML = renderRequestView();
          else if (week === "account") root.innerHTML = renderAccountView();
          else root.innerHTML = renderCalendar(cycle);
        } catch (error) {
          console.error(error);
          legend.style.display = "none";
          legend.innerHTML = "";
          root.innerHTML = renderAppError(error);
        }
        root.insertAdjacentHTML("beforeend", renderValidationPopup());
        root.insertAdjacentHTML("beforeend", renderShareInviteModal());
        root.insertAdjacentHTML("beforeend", renderEtabSwitchModal());
        applyPrerequisitesLockState();
        const adminLoginForm = document.getElementById("adminLoginForm");
        if (adminLoginForm) {
          adminLoginForm.addEventListener("submit", (event) => {
            event.preventDefault();
            authEmail = document.getElementById("adminEmail")?.value.trim() || "";
            authPassword = document.getElementById("adminPassword")?.value || "";
            authEtabName = document.getElementById("authEtabName")?.value.trim() || authEtabName;
            if (authMode === "signup") signUpAdmin();
            else signInAdmin();
          });
        }
        const toggleAuthMode = document.getElementById("toggleAuthMode");
        if (toggleAuthMode) toggleAuthMode.addEventListener("click", () => {
          authMode = authMode === "signup" ? "signin" : "signup";
          authStatus = "";
          render();
        });
        attachAuthControls();
        const adminEmailInput = document.getElementById("adminEmail");
        if (adminEmailInput) adminEmailInput.addEventListener("input", () => authEmail = adminEmailInput.value);
        const adminPasswordInput = document.getElementById("adminPassword");
        if (adminPasswordInput) adminPasswordInput.addEventListener("input", () => authPassword = adminPasswordInput.value);
        const authEtabNameInput = document.getElementById("authEtabName");
        if (authEtabNameInput) authEtabNameInput.addEventListener("input", () => authEtabName = authEtabNameInput.value);
        const createEtabForm = document.getElementById("createEtabForm");
        if (createEtabForm) createEtabForm.addEventListener("submit", async (event) => {
          event.preventDefault();
          authEtabName = document.getElementById("authEtabName")?.value.trim() || "";
          authStatus = "Création de l’établissement...";
          render();
        try {
          await createEtabForCurrentUser(authEtabName);
          setCurrentEtabRole("owner");
          authStatus = "Établissement créé.";
          } catch (error) {
            authStatus = `Création impossible : ${error.message || "erreur inconnue"}`;
          } finally {
            render();
          }
        });
        const acceptInviteForm = document.getElementById("acceptInviteForm");
        if (acceptInviteForm) acceptInviteForm.addEventListener("submit", async (event) => {
          event.preventDefault();
          authStatus = "Rattachement à l'équipe EPS...";
          render();
          try {
            const previousEtabId = cloudConfig.etabId;
            await acceptEtabInvite(authInviteToken);
            authStatus = previousEtabId
              ? "Nouvel établissement ajouté à votre compte."
              : "Vous avez rejoint l'équipe EPS.";
            cleanAuthUrl(true);
            requestInitialCloudLoad(false, true);
          } catch (error) {
            authStatus = `Invitation impossible : ${error.message || "erreur inconnue"}`;
          } finally {
            render();
          }
        });
        document.querySelectorAll("[data-close-invite-modal]").forEach((target) => {
          target.addEventListener("click", (event) => {
            if (target.classList.contains("modalBackdrop") && event.target !== target) return;
            authInviteModalOpen = false;
            render();
          });
        });
        const inviteLinkInput = document.getElementById("inviteLinkInput");
        if (inviteLinkInput && authInviteLink) inviteLinkInput.addEventListener("click", () => inviteLinkInput.select());
        const copyInviteLink = document.querySelector("[data-copy-invite-link]");
        if (copyInviteLink) copyInviteLink.addEventListener("click", async () => {
          if (!authInviteLink) return;
          try {
            if (navigator.clipboard?.writeText) await navigator.clipboard.writeText(authInviteLink);
            else if (inviteLinkInput) {
              inviteLinkInput.select();
              document.execCommand("copy");
            }
            authInviteStatus = "Lien copié.";
          } catch (error) {
            authInviteStatus = "Copie impossible : sélectionnez le lien puis copiez-le manuellement.";
          } finally {
            render();
          }
        });
        document.querySelectorAll("[data-create-invite-link]").forEach((button) => {
          button.addEventListener("click", async () => {
            const role = button.dataset.createInviteLink === "owner" ? "owner" : "member";
            const label = role === "owner" ? "admin" : "consultation";
            authInviteRole = role;
            authInviteMenuOpen = false;
            authInviteStatus = `Generation du lien ${label}...`;
            authInviteLink = "";
            render();
            try {
              const link = await createEtabInvite(role);
              authInviteModalOpen = true;
              authInviteStatus = `Lien d'invitation ${label} prêt à partager.`;
              if (navigator.clipboard?.writeText) {
                await navigator.clipboard.writeText(link).catch(() => {});
                authInviteStatus = `Lien d'invitation ${label} prêt à partager et copié.`;
              }
            } catch (error) {
              authInviteStatus = `Invitation impossible : ${error.message || "erreur inconnue"}`;
            } finally {
              render();
            }
          });
        });
        document.querySelectorAll("[data-warning-build-mode]").forEach((warning) => {
          warning.addEventListener("click", () => {
            week = "build";
            constructionMode = warning.dataset.warningBuildMode || "planning";
            if (constructionMode === "prerequisites" && warning.dataset.warningSubMode) prerequisiteMode = warning.dataset.warningSubMode;
            if (constructionMode === "yearPrerequisites" && warning.dataset.warningSubMode) yearPrerequisiteMode = warning.dataset.warningSubMode;
            render();
          });
        });
        document.querySelectorAll("[data-request-kind]").forEach((button) => {
          button.addEventListener("click", () => {
            requestKind = button.dataset.requestKind;
            render();
          });
        });
        const requestAuthorInput = document.getElementById("requestAuthor");
        if (requestAuthorInput) requestAuthorInput.addEventListener("input", () => requestAuthor = requestAuthorInput.value);
        const requestMessageInput = document.getElementById("requestMessage");
        if (requestMessageInput) requestMessageInput.addEventListener("input", () => requestMessage = requestMessageInput.value);
        const sendFeedback = document.getElementById("sendFeedback");
        if (sendFeedback) sendFeedback.addEventListener("click", submitFeedback);
        document.querySelectorAll("[data-open-date-range]").forEach((button) => {
          button.addEventListener("click", () => {
            activeDateRangePicker = button.dataset.openDateRange;
            dateRangeDraftStart = button.dataset.rangeStart || "";
            dateRangeDraftEnd = button.dataset.rangeEnd || "";
            dateRangeSelectionError = "";
            dateRangeMonth = monthKeyForDate(dateRangeDraftStart || schoolYear.start);
            render();
          });
        });
        document.querySelectorAll("[data-date-range-month]").forEach((button) => {
          button.addEventListener("click", () => {
            dateRangeMonth = shiftMonthKey(dateRangeMonth, button.dataset.dateRangeMonth === "+" ? 1 : -1);
            render();
          });
        });
        document.querySelectorAll("[data-date-range-day]").forEach((button) => {
          button.addEventListener("click", () => {
            const value = button.dataset.dateRangeDay;
            if (button.disabled || dateRangeBlockedReason(value)) return;
            dateRangeSelectionError = "";
            if (!dateRangeDraftStart || dateRangeDraftEnd) {
              dateRangeDraftStart = value;
              dateRangeDraftEnd = "";
              render();
              return;
            }
            const start = value < dateRangeDraftStart ? value : dateRangeDraftStart;
            const end = value < dateRangeDraftStart ? dateRangeDraftStart : value;
            dateRangeDraftStart = start;
            dateRangeDraftEnd = end;
            render();
          });
        });
        document.querySelectorAll("[data-validate-date-range]").forEach((button) => {
          button.addEventListener("click", () => {
            if (button.disabled || !dateRangeDraftStart || !dateRangeDraftEnd) return;
            applyDateRangeSelection(button.dataset.validateDateRange, dateRangeDraftStart, dateRangeDraftEnd);
            activeDateRangePicker = "";
            dateRangeDraftStart = "";
            dateRangeDraftEnd = "";
            dateRangeSelectionError = "";
            showValidationPopup("Dates validées");
            render();
          });
        });
        document.querySelectorAll("[data-year-week-rank]").forEach((button) => {
          button.addEventListener("click", () => {
            selectedYearWeekRank = Number(button.dataset.yearWeekRank);
            render();
          });
        });
        document.querySelectorAll("[data-year-cell]").forEach((cell) => {
          cell.addEventListener("click", () => {
            selectedYearCellKey = cell.dataset.yearCell;
            selectedYearWeekRank = parseYearCellKey(selectedYearCellKey).weekRank;
            render();
          });
        });
        document.querySelectorAll("[data-close-year-cell-detail]").forEach((button) => {
          button.addEventListener("click", () => {
            selectedYearCellKey = "";
            render();
          });
        });
        const showSelectedWeek = document.getElementById("showSelectedWeek");
        if (showSelectedWeek) {
          showSelectedWeek.addEventListener("click", () => {
            displayedCurrentWeekRank = selectedYearWeekRank || currentSchoolWeek().rank;
            week = "current";
            updateNavigationActive();
            render();
          });
        }
        document.querySelectorAll("[data-print-format]").forEach((button) => {
          button.addEventListener("click", () => {
            const format = button.dataset.printFormat;
            const printTrimesters = button.dataset.printTrimesters === "construction";
            if (printTrimesters) {
              constructionPrintTrimesterExport = true;
              render();
            }
            setTimeout(() => {
              const existingPrintStyle = document.getElementById("printPageStyle");
              if (existingPrintStyle) existingPrintStyle.remove();
              const printStyle = document.createElement("style");
              printStyle.id = "printPageStyle";
              printStyle.textContent = `@page { size: ${format} landscape; margin: ${printTrimesters ? "4mm" : "6mm"}; }`;
              document.head.appendChild(printStyle);
              document.body.classList.remove("printA3", "printA2", "printA4", "printConstructionTrimesters");
              document.body.classList.add(`print${format}`);
              if (printTrimesters) document.body.classList.add("printConstructionTrimesters");
              setTimeout(() => {
                window.print();
                setTimeout(() => {
                  document.body.classList.remove("printA3", "printA2", "printA4", "printConstructionTrimesters");
                  const style = document.getElementById("printPageStyle");
                  if (style) style.remove();
                  if (printTrimesters) {
                    constructionPrintTrimesterExport = false;
                    render();
                  }
                }, 500);
              }, 50);
            }, printTrimesters ? 60 : 0);
          });
        });
        const prevWeek = document.getElementById("prevWeek");
        if (prevWeek) {
          prevWeek.addEventListener("click", () => {
            navigateDisplayedWeek(-1);
            render();
          });
        }
        const nextWeek = document.getElementById("nextWeek");
        if (nextWeek) {
          nextWeek.addEventListener("click", () => {
            navigateDisplayedWeek(1);
            render();
          });
        }
        const homeCycleSelect = document.getElementById("homeCycleSelect");
        if (homeCycleSelect) {
          homeCycleSelect.addEventListener("change", () => {
            activeHomeCycleId = homeCycleSelect.value;
            render();
          });
        }
        document.querySelectorAll("[data-cycle-letter]").forEach((button) => {
          button.addEventListener("click", () => {
            activeCycleLetter = button.dataset.cycleLetter;
            render();
          });
        });
        document.querySelectorAll("[data-cycle-view-zoom]").forEach((button) => {
          button.addEventListener("click", () => {
            const direction = button.dataset.cycleViewZoom;
            cycleViewZoom = Math.min(1.5, Math.max(0.15, cycleViewZoom + (direction === "+" ? 0.1 : -0.1)));
            cycleViewZoom = Math.round(cycleViewZoom * 100) / 100;
            render();
          });
        });
        document.querySelectorAll("[data-cycle-view-zoom-reset]").forEach((button) => {
          button.addEventListener("click", () => {
            cycleViewZoom = 0.8;
            render();
          });
        });
        document.querySelectorAll("[data-prerequisite-mode]").forEach((button) => {
          button.addEventListener("click", () => {
            prerequisiteMode = button.dataset.prerequisiteMode;
            render();
          });
        });
        document.querySelectorAll("[data-year-prerequisite-mode]").forEach((button) => {
          button.addEventListener("click", () => {
            yearPrerequisiteMode = button.dataset.yearPrerequisiteMode;
            render();
          });
        });
        document.querySelectorAll("[data-prerequisites-lock]").forEach((input) => {
          input.addEventListener("change", () => {
            const mode = input.dataset.prerequisitesLock || prerequisiteMode;
            prerequisiteLocks = { ...prerequisiteLocks, [mode]: input.checked };
            savePrerequisiteLocks();
            showValidationPopup(input.checked ? "Sous-onglet verrouillé" : "Sous-onglet déverrouillé");
            render();
          });
        });
        document.querySelectorAll("[data-year-prerequisites-lock]").forEach((input) => {
          input.addEventListener("change", () => {
            const mode = input.dataset.yearPrerequisitesLock || yearPrerequisiteMode;
            yearPrerequisiteLocks = { ...yearPrerequisiteLocks, [mode]: input.checked };
            saveYearPrerequisiteLocks();
            showValidationPopup(input.checked ? "Sous-onglet verrouillé" : "Sous-onglet déverrouillé");
            render();
          });
        });
        document.querySelectorAll("[data-construction-lock]").forEach((input) => {
          input.addEventListener("change", () => {

          cancelAsEdit.addEventListener("click", () => {
            resetAsForm();
            render();
          });
        }
        document.querySelectorAll("[data-edit-as]").forEach((button) => {
          button.addEventListener("click", () => {
            const session = asSessions.find((item) => item.id === button.dataset.editAs);
            if (!session) return;
            editingAsId = session.id;
            asName = session.name;
            asStart = session.start;
            asEnd = session.end;
            asWeekdays = [...(session.weekdays || [])];
            asTeacherIds = [...(session.teacherIds || [])];
            render();
          });
        });
        document.querySelectorAll("[data-delete-as]").forEach((button) => {
          button.addEventListener("click", () => {
            asSessions = asSessions.filter((session) => session.id !== button.dataset.deleteAs);
            delete asExclusions[button.dataset.deleteAs];
            if (editingAsId === button.dataset.deleteAs) resetAsForm();
            saveAsSessions();
            saveAsExclusions();
            showValidationPopup("AS supprimée");
            render();
          });
        });
        const addBuiltBlock = document.getElementById("addBuiltBlock");
        if (addBuiltBlock && activeBuildCell) {
          addBuiltBlock.addEventListener("click", () => {
            const { rowId, weekRank } = parseYearCellKey(activeBuildCell);
            const weekItem = schoolYearWeeks().find((item) => item.rank === weekRank);
            if (!blockTeacherIds.length) return;
            const block = currentBlock();
            const editingCycleDetails = constructionBuildMode === "cycleDetails" && Boolean(editingBuildBlock?.ruleId);
            const cellCycle = activeBuildCycleId
              ? constructionCycleById(activeBuildCycleId)
              : cycleForWeek(weekItem, classParts(block.schoolClass).level);
            if (!cellCycle) return;
            const row = yearRows().find((item) => item.id === rowId);
            if (!editingCycleDetails && blockUnavailableMessage(row, weekItem, block)) {
              render();
              return;
            }
            if (!editingCycleDetails && !activeBuildCycleId && blockWeekLetter !== "all" && blockWeekLetter !== weekItem.letter) {
              render();
              return;
            }
            if (blockCycleUnavailableMessage(rowId, cellCycle.id, block, blockWeekLetter)) {
              render();
              return;
            }
            if (!activityAllowedForBuildBlock(block)) {
              render();
              return;
            }
            if (editingCycleDetails) {
              const saved = updateConstructionRuleCycleDetails(editingBuildBlock.ruleId, activeBuildCycleId || block.cycleId || activeConstructionCycleId, block);
              showValidationPopup(saved ? "Installation / activité mises à jour" : "Bloc introuvable : modification non enregistrée");
            } else if (editingBuildBlock?.ruleId) {
              updateAnnualConstructionRule(editingBuildBlock.ruleId, block, blockWeekLetter);
              showValidationPopup("Bloc annuel modifie");
            } else {
              applyAnnualConstructionBlock(rowId, block, blockWeekLetter);
              showValidationPopup("Bloc annuel valide");
            }
            editingBuildBlock = null;
            activeBuildCell = null;
            activeBuildCycleId = null;
            blockWeekLetter = "all";
            blockSecondTeacherHours = "";
            blockCoIntervention = false;
            blockIsOption = false;
            blockOptionId = "";
            blockOptionHours = "";
            blockOptionCycleIds = [];
            blockTeacherClasses = {};
            blockTeacherClassLevels = {};
            render();
          });
        }
        document.querySelectorAll("#closeBuildModal, #closeBuildModalFooter").forEach((button) => {
          button.addEventListener("click", () => {
            activeBuildCell = null;
            activeBuildCycleId = null;
            editingBuildBlock = null;
            blockWeekLetter = "all";
            blockSecondTeacherHours = "";
            blockCoIntervention = false;
            blockIsOption = false;
            blockOptionId = "";
            blockOptionHours = "";
            blockOptionCycleIds = [];
            blockTeacherClasses = {};
            blockTeacherClassLevels = {};
            render();
          });
        });
        document.querySelectorAll("[data-pick-week-letter]").forEach((button) => {
          button.addEventListener("click", () => {
            if (button.disabled) return;
            blockWeekLetter = button.dataset.pickWeekLetter;
            render();
          });
        });
        document.querySelectorAll("[data-construction-cycle]").forEach((button) => {
          button.addEventListener("click", () => {
            activeConstructionCycleId = button.dataset.constructionCycle;
            activeBuildCell = null;
            activeBuildCycleId = null;
            editingBuildBlock = null;
            render();
          });
        });
        const cycleCountInput = document.getElementById("cycleCount");
        if (cycleCountInput) {
          cycleCountInput.addEventListener("change", () => {
            const previousCount = activeCycles().length;
            setCycleCount(cycleCountInput.value);
            const nextCount = activeCycles().length;
            if (nextCount > previousCount) showValidationPopup("Cycle ajouté");
            else if (nextCount < previousCount) showValidationPopup("Cycle supprimé");
            else showValidationPopup("Cycles mis à jour");
            render();
          });
        }
        document.querySelectorAll("[data-cycle-scope]").forEach((button) => {
          button.addEventListener("click", () => {
            activeCycleScope = button.dataset.cycleScope;
            const scopedCycles = activeCycles();
            activeCycleId = scopedCycles[0]?.id || "";
            render();
          });
        });
        document.querySelectorAll("[data-move-cell], [data-open-cell]").forEach((cell) => {
          cell.addEventListener("click", (event) => {
            if (event.target.closest("[data-remove-cell], [data-start-move-kind]")) return;
            if (ignoreNextMoveCellClick) {
              ignoreNextMoveCellClick = false;
              return;
            }
            if (movingBuildBlock) {
              moveSelectedBlockTo(cell.dataset.moveCell || cell.dataset.openCell);
              movingBuildBlock = null;
              window.onpointermove = null;
              activeBuildCell = null;
              activeBuildCycleId = null;
              editingBuildBlock = null;
              blockCoIntervention = false;
              blockIsOption = false;
              blockOptionId = "";
              blockOptionHours = "";
              blockOptionCycleIds = [];
              blockTeacherClasses = {};
              blockTeacherClassLevels = {};
              render();
              return;
            }
            if (!cell.dataset.openCell) return;
            activeBuildCell = cell.dataset.openCell;
            activeBuildCycleId = cell.dataset.openCycleId || null;
            editingBuildBlock = null;
            blockTeacherIds = [];
            blockFacilityId = "";
            blockActivityId = "";
            blockClass = "";
            blockClassLevel = "";
            blockTeacherClasses = {};
            blockTeacherClassLevels = {};
            blockWeekLetter = cell.dataset.openWeekLetter || "all";
            blockSecondTeacherHours = "";
            blockCoIntervention = false;
            blockIsOption = false;
            blockOptionId = "";
            blockOptionHours = "";
            blockOptionCycleIds = [];
            render();
          });
        });
        const cancelMoveBlock = document.getElementById("cancelMoveBlock");
        if (cancelMoveBlock) {
          cancelMoveBlock.addEventListener("click", () => {
            movingBuildBlock = null;
            ignoreNextMoveCellClick = false;
            window.onpointermove = null;
            render();
          });
        }
        if (movingBuildBlock) {
          window.onpointermove = (event) => {
            movingBuildBlock = { ...movingBuildBlock, x: event.clientX, y: event.clientY };
            const ghost = document.getElementById("movingBlockGhost");
            if (ghost) {
              ghost.style.left = `${event.clientX}px`;
              ghost.style.top = `${event.clientY}px`;
            }
          };
        } else {
          window.onpointermove = null;
        }
        window.onkeydown = (event) => {
          if (event.key !== "Escape" || !movingBuildBlock) return;
          movingBuildBlock = null;
          ignoreNextMoveCellClick = false;
          window.onpointermove = null;
          render();
        };
        document.querySelectorAll("[data-edit-built-block]").forEach((block) => {
          block.addEventListener("dblclick", (event) => {
            event.stopPropagation();
            const index = Number(block.dataset.editBuiltBlock);
            const item = constructionPlan[activeBuildCell]?.[index];
            if (!item) return;
            activeBuildCycleId = item.cycleId || activeBuildCycleId;
            blockTeacherIds = teacherIdsForBlock(item);
            blockFacilityId = item.facilityId;
            blockActivityId = item.activityId || "";
            blockClass = item.schoolClass;
            blockClassLevel = classParts(item.schoolClass).level;
            blockTeacherClasses = item.teacherClasses && typeof item.teacherClasses === "object"
              ? Object.fromEntries(blockTeacherIds.map((teacherId) => [teacherId, item.teacherClasses[teacherId] || item.schoolClass || ""]).filter(([, schoolClass]) => schoolClass))
              : Object.fromEntries(blockTeacherIds.map((teacherId) => [teacherId, item.schoolClass || ""]).filter(([, schoolClass]) => schoolClass));
            blockTeacherClassLevels = Object.fromEntries(Object.entries(blockTeacherClasses).map(([teacherId, schoolClass]) => {
              const baseClassId = specialClassBaseIdFromSchoolId(schoolClass);
              return [teacherId, classParts(baseClassId || schoolClass).level];
            }));
            blockWeekLetter = item.weekLetter || "all";
            blockSecondTeacherHours = "";
            blockCoIntervention = Boolean(item.coIntervention);
            blockIsOption = Boolean(item.optionBlock);
            blockOptionId = item.optionId || "";
            blockOptionHours = item.optionHours ? String(item.optionHours) : "";
            blockOptionCycleIds = item.optionBlock ? normalizedOptionCycleIds(item.optionCycleIds) : [];
            editingBuildBlock = { index, ruleId: item.ruleId };
            render();
          });
        });
        document.querySelectorAll("[data-edit-cycle-details]").forEach((block) => {
          block.addEventListener("click", (event) => {
            event.stopPropagation();
            const key = block.dataset.blockKey;
            const index = Number(block.dataset.editCycleDetails);
            const cycleId = block.dataset.cycleId || activeConstructionCycleId;
            const cycle = constructionCycleById(cycleId) || activeConstructionCycle();
            const rule = block.dataset.ruleId ? constructionRules.find((entry) => entry.id === block.dataset.ruleId) : null;
            const item = rule && cycle ? constructionCycleDisplayBlock({ ...(constructionPlan[key]?.[index] || {}), ruleId: rule.id }, cycle) : constructionPlan[key]?.[index];
            if (!item) return;
            activeBuildCell = key;
            activeBuildCycleId = cycleId || item.cycleId || activeConstructionCycleId;
            blockTeacherIds = teacherIdsForBlock(item);
            blockFacilityId = item.facilityId || "";
            blockActivityId = item.activityId || "";
            blockClass = item.schoolClass || "";
            blockClassLevel = classParts(item.schoolClass || "").level;
            blockTeacherClasses = item.teacherClasses && typeof item.teacherClasses === "object"
              ? Object.fromEntries(blockTeacherIds.map((teacherId) => [teacherId, item.teacherClasses[teacherId] || item.schoolClass || ""]).filter(([, schoolClass]) => schoolClass))
              : Object.fromEntries(blockTeacherIds.map((teacherId) => [teacherId, item.schoolClass || ""]).filter(([, schoolClass]) => schoolClass));
            blockTeacherClassLevels = Object.fromEntries(Object.entries(blockTeacherClasses).map(([teacherId, schoolClass]) => {
              const baseClassId = specialClassBaseIdFromSchoolId(schoolClass);
              return [teacherId, classParts(baseClassId || schoolClass).level];
            }));
            blockWeekLetter = item.weekLetter || "all";
            blockSecondTeacherHours = "";
            blockCoIntervention = Boolean(item.coIntervention);
            blockIsOption = Boolean(item.optionBlock);
            blockOptionId = item.optionId || "";
            blockOptionHours = item.optionHours ? String(item.optionHours) : "";
            blockOptionCycleIds = item.optionBlock ? normalizedOptionCycleIds(item.optionCycleIds) : [];
            editingBuildBlock = { index, ruleId: item.ruleId };
            render();
          });
        });
        document.querySelectorAll("[data-start-move-kind]").forEach((button) => {
          button.addEventListener("click", (event) => {
            event.stopPropagation();
            startMovingBuildBlock({
              type: button.dataset.startMoveKind,
              key: button.dataset.blockKey,
              index: Number(button.dataset.moveIndex),
              id: button.dataset.moveId
            }, event.clientX, event.clientY);
          });
        });
        document.querySelectorAll("[data-remove-cell]").forEach((button) => {
          button.addEventListener("click", (event) => {
            event.stopPropagation();
            const key = button.dataset.removeCell;
            const index = Number(button.dataset.removeIndex);
            removeConstructionBlock(key, index);
            render();
          });
        });
        document.querySelectorAll("[data-delete-cell-event]").forEach((button) => {
          button.addEventListener("click", (event) => {
            event.stopPropagation();
            excludeEventFromSlot(button.dataset.deleteCellEvent, button.dataset.deleteCellKey);
          });
        });
        document.querySelectorAll("[data-delete-cell-as]").forEach((button) => {
          button.addEventListener("click", (event) => {
            event.stopPropagation();
            excludeAsFromSlot(button.dataset.deleteCellAs, button.dataset.deleteCellKey);
          });
        });
        const deleteWholeCycle = document.getElementById("deleteWholeCycle");
        if (deleteWholeCycle) {
          deleteWholeCycle.addEventListener("click", () => {
            confirmBlockDeletion("cycle");
            render();
          });
        }
        const deleteSelectedSlot = document.getElementById("deleteSelectedSlot");
        if (deleteSelectedSlot) {
          deleteSelectedSlot.addEventListener("click", () => {
            confirmBlockDeletion("slot");
            render();
          });
        }
        document.querySelectorAll("#cancelBlockDelete, #cancelBlockDeleteTop").forEach((button) => {
          button.addEventListener("click", () => {
            pendingBlockDelete = null;
            render();
          });
        });
        const clearConstruction = document.getElementById("clearConstruction");
        if (clearConstruction) {
          clearConstruction.addEventListener("click", () => {
            clearConstructionPanelOpen = !clearConstructionPanelOpen;
            render();
          });
        }
        ["cancelClearConstruction", "cancelClearConstructionTop"].forEach((id) => {
          const button = document.getElementById(id);
          if (button) button.addEventListener("click", () => {
            clearConstructionPanelOpen = false;
            render();
          });
        });
        const confirmClearConstruction = document.getElementById("confirmClearConstruction");
        if (confirmClearConstruction) {
          confirmClearConstruction.addEventListener("click", () => {
            const clearAllDetails = Boolean(document.querySelector("[data-clear-option='constructionDetailsAll']")?.checked);
            const selectedDetailCycleIds = [...document.querySelectorAll("[data-clear-cycle-detail]:checked")].map((input) => input.dataset.clearCycleDetail);
            const options = {
              constructionDetails: clearAllDetails || selectedDetailCycleIds.length > 0,
              constructionDetailCycleIds: clearAllDetails ? null : selectedDetailCycleIds,
              construction: Boolean(document.querySelector("[data-clear-option='construction']")?.checked)
            };
            if (!options.constructionDetails && !options.construction) return;
            const onlyDetails = options.constructionDetails && !options.construction;
            const detailScope = clearAllDetails
              ? "tous les cycles"
              : selectedDetailCycleIds.map((cycleId) => classicConstructionCycles().find((cycle) => cycle.id === cycleId)?.name || cycleId).join(", ");
            const firstConfirm = window.confirm(onlyDetails
              ? `Supprimer uniquement les installations/activités (${detailScope}) ?\n\nLes blocs profs/classes seront conservés.`
              : "Supprimer les éléments sélectionnés de la construction ?\n\nLes pré-requis, règles, AS et événements sportifs seront conservés.");
            if (!firstConfirm) return;
            const typedConfirm = window.prompt("Deuxieme validation : tapez VIDER pour confirmer.");
            if (typedConfirm !== "VIDER") return;
            clearPlanningParts(options);
            showValidationPopup(onlyDetails ? "Installations / activités vidées, squelette conservé" : "Construction vidée, pré-requis conservés");
            render();
          });
        }
        const openConstructionOptimizer = document.getElementById("openConstructionOptimizer");
        if (openConstructionOptimizer) {
          openConstructionOptimizer.addEventListener("click", () => {
            constructionOptimizeConfirmOpen = true;
            render();
          });
        }
        const closeConstructionOptimizer = () => {
          constructionOptimizeConfirmOpen = false;
          render();
        };
        ["cancelConstructionOptimizer", "cancelConstructionOptimizerFooter"].forEach((id) => {
          const button = document.getElementById(id);
          if (button) button.addEventListener("click", closeConstructionOptimizer);
        });
        const confirmConstructionOptimizer = document.getElementById("confirmConstructionOptimizer");
        if (confirmConstructionOptimizer) {
          confirmConstructionOptimizer.addEventListener("click", () => {
            constructionOptimizeConfirmOpen = false;
            constructionWorkspaceMode = "optimized";
            constructionBuildMode = "cycleDetails";
            const result = optimizeConstructionCycleDetails();
            saveConstructionWorkspaceMode();
            showValidationPopup(result.message);
            render();
          });
        }
        document.querySelectorAll("[data-construction-build-mode]").forEach((button) => {
          button.addEventListener("click", () => {
            constructionBuildMode = ["cycleDetails", "versions"].includes(button.dataset.constructionBuildMode) ? button.dataset.constructionBuildMode : "blocks";
            constructionHelpOpen = false;
            activeBuildCell = null;
            activeBuildCycleId = null;
            editingBuildBlock = null;
            movingBuildBlock = null;
            render();
          });
        });
        document.querySelectorAll("[data-toggle-construction-help]").forEach((button) => {
          button.addEventListener("click", () => {
            constructionHelpOpen = !constructionHelpOpen;
            render();
          });
        });
        document.querySelectorAll("[data-toggle-construction-service-summary]").forEach((button) => {
          button.addEventListener("click", () => {
            constructionServiceSummaryHidden = !constructionServiceSummaryHidden;
            localStorage.setItem("planningEpsConstructionServiceSummaryHidden2026", constructionServiceSummaryHidden ? "true" : "false");
            render();
          });
        });
        const saveConstructionVersionButton = document.getElementById("saveConstructionVersion");
        if (saveConstructionVersionButton) {
          saveConstructionVersionButton.addEventListener("click", () => {
            constructionVersionDraftName = `Version ${constructionVersions.length + 1}`;
            constructionVersionDraftParts = constructionVersionPartOptions().map((item) => item.id);
            constructionVersionPanelOpen = true;
            render();
          });
        }
        const constructionVersionName = document.getElementById("constructionVersionName");
        if (constructionVersionName) {
          constructionVersionName.addEventListener("input", () => {
            constructionVersionDraftName = constructionVersionName.value;
          });
        }
        document.querySelectorAll("[data-construction-version-part]").forEach((input) => {
          input.addEventListener("change", () => {
            const part = input.dataset.constructionVersionPart;
            constructionVersionDraftParts = input.checked
              ? [...constructionVersionDraftParts, part].filter((item, index, list) => list.indexOf(item) === index)
              : constructionVersionDraftParts.filter((item) => item !== part);
            render();
          });
        });
        document.querySelectorAll("#cancelConstructionVersionSave, #cancelConstructionVersionSaveTop").forEach((button) => {
          button.addEventListener("click", () => {
            constructionVersionPanelOpen = false;
            render();
          });
        });
        const confirmConstructionVersionSave = document.getElementById("confirmConstructionVersionSave");
        if (confirmConstructionVersionSave) {
          confirmConstructionVersionSave.addEventListener("click", () => {
            const options = constructionVersionPartOptions().map((item) => item.id);
            const selectedParts = constructionVersionDraftParts.filter((part, index) => options.includes(part) && constructionVersionDraftParts.indexOf(part) === index);
            if (!selectedParts.length) return;
            saveCurrentConstructionVersion(constructionVersionDraftName, selectedParts);
            constructionVersionPanelOpen = false;
            showValidationPopup("Version de construction sauvegardee");
            constructionBuildMode = "versions";
            render();
          });
        }
        document.querySelectorAll("[data-restore-construction-version]").forEach((button) => {
          button.addEventListener("click", () => {
            if (!window.confirm("Charger cette version dans la construction actuelle ?")) return;
            if (restoreConstructionVersion(button.dataset.restoreConstructionVersion)) {
              promoteRestoredConstructionVersionToCloud();
              showValidationPopup("Version récupérée et définie comme source Supabase");
            }
            constructionBuildMode = "blocks";
            render();
          });
        });
        document.querySelectorAll("[data-delete-construction-version]").forEach((button) => {
          button.addEventListener("click", () => {
            const version = constructionVersions.find((item) => item.id === button.dataset.deleteConstructionVersion);
            if (!version || !window.confirm(`Supprimer la version ${constructionVersionLabel(version)} ?`)) return;
            constructionVersions = constructionVersions.filter((item) => item.id !== version.id);
            saveConstructionVersions();
            showValidationPopup("Version supprimee");
            render();
          });
        });
        document.querySelectorAll("[data-teacher]").forEach((button) => {
          button.addEventListener("click", () => {
            const teacherId = button.dataset.teacher;
            if (teacherId === "all") {
              selectedTeacherIds = teachers.map((teacher) => teacher.id);
            } else {
              const allSelected = selectedTeacherIds.length === teachers.length;
              if (allSelected) selectedTeacherIds = [teacherId];
              else if (selectedTeacherIds.includes(teacherId)) {
                selectedTeacherIds = selectedTeacherIds.filter((id) => id !== teacherId);
              } else {
                selectedTeacherIds = [...selectedTeacherIds, teacherId];
              }
            }
            render();
          });
        });
      }

      document.querySelectorAll("[data-week]").forEach((button) => {
        button.addEventListener("click", () => {
          if (button.disabled) return;
          if (!isAdmin() && button.dataset.week === "build") {
            authStatus = "Connexion Supabase requise.";
            render();
            return;
          }
          week = button.dataset.week;
          if (week === "current") displayedCurrentWeekRank = null;
          if (week === "build") constructionMode = button.dataset.buildMode || "planning";
          updateNavigationActive();
          render();
        });
      });
      const sidebarToggle = document.getElementById("sidebarToggle");
      if (sidebarToggle) {
        sidebarToggle.addEventListener("click", () => {
          sidebarCollapsed = !sidebarCollapsed;
          localStorage.setItem("planningEpsSidebarCollapsed2026", sidebarCollapsed ? "true" : "false");
          render();
        });
      }
      async function bootstrapApp() {
        refreshConstructionPlanFromRulesLocalOnly();
        try {
          await handleOAuthRedirect();
        } catch (error) {
          authStatus = `Retour OAuth impossible : ${error.message || "erreur inconnue"}`;
        }
        render();
        if (isSignedIn()) {
          setTimeout(() => ensureCurrentUserEtab().then(() => {
            render();
            requestInitialCloudLoad(false, true);
          }), 0);
        }
        if (!cloudReady() || !cloudConfig.autoLoad || !isSignedIn()) {
          restartCloudAutoRefresh();
        }
      }

      bootstrapApp();
    </script>
  </body>
</html>
