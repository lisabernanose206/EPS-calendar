<!doctype html>
<html lang="fr">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EPS Loustic</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />

    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png" />
    <style>
      :root {
        background: #f8fafc;
        color: #0f172a;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      * { box-sizing: border-box; }
      body { margin: 0; }
      button { font: inherit; }
      .app { min-height: 100vh; padding: 6px 10px; }

      .top { align-items: center; display: grid; gap: 8px; grid-template-columns: auto minmax(0, 1fr) auto; }

      .authButton.secondary { background: #e2e8f0; color: #0f172a; }

      .dateInfo { align-items: center; background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; display: flex; gap: 10px; justify-content: space-between; margin-top: 6px; min-height: 42px; padding: 7px 10px; }
      .dateNav { align-items: center; display: flex; gap: 7px; min-width: 0; }

      .mainContent { min-width: 0; }

      .homeTimetableSlot { align-items: flex-start; display: flex; gap: 3px; min-height: 0; }

      .facilityCell.occupied strong { font-weight: 500; }
      .facilityCell span { color: inherit; font-size: 9px; font-weight: 850; line-height: 1.1; opacity: 0.88; }
      .facilityCell.occupied span { font-weight: 500; }
      .badge { border-radius: 6px; display: inline-flex; font-size: 10px; font-weight: 950; padding: 3px 6px; white-space: nowrap; }

      .weekBadge { background: rgba(255,255,255,0.6); color: #334155; }

        return Object.fromEntries(teachers.map((teacher) => [teacher.id, {
          total: 0,
          external: 0,
          internal: 0,
          sessions: 0,
          dayHours: Object.fromEntries(days.map((day) => [day, 0])),
          busy: {}
        }]));
      }

      function score(stats, teacher, weekName, day, slot, facility, round) {
        const current = stats[teacher.id];
        const targetHours = teacher.weekTargets[weekName];
        const remaining = targetHours - current.total;
        const maxExternal = Math.ceil(targetHours * 0.6);
        if (remaining < slot.hours || current.busy[`${day}-${slot.id}`]) return Infinity;
        if (facility.type === "external" && current.external + slot.hours > maxExternal) return Infinity;
        if (slot.hours === 1 && remaining !== 1 && current.total < 12) return Infinity;
        if (slot.hours === 2 && remaining === 1) return Infinity;
        const facilityLoad = facility.type === "external" ? current.external : current.internal;
        const dayPenalty = current.dayHours[day] >= 4 ? 30 : current.dayHours[day] * 6;
        return current.total * 12 + facilityLoad * 2 + dayPenalty + (slot.id === "15" ? 5 : 0) + ((round + teacher.id.charCodeAt(1)) % 7) / 10;
      }

      function mark(stats, teacherId, day, slot, facility) {
        const current = stats[teacherId];
        current.busy[`${day}-${slot.id}`] = true;
        current.total += slot.hours;
        current.sessions += 1;
        current.dayHours[day] += slot.hours;
        if (facility.type === "external") current.external += slot.hours;
        else current.internal += slot.hours;
      }

      function generateWeek(weekName) {
        const stats = emptyStats();
        const assignments = [];
        const classBusy = {};
        const orderedFacilities = facilities.filter((item) => item.type === "external").concat(facilities.filter((item) => item.type === "internal"));
        let round = seed + (weekName === "B" ? 31 : 0);
        orderedFacilities.forEach((facility) => {
          days.forEach((day) => {
            slots.forEach((slot) => {
              const candidates = teachers
                .map((teacher) => ({ teacher, score: score(stats, teacher, weekName, day, slot, facility, round) }))
                .filter((item) => Number.isFinite(item.score))
                .sort((a, b) => a.score - b.score);
              if (!candidates.length) return;
              const teacher = candidates[0].teacher;
              const schoolClass = pickClass(classBusy, day, slot, round);
              assignments.push({ id: `${weekName}-${day}-${slot.id}-${facility.id}`, week: weekName, day, slot, facility, teacher, schoolClass });
              mark(stats, teacher.id, day, slot, facility);
              classBusy[`${day}-${slot.id}-${schoolClass}`] = true;
              round += 1;
            });
          });
        });
        return { assignments, stats };
      }

      function pickClass(classBusy, day, slot, round) {
        const start = round % classes.length;
        for (let offset = 0; offset < classes.length; offset += 1) {
          const schoolClass = classes[(start + offset) % classes.length];
          if (!classBusy[`${day}-${slot.id}-${schoolClass}`]) return schoolClass;
        }
        return classes[start];
      }

      function generateCycle() {
        const A = generateWeek("A");
        const B = generateWeek("B");
        return { A, B, assignments: A.assignments.concat(B.assignments) };
      }

      function activeScheduleWeek() {
        if (week === "current") return displayedSchoolWeek().letter;
        return week;
      }

      function visible(cycle) {
        const selectedWeek = activeScheduleWeek();

      }

      function statFor(cycle, teacherId) {
        const selectedWeek = activeScheduleWeek();
        if (selectedWeek !== "year") return cycle[selectedWeek].stats[teacherId];
        const a = cycle.A.stats[teacherId];
        const b = cycle.B.stats[teacherId];
        return {
          total: `${a.total * 2 + b.total * 2}h / ${teachers.find((teacher) => teacher.id === teacherId).monthlyTarget}h`,
          external: `${a.external}h A / ${b.external}h B`,
          internal: `${a.internal}h A / ${b.internal}h B`,
          sessions: `${a.sessions} A / ${b.sessions} B`
        };

      function facilityBadge(type) {
        return `<span class="badge ${type === "external" ? "external" : "internal"}">${type === "external" ? "Ext." : "College"}</span>`;

      function getIsoWeekInfo(date) {
        const current = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
        const day = current.getUTCDay() || 7;
        current.setUTCDate(current.getUTCDate() + 4 - day);
        const yearStart = new Date(Date.UTC(current.getUTCFullYear(), 0, 1));
        const weekNumber = Math.ceil((((current - yearStart) / 86400000) + 1) / 7);
        return { weekNumber, year: current.getUTCFullYear() };
      }

      function currentSchoolWeek() {
        const today = new Date();
        const weeks = schoolYearWeeks();
        const inYear = weeks.find((item) => today >= item.start && today <= item.end);
        if (inYear) return inYear;
        return weeks[0];
      }

      function displayedSchoolWeek() {
        if (week !== "current" || !displayedCurrentWeekRank) return currentSchoolWeek();
        return schoolYearWeeks().find((item) => item.rank === displayedCurrentWeekRank) || currentSchoolWeek();
      }

      function navigateDisplayedWeek(delta) {
        const weeks = schoolYearWeeks();
        const currentRank = displayedSchoolWeek().rank;
        const nextRank = Math.min(weeks.length, Math.max(1, currentRank + delta));
        displayedCurrentWeekRank = nextRank;
      }

      function isHighlightedWeek(weekItem) {
        const today = new Date();
        return today >= weekItem.start && today <= weekItem.end;
      }

      function schoolYearWeeks() {
        const weeks = [];
        const firstMonday = mondayOnOrBefore(schoolYear.start);
        let cursor = new Date(firstMonday);
        let rank = 1;
        while (cursor <= calendarDisplayEnd) {
          const end = new Date(cursor);
          end.setDate(cursor.getDate() + 6);
          const info = getIsoWeekInfo(cursor);
          weeks.push({
            rank,
            isoWeek: info.weekNumber,
            isoYear: info.year,
            start: new Date(cursor),
            end,
            letter: rank % 2 === 1 ? "A" : "B"
          });
          cursor.setDate(cursor.getDate() + 7);
          rank += 1;
        }
        return weeks;
      }

      function mondayOnOrBefore(date) {
        const monday = new Date(date);
        const day = monday.getDay() || 7;
        monday.setDate(monday.getDate() - day + 1);
        return monday;
      }

      function displayDateForSchoolWeek(weekItem) {
        if (weekItem.start < schoolYear.start) return schoolYear.start;
        if (weekItem.start > schoolYear.end) return schoolYear.end;

      function attrValue(value) {

      function vacationForWeek(weekItem) {

      function vacationForCell(row, weekItem) {

      function holidayFor(row, weekItem) {

      function dayOffFor(day, weekItem) {
        const rowDate = rowDateForWeek({ day }, weekItem);
        const vacation = schoolVacations().find((item) => rowDate >= dateOnly(item.start) && rowDate <= dateOnly(item.end));
        const holiday = schoolYearHolidays().get(dateKey(rowDate));
        if (vacation) return { label: "V", title: vacation.name, className: "vacationCell" };
        if (holiday) return { label: "F", title: holiday, className: "holidayCell" };
        return null;

      function dateRangeBlockedReason(value) {
        const date = dateOnly(value);
        const day = date.getDay();
        if (day === 0 || day === 6) return "Week-end";
        const holiday = schoolYearHolidays().get(value);
        if (holiday) return holiday;
        const vacation = schoolVacations().find((item) => date >= dateOnly(item.start) && date <= dateOnly(item.end));
        return vacation?.name || "";
      }

      function dateRangeHasBlockedDay(start, end) {
        let cursor = dateOnly(start);
        const last = dateOnly(end);
        while (cursor <= last) {
          if (dateRangeBlockedReason(dateKey(cursor))) return true;
          cursor.setDate(cursor.getDate() + 1);
        }
        return false;
      }

      function asSlotsForDay(day) {

        return ["13", "15"].includes(String(row.slot?.id || ""));

      function timetableSlots() {
        const combined = [];
        days.forEach((day) => {
          daySlotsFor(day).forEach((slot) => {

            if (!combined.some((item) => item.key === key)) combined.push({ ...slot, key });

          slot,

          }));

      function defaultYearPlan() {

      function invalidateConstructionChecksCache() {
        constructionChecksRevision += 1;
        constructionChecksCache = { revision: constructionChecksRevision };
      }

      function cachedConstructionCheck(key, compute) {
        if (constructionChecksCache.revision !== constructionChecksRevision) {
          constructionChecksCache = { revision: constructionChecksRevision };
        }
        if (!(key in constructionChecksCache)) constructionChecksCache[key] = compute();
        return constructionChecksCache[key];
      }

      function loadTeachers() {

          const parsed = saved ? JSON.parse(saved) : null;
          if (!Array.isArray(parsed) || !parsed.length) return [...defaultTeachers];
          return parsed.map((teacher, index) => {
            const paletteItem = teacherPalette.find((item) => item.color === teacher.color) || teacherPalette[index % teacherPalette.length];
            return { ...teacher, color: paletteItem.color, border: paletteItem.border };
          });

      function loadSchoolConstraints() {
        try {
          const saved = localStorage.getItem("planningEpsSchoolConstraints2026");
          return normalizeSchoolConstraints(saved ? JSON.parse(saved) : {});
        } catch {
          return defaultSchoolConstraints;
        }
      }

      function normalizeSchoolConstraints(value = {}) {
        const normalizeTime = (value) => {
          const match = String(value || "").match(/^(\d{1,2}):(\d{2})$/);
          if (!match) return "";
          const hours = Number(match[1]);
          const minutes = Number(match[2]);
          if (hours < 0 || hours > 23 || minutes < 0 || minutes > 59) return "";
          return `${String(hours).padStart(2, "0")}:${String(minutes).padStart(2, "0")}`;
        };
        const parseTimeRange = (label) => {
          const match = String(label || "").match(/(\d{1,2})h?(?::?(\d{2}))?\s*-\s*(\d{1,2})h?(?::?(\d{2}))?/i);
          if (!match) return null;
          const start = normalizeTime(`${match[1]}:${match[2] || "00"}`);
          const end = normalizeTime(`${match[3]}:${match[4] || "00"}`);
          return start && end ? { start, end } : null;
        };
        const timeLabel = (value) => {
          const [hours, minutes] = value.split(":");
          return `${Number(hours)}h${minutes === "00" ? "" : minutes}`;
        };
        const hoursBetween = (start, end) => {
          const [startHours, startMinutes] = start.split(":").map(Number);
          const [endHours, endMinutes] = end.split(":").map(Number);
          const diff = ((endHours * 60 + endMinutes) - (startHours * 60 + startMinutes)) / 60;
          return diff > 0 ? Math.round(diff * 100) / 100 : 0;
        };
        const normalizeSlot = (slot, fallbackSlot, prefix = "") => {
          const parsed = parseTimeRange(slot.label) || parseTimeRange(fallbackSlot.label);
          const startTime = normalizeTime(slot.startTime) || parsed?.start || "08:00";
          const endTime = normalizeTime(slot.endTime) || parsed?.end || "09:00";
          const hours = hoursBetween(startTime, endTime);
          const label = `${prefix}${timeLabel(startTime)}-${timeLabel(endTime)}`;
          return { startTime, endTime, hours, label };
        };
        const savedSlots = Array.isArray(value.courseSlots) ? value.courseSlots : [];
        const baseSlots = savedSlots.length ? savedSlots : defaultCourseSlots;
        const courseSlots = baseSlots.map((slot, index) => {
          const fallbackSlot = defaultCourseSlots[index] || defaultCourseSlots[0];
          const normalizedSlot = normalizeSlot(slot, fallbackSlot);
          return {
            id: (slot.id || `slot-${Date.now()}-${index}`).trim(),
            ...normalizedSlot
          };
        });
        const legacyAsSlots = [
          { ...defaultAsSlots[0], label: value.asWeekdayLabel || defaultAsSlots[0].label },
          { ...defaultAsSlots[1], label: value.asWednesdayLabel || defaultAsSlots[1].label }
        ];
        const savedAsSlots = Array.isArray(value.asSlots) && value.asSlots.length ? value.asSlots : legacyAsSlots;
        const asSlots = savedAsSlots.map((slot, index) => {
          const daysList = Array.isArray(slot.days) && slot.days.length ? slot.days.filter((day) => days.includes(day)) : [...defaultAsSlots[index % defaultAsSlots.length].days];
          const fallbackSlot = defaultAsSlots[index % defaultAsSlots.length];
          const normalizedSlot = normalizeSlot(slot, fallbackSlot, "AS ");
          return {
            id: (slot.id || `as-${Date.now()}-${index}`).trim(),
            ...normalizedSlot,
            days: daysList.length ? daysList : ["Mercredi"],
          };
        });
        const schoolZone = ["A", "B", "C"].includes(value.schoolZone) ? value.schoolZone : defaultSchoolConstraints.schoolZone;
        return {
          establishmentName: (value.establishmentName || defaultSchoolConstraints.establishmentName).trim(),
          establishmentType: "college",
          schoolZone,
          courseSlots,
          asSlots,
          asWeekdayLabel: asSlots.find((slot) => slot.days.some((day) => day !== "Mercredi"))?.label || defaultSchoolConstraints.asWeekdayLabel,
          asWednesdayLabel: asSlots.find((slot) => slot.days.includes("Mercredi"))?.label || defaultSchoolConstraints.asWednesdayLabel
        };
      }

      function saveSchoolConstraints() {
        localStorage.setItem("planningEpsSchoolConstraints2026", JSON.stringify(schoolConstraints));
        scheduleCloudSave(["schoolConstraints"]);

      function syncSchoolSlots() {

      function saveSchoolSlotsAndRender(message = "") {

      function makeSlotId(prefix, existingIds) {
        let index = existingIds.length + 1;
        let id = `${prefix}-${index}`;
        while (existingIds.includes(id)) {
          index += 1;
          id = `${prefix}-${index}`;
        }
        return id;
      }

      function generatedClassLabels(mode, count) {
        return Array.from({ length: Math.max(0, Number(count) || 0) }, (_, index) => mode === "letter" ? String.fromCharCode(65 + index) : String(index + 1));
      }

      function specialClassSlug(label) {
        return String(label || "")
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "")
          .toLowerCase()
          .replace(/[^a-z0-9]+/g, "-")
          .replace(/^-+|-+$/g, "")
          .slice(0, 36) || "classe-specifique";
      }

      function normalizeClassConfig(config) {
        const normalized = Object.fromEntries(classLevels.map((level) => {
          const item = config?.[level] || defaultClassConfig[level];
          const mode = item.mode === "letter" ? "letter" : "number";
          const labels = Array.isArray(item.labels)
            ? item.labels.map((label) => String(label).trim()).filter(Boolean)
            : generatedClassLabels(mode, 7);
          return [level, { mode, labels }];
        }));
        const seen = new Set();
        normalized.specialClasses = (Array.isArray(config?.specialClasses) ? config.specialClasses : [])
          .map((item) => {
            const label = String(item?.label || "").trim();
            if (!label) return null;
            let id = String(item?.id || specialClassSlug(label)).trim() || specialClassSlug(label);
            let suffix = 2;
            while (seen.has(id)) {
              id = `${specialClassSlug(label)}-${suffix}`;
              suffix += 1;
            }
            seen.add(id);
            const standardClassSet = new Set(classesFromStandardConfig(normalized));
            const baseClassIds = [...new Set([
              ...(Array.isArray(item?.baseClassIds) ? item.baseClassIds : []),
              item?.baseClassId || ""
            ].filter((schoolClass) => standardClassSet.has(schoolClass)))];
            const hoursByClass = Object.fromEntries(Object.entries(item?.hoursByClass || {})
              .filter(([schoolClass]) => standardClassSet.has(schoolClass))
              .map(([schoolClass, hours]) => [schoolClass, Math.max(0, Number(hours) || 0)]));
            return { id, label, baseClassIds, hours: Math.max(0, Number(item?.hours) || 0), hoursByClass };
          })
          .filter(Boolean);
        return normalized;
      }

      function loadClassConfig() {
        try {
          const saved = localStorage.getItem("planningEpsClassConfig2026");
          return normalizeClassConfig(saved ? JSON.parse(saved) : defaultClassConfig);
        } catch {
          return normalizeClassConfig(defaultClassConfig);
        }
      }

      function classesForLevel(level) {
        return (classConfig[level]?.labels || []).map((label) => schoolClassLabel(level, label));
      }

      function classNumbersForLevel(level) {
        return classConfig[level]?.labels || [];
      }

      function classesFromStandardConfig(config = classConfig) {
        return classLevels.flatMap((level) => (config[level]?.labels || []).map((label) => schoolClassLabel(level, label)));
      }

      function specialClasses() {
        return Array.isArray(classConfig.specialClasses) ? classConfig.specialClasses : [];
      }

      function specialClassSchoolId(id, baseClassId = "") {
        return `special::${id}${baseClassId ? `::${baseClassId}` : ""}`;
      }

      function specialClassFromSchoolId(schoolClass) {
        const id = specialClassTypeIdFromSchoolId(schoolClass);
        return specialClasses().find((item) => item.id === id) || null;
      }

      function specialClassTypeIdFromSchoolId(schoolClass) {
        return String(schoolClass || "").startsWith("special::") ? String(schoolClass).slice("special::".length).split("::")[0] : "";
      }

      function specialClassBaseIdFromSchoolId(schoolClass) {
        if (!String(schoolClass || "").startsWith("special::")) return "";
        return String(schoolClass).slice("special::".length).split("::").slice(1).join("::");
      }

      function specialClassBaseLabel(item) {
        const baseClassIds = specialClassBaseIds(item);
        return baseClassIds.length ? baseClassIds.map(compactClassName).join(", ") : "Non rattachee";
      }

      function specialClassBaseIds(item) {
        const standardClassSet = new Set(classesFromStandardConfig());
        return [...new Set([
          ...(Array.isArray(item?.baseClassIds) ? item.baseClassIds : []),
          item?.baseClassId || ""
        ].filter((schoolClass) => standardClassSet.has(schoolClass)))];
      }

      function specialClassInstances() {
        const levelRank = Object.fromEntries(classLevels.map((level, index) => [level, index]));

          || (event.classes || []).some((schoolClass) => classesForBlock(block).some((blockClassItem) => classesOverlap(schoolClass, blockClassItem)));

      function eventsForCell(row, weekItem) {
        return eventsForPeriod(row, weekItem).filter((event) => row.slot.id === eventStartSlotId(event));
      }

      function eventForContinuation(row, weekItem) {
        return eventsForPeriod(row, weekItem).find((event) => row.slot.id !== eventStartSlotId(event));
      }

      function eventRowSpan(event, rows) {
        return rows.filter((row) => rowMatchesEventHalfDay(row, event)).length;
      }

      function canMergeEventCell(event, rows, weekItem) {
        return rows.filter((row) => rowMatchesEventHalfDay(row, event)).every((row) => {
          const key = yearCellKey(row.id, weekItem.rank);
          return !(constructionPlan[key] || []).length && !asSessionsForCell(row, weekItem).length;
        });
      }

      function asSessionsForCell(row, weekItem) {
        if (!row.isAs) return [];
        const rowDate = rowDateForWeek(row, weekItem);
        const key = yearCellKey(row.id, weekItem.rank);
        const blockedTeacherIds = unavailableTeachersForCell(row, weekItem, true);
        return asSessions.filter((session) => {
          const start = dateOnly(session.start);
          const end = dateOnly(session.end);
          const slotIds = Array.isArray(session.slotIds) ? session.slotIds : [];
          const teacherBlocked = (session.teacherIds || []).some((teacherId) => blockedTeacherIds.has(teacherId));
          return rowDate >= start && rowDate <= end && session.weekdays.includes(row.day) && (!slotIds.length || slotIds.includes(row.slot.id)) && !teacherBlocked && !itemExcludedForCell(asExclusions, session.id, key);
        });
      }

      function asSessionsForDay(rows, day, weekItem) {
        const seen = new Set();
        return rows
          .filter((row) => row.day === day && row.isAs)
          .flatMap((row) => asSessionsForCell(row, weekItem))
          .filter((session) => {
            if (seen.has(session.id)) return false;
            seen.add(session.id);
            return true;
          });
      }

      function teacherNamesFromIds(ids) {
        return ids.map((id) => teachers.find((teacher) => teacher.id === id)?.name || id);
      }

      function asSessionStyle(session) {
        const sessionTeachers = (session.teacherIds || [])
          .map((teacherId) => teachers.find((item) => item.id === teacherId))
          .filter(Boolean);
        const shownTeachers = sessionTeachers.length ? sessionTeachers : [teachers[0]].filter(Boolean);
        const border = shownTeachers[0]?.border || "#9ca3af";
        const background = shownTeachers.length > 1
          ? `linear-gradient(90deg, ${shownTeachers.map((teacher, index) => {
              const start = Math.round((index / shownTeachers.length) * 100);
              const end = Math.round(((index + 1) / shownTeachers.length) * 100);
              return `${teacher.color} ${start}% ${end}%`;
            }).join(", ")})`
          : (shownTeachers[0]?.color || "#e5e7eb");
        return `background:${background} !important;border-color:${border} !important`;
      }

      function asSessionTeacherLabel(session) {
        return teacherNamesFromIds(session.teacherIds || []).join(" + ") || "Prof";
      }

      function asBlockLabel(session) {
        return session.name && session.name !== "AS" ? `AS ${session.name}` : "AS";
      }

      function unavailableForCell(row, weekItem, includeAs = false) {
        if (row.isAs && !includeAs) return [];
        return facilityUnavailability.filter((item) => unavailableMatchesCell(item, row, weekItem));
      }

      function unavailableMatchesCell(item, row, weekItem) {
        if (!item || !row || !weekItem) return false;
        const rowDate = rowDateForWeek(row, weekItem);
        const matchesPeriod = item.periodMode === "cycles" && (item.cycleIds || []).length
          ? (item.cycleIds || []).some((cycleId) => {
            const cycle = cycles.find((entry) => entry.id === cycleId);
            return cycle && weeksForCycle(cycle).some((cycleWeek) => cycleWeek.rank === weekItem.rank);
          })
          : rowDate >= dateOnly(item.start) && rowDate <= dateOnly(item.end);
        const cells = item.cells || [];
        const matchesCell = cells.length
          ? cells.some((cell) => cell.day === row.day && cell.slotId === row.slot.id)
          : (item.weekdays || []).includes(row.day) && (item.slotIds || []).includes(row.slot.id);
        return matchesPeriod && matchesCell;
      }

      function unavailableCoversFacility(item, facilityId) {
        return (item.facilityIds || []).includes(facilityId);
      }

      function unavailableFacilitiesForCell(row, weekItem) {
        return new Set(unavailableForCell(row, weekItem).flatMap((item) => item.facilityIds || []));
      }

      function unavailableClassesForCell(row, weekItem) {
        return new Set(unavailableForCell(row, weekItem).flatMap((item) => item.classIds || []));
      }

      function unavailableTeachersForCell(row, weekItem, includeAs = false) {
        return new Set(unavailableForCell(row, weekItem, includeAs).flatMap((item) => item.teacherIds || []));
      }

      function unavailableTeachersForCycleSpan(row, cycle, weekLetter = "all") {
        if (!row || !cycle) return new Set();
        return new Set(weeksForCycle(cycle)
          .filter((weekItem) => weekLetter === "all" || weekItem.letter === weekLetter)
          .flatMap((weekItem) => [...unavailableTeachersForCell(row, weekItem)]));
      }

      function blockUnavailableMessage(row, weekItem, block) {
        if (!row || !weekItem || !block) return "";
        const unavailableItems = unavailableForCell(row, weekItem);
        const facilityBlocked = unavailableItems.find((item) => unavailableCoversFacility(item, block.facilityId));
        if (facilityBlocked) return `${block.facilityLabel || "Cette installation"} est indisponible sur ce creneau.`;
        const blockedClass = classesForBlock(block).find((schoolClass) => classCollectionHasOverlap(unavailableItems.flatMap((item) => item.classIds || []), schoolClass));
        if (blockedClass) return `${blockedClass || "Cette classe"} est indisponible sur ce creneau.`;
        const teacherBlocked = unavailableItems.find((item) => teacherIdsForBlock(block).some((teacherId) => (item.teacherIds || []).includes(teacherId)));
        if (teacherBlocked) return `${teacherLabelForBlock(block) || "Ce professeur"} est indisponible sur ce creneau.`;
        return "";
      }

      function ruleBlockedByUnavailable(rule, weekItem) {
        const row = yearRows().find((item) => item.id === rule.rowId);
        if (!row || !rule.block) return false;
        return unavailableForCell(row, weekItem).some((item) => {
          const facilityBlocked = unavailableCoversFacility(item, rule.block.facilityId);
          const classBlocked = classesForBlock(rule.block).some((schoolClass) => classCollectionHasOverlap(item.classIds || [], schoolClass));
          const teacherBlocked = teacherIdsForBlock(rule.block).some((teacherId) => (item.teacherIds || []).includes(teacherId));
          return facilityBlocked || classBlocked || teacherBlocked;
        });
      }

      function purgeConstructionForUnavailableItems(items) {
        const unavailableItems = Array.isArray(items) ? items : [items].filter(Boolean);
        if (!unavailableItems.length) return false;
        const rows = yearRows();
        let changed = false;
        constructionRules.forEach((rule) => {
          const row = rows.find((item) => item.id === rule.rowId);
          const cycle = findCycleForRule(rule);
          if (!row || !cycle || !rule.block) return;
          weeksForCycle(cycle).forEach((weekItem) => {
            if (rule.weekLetter && rule.weekLetter !== "all" && weekItem.letter !== rule.weekLetter) return;
            const key = yearCellKey(rule.rowId, weekItem.rank);
            if (isBlockExcluded(rule.id, key)) return;
            const shouldRemove = unavailableItems.some((item) => {
              if (!unavailableMatchesCell(item, row, weekItem)) return false;
              const facilityBlocked = unavailableCoversFacility(item, rule.block.facilityId);
              const classBlocked = classesForBlock(rule.block).some((schoolClass) => classCollectionHasOverlap(item.classIds || [], schoolClass));
              const teacherBlocked = teacherIdsForBlock(rule.block).some((teacherId) => (item.teacherIds || []).includes(teacherId));
              return facilityBlocked || classBlocked || teacherBlocked;
            });
            if (!shouldRemove) return;
            const existing = blockExclusions[rule.id] || [];
            blockExclusions[rule.id] = [...existing, key];
            changed = true;
          });
        });
        return changed;
      }

      function loadAdminSession() {

      async function signInAdmin() {
        authStatus = "Connexion en cours...";
        render();
        if (authPassword === ADMIN_PASSWORD) {
          saveAdminSession({
            access_token: cloudConfig.anonKey,
            expires_at: Math.floor(Date.now() / 1000) + 365 * 24 * 60 * 60,
            user: { email: authEmail.trim() || ADMIN_EMAIL },
            local_admin: true
          });
          authPassword = "";
          authStatus = cloudReady()
            ? cloudWriteAllowed()
              ? "Mode admin actif. Sauvegarde Supabase active."
              : "Mode admin actif. Ecriture Supabase bloquee en local."
            : "Mode admin actif. Cloud non configuré.";
          render();
          return;
        }
        try {
          const response = await fetch(authEndpoint("token?grant_type=password"), {
            method: "POST",
            headers: cloudHeaders(),
            body: JSON.stringify({ email: authEmail.trim(), password: authPassword })
          });
          const result = await response.json();
          if (!response.ok) throw new Error(result.error_description || result.msg || result.message || "connexion impossible");
          saveAdminSession(result);
          authPassword = "";
          authStatus = "Mode admin actif. Sauvegarde Supabase active.";
        } catch (error) {
          saveAdminSession(null);
          authStatus = `Connexion refusée : ${error.message || "identifiants incorrects"}`;
        } finally {
          render();
        }
      }

        localStorage.setItem("planningEpsCycles2026", JSON.stringify(cycles));
