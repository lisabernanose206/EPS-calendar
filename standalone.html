<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Planning EPS</title>
    <style>
      :root {
        background: #f8fafc;
        color: #0f172a;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      * { box-sizing: border-box; }
      body { margin: 0; }
      button { font: inherit; }
      .app { min-height: 100vh; padding: 20px; }

      .sideNav { position: sticky; top: 12px; }

      .teacherTabs { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 6px; }

      .yearTable .rowHead { background: #ffffff; color: #0f172a; font-weight: 900; left: 0; min-width: 88px; position: sticky; text-align: left; z-index: 2; }

      function score(stats, teacher, weekName, day, slot, facility, round) {
        const current = stats[teacher.id];
        const targetHours = teacher.weekTargets[weekName];
        const remaining = targetHours - current.total;
        const maxExternal = Math.ceil(targetHours * 0.6);
        if (remaining < slot.hours || current.busy[`${day}-${slot.id}`]) return Infinity;
        if (facility.type === "external" && current.external + slot.hours > maxExternal) return Infinity;
        if (slot.hours === 1 && remaining !== 1 && current.total < 12) return Infinity;
        if (slot.hours === 2 && remaining === 1) return Infinity;
        const facilityLoad = facility.type === "external" ? current.external : current.internal;
        const dayPenalty = current.dayHours[day] >= 4 ? 30 : current.dayHours[day] * 6;
        return current.total * 12 + facilityLoad * 2 + dayPenalty + (slot.id === "15" ? 5 : 0) + ((round + teacher.id.charCodeAt(1)) % 7) / 10;
      }

      function mark(stats, teacherId, day, slot, facility) {
        const current = stats[teacherId];
        current.busy[`${day}-${slot.id}`] = true;
        current.total += slot.hours;
        current.sessions += 1;
        current.dayHours[day] += slot.hours;
        if (facility.type === "external") current.external += slot.hours;
        else current.internal += slot.hours;
      }

      function generateWeek(weekName) {
        const stats = emptyStats();
        const assignments = [];
        const classBusy = {};
        const orderedFacilities = facilities.filter((item) => item.type === "external").concat(facilities.filter((item) => item.type === "internal"));
        let round = seed + (weekName === "B" ? 31 : 0);
        orderedFacilities.forEach((facility) => {
          days.forEach((day) => {
            slots.forEach((slot) => {
              const candidates = teachers
                .map((teacher) => ({ teacher, score: score(stats, teacher, weekName, day, slot, facility, round) }))
                .filter((item) => Number.isFinite(item.score))
                .sort((a, b) => a.score - b.score);
              if (!candidates.length) return;
              const teacher = candidates[0].teacher;
              const schoolClass = pickClass(classBusy, day, slot, round);
              assignments.push({ id: `${weekName}-${day}-${slot.id}-${facility.id}`, week: weekName, day, slot, facility, teacher, schoolClass });
              mark(stats, teacher.id, day, slot, facility);
              classBusy[`${day}-${slot.id}-${schoolClass}`] = true;
              round += 1;
            });
          });
        });
        return { assignments, stats };
      }

      function pickClass(classBusy, day, slot, round) {
        const start = round % classes.length;
        for (let offset = 0; offset < classes.length; offset += 1) {
          const schoolClass = classes[(start + offset) % classes.length];
          if (!classBusy[`${day}-${slot.id}-${schoolClass}`]) return schoolClass;
        }
        return classes[start];
      }

      function getIsoWeekInfo(date) {
        const current = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
        const day = current.getUTCDay() || 7;
        current.setUTCDate(current.getUTCDate() + 4 - day);
        const yearStart = new Date(Date.UTC(current.getUTCFullYear(), 0, 1));
        const weekNumber = Math.ceil((((current - yearStart) / 86400000) + 1) / 7);
        return { weekNumber, year: current.getUTCFullYear() };
      }

      function schoolYearWeeks() {
        const weeks = [];
        const firstMonday = mondayOnOrBefore(schoolYear.start);
        let cursor = new Date(firstMonday);
        let rank = 1;
        while (cursor <= schoolYear.end) {
          const end = new Date(cursor);
          end.setDate(cursor.getDate() + 6);
          const info = getIsoWeekInfo(cursor);
          weeks.push({
            rank,
            isoWeek: info.weekNumber,
            isoYear: info.year,
            start: new Date(cursor),
            end,
            letter: rank % 2 === 1 ? "A" : "B"
          });
          cursor.setDate(cursor.getDate() + 7);
          rank += 1;
        }
        return weeks;
      }

      function mondayOnOrBefore(date) {

      function shadeColor(hex, amount) {
        const raw = hex.replace("#", "");
        const num = parseInt(raw.length === 3 ? raw.split("").map((char) => char + char).join("") : raw, 16);
        const clamp = (value) => Math.max(0, Math.min(255, value));
        const r = clamp((num >> 16) + amount);
        const g = clamp(((num >> 8) & 255) + amount);
        const b = clamp((num & 255) + amount);
        return `#${[r, g, b].map((value) => value.toString(16).padStart(2, "0")).join("")}`;
      }

      function halfDayForSlot(slotId) {
        if (slotId === "8" || slotId === "10") return "morning";
        if (slotId === "13" || slotId === "15") return "afternoon";
        return "midday";
      }

      function halfDayLabel(value) {
        if (value === "morning") return "Matin";
        if (value === "afternoon") return "Après-midi";
        return "Journée";
      }

      function rowMatchesEventHalfDay(row, event) {
        const halfDay = event.halfDay || "all";
        return halfDay === "all" || halfDayForSlot(row.slot.id) === halfDay;
      }

      function eventStartSlotId(event) {
        return (event.halfDay || "all") === "afternoon" ? "13" : "8";
      }

      function eventPeriodLabel(event) {
        return (event.halfDay || "all") === "all" ? "Journée complète" : halfDayLabel(event.halfDay);
      }

      function eventTeacherDots(event) {
        return `<div class="eventTeacherDots">${(event.teacherIds || []).map((teacherId) => {
          const teacher = teachers.find((item) => item.id === teacherId);
          return teacher ? `<span class="eventTeacherDot" title="${teacher.name}" style="background:${teacher.color};border-color:${teacher.border}"></span>` : "";
        }).join("")}</div>`;
      }

      function eventSpanClass(event) {
        return (event.halfDay || "all") === "all" ? "eventSpanFull" : "eventSpanHalf";
      }

      function eventsForPeriod(row, weekItem) {
        const rowDate = rowDateForWeek(row, weekItem);
        return sportEvents.filter((event) => {
          const start = dateOnly(event.start);
          const end = dateOnly(event.end);
          return rowDate >= start && rowDate <= end && rowMatchesEventHalfDay(row, event);
        });
      }

      function rowDateInEvent(row, weekItem, event) {
        const rowDate = rowDateForWeek(row, weekItem);
        return rowDate >= dateOnly(event.start) && rowDate <= dateOnly(event.end);
      }

      function eventTouchesBlock(event, block) {
        return teacherIdsForBlock(block).some((teacherId) => event.teacherIds.includes(teacherId)) || event.classes.includes(block.schoolClass);
      }

      function eventsForCell(row, weekItem) {
        return eventsForPeriod(row, weekItem).filter((event) => row.slot.id === eventStartSlotId(event));
      }

      function eventForContinuation(row, weekItem) {
        return eventsForPeriod(row, weekItem).find((event) => row.slot.id !== eventStartSlotId(event));
      }

      function eventRowSpan(event, rows) {
        return rows.filter((row) => rowMatchesEventHalfDay(row, event)).length;
      }

      function canMergeEventCell(event, rows, weekItem) {
        return rows.filter((row) => rowMatchesEventHalfDay(row, event)).every((row) => {
          const key = yearCellKey(row.id, weekItem.rank);
          return !(constructionPlan[key] || []).length && !asSessionsForCell(row, weekItem).length;
        });
      }

      function asSessionsForCell(row, weekItem) {
        if (!row.isAs) return [];
        const rowDate = rowDateForWeek(row, weekItem);
        return asSessions.filter((session) => {
          const start = dateOnly(session.start);
          const end = dateOnly(session.end);
          return rowDate >= start && rowDate <= end && session.weekdays.includes(row.day);
        });
      }

      function teacherNamesFromIds(ids) {
        return ids.map((id) => teachers.find((teacher) => teacher.id === id)?.name || id);
      }

      function asSessionStyle(session) {
        const teacher = teachers.find((item) => item.id === session.teacherIds?.[0]) || teachers[0];
        return `background:${teacher.color} !important;border-color:${teacher.border} !important`;
      }

      function asSessionTeacherLabel(session) {
        return teacherNamesFromIds(session.teacherIds || []).join(" + ") || "Prof";
      }

      function unavailableForCell(row, weekItem) {
        if (row.isAs) return [];
        return facilityUnavailability.filter((item) => unavailableMatchesCell(item, row, weekItem));
      }

      function unavailableMatchesCell(item, row, weekItem) {
        if (!item || !row || !weekItem || row.isAs) return false;
        const rowDate = rowDateForWeek(row, weekItem);
        const matchesPeriod = item.periodMode === "cycles" && (item.cycleIds || []).length
          ? (item.cycleIds || []).some((cycleId) => {
            const cycle = cycles.find((entry) => entry.id === cycleId);
            return cycle && weeksForCycle(cycle).some((cycleWeek) => cycleWeek.rank === weekItem.rank);
          })
          : rowDate >= dateOnly(item.start) && rowDate <= dateOnly(item.end);
        const cells = item.cells || [];
        const matchesCell = cells.length
          ? cells.some((cell) => cell.day === row.day && cell.slotId === row.slot.id)
          : (item.weekdays || []).includes(row.day) && (item.slotIds || []).includes(row.slot.id);
        return matchesPeriod && matchesCell;
      }

      function unavailableCoversFacility(item, facilityId) {
        return (item.facilityIds || []).includes(facilityId);
      }

      function unavailableFacilitiesForCell(row, weekItem) {
        return new Set(unavailableForCell(row, weekItem).flatMap((item) => item.facilityIds || []));
      }

      function unavailableClassesForCell(row, weekItem) {
        return new Set(unavailableForCell(row, weekItem).flatMap((item) => item.classIds || []));
      }

      function blockUnavailableMessage(row, weekItem, block) {
        if (!row || !weekItem || !block) return "";
        const unavailableItems = unavailableForCell(row, weekItem);
        const facilityBlocked = unavailableItems.find((item) => unavailableCoversFacility(item, block.facilityId));
        if (facilityBlocked) return `${block.facilityLabel || "Cette installation"} est indisponible sur ce creneau.`;
        const classBlocked = unavailableItems.find((item) => (item.classIds || []).includes(block.schoolClass));
        if (classBlocked) return `${block.schoolClass || "Cette classe"} est indisponible sur ce creneau.`;
        return "";
      }

      function ruleBlockedByUnavailable(rule, weekItem) {
        const row = yearRows().find((item) => item.id === rule.rowId);
        if (!row || !rule.block) return false;
        return unavailableForCell(row, weekItem).some((item) => {
          const facilityBlocked = unavailableCoversFacility(item, rule.block.facilityId);
          const classBlocked = (item.classIds || []).includes(rule.block.schoolClass);
          return facilityBlocked || classBlocked;
        });
      }

      function purgeConstructionForUnavailableItems(items) {
        const unavailableItems = Array.isArray(items) ? items : [items].filter(Boolean);
        if (!unavailableItems.length) return false;
        const rows = yearRows();
        let changed = false;
        constructionRules.forEach((rule) => {
          const row = rows.find((item) => item.id === rule.rowId);
          const cycle = findCycleForRule(rule);
          if (!row || !cycle || !rule.block) return;
          weeksForCycle(cycle).forEach((weekItem) => {
            if (rule.weekLetter && rule.weekLetter !== "all" && weekItem.letter !== rule.weekLetter) return;
            const key = yearCellKey(rule.rowId, weekItem.rank);
            if (isBlockExcluded(rule.id, key)) return;
            const shouldRemove = unavailableItems.some((item) => {
              if (!unavailableMatchesCell(item, row, weekItem)) return false;
              const facilityBlocked = unavailableCoversFacility(item, rule.block.facilityId);
              const classBlocked = (item.classIds || []).includes(rule.block.schoolClass);
              return facilityBlocked || classBlocked;
            });
            if (!shouldRemove) return;
            const existing = blockExclusions[rule.id] || [];
            blockExclusions[rule.id] = [...existing, key];
            changed = true;
          });
        });
        return changed;
      }

      function scheduleCloudSave() {
        if (!isAdmin() || !cloudReady() || !cloudConfig.autoSave || cloudSyncing) return;
        clearTimeout(cloudSaveTimer);
        cloudStatus = "Sauvegarde cloud en attente...";
        cloudSaveTimer = setTimeout(() => cloudSaveToRemote(false), 900);

      async function cloudSaveToRemote(shouldRender = true) {
        if (!isAdmin()) {
          cloudStatus = "Lecture seule : connexion admin requise pour sauvegarder.";
          if (shouldRender) render();
          return;
        }
        if (!cloudReady()) {
          cloudStatus = "Cloud non configuré.";
          if (shouldRender) render();
          return;
        }
        cloudSyncing = true;
        cloudStatus = "Sauvegarde cloud en cours...";
        if (shouldRender) render();
        try {
          const response = await fetch(`${cloudEndpoint()}?on_conflict=id`, {
            method: "POST",
            headers: cloudHeaders({ Prefer: "resolution=merge-duplicates,return=minimal" }),
            body: JSON.stringify({ id: cloudConfig.planningId, data: collectPlanningData(), updated_at: new Date().toISOString() })
          });
          if (!response.ok) throw new Error(await response.text());
          cloudStatus = `Sauvegardé dans le cloud à ${new Date().toLocaleTimeString("fr-FR", { hour: "2-digit", minute: "2-digit" })}.`;
        } catch (error) {
          cloudStatus = `Erreur cloud : ${error.message || "sauvegarde impossible"}`;
        } finally {
          cloudSyncing = false;
          if (shouldRender) render();
        }
      }

      async function cloudLoadFromRemote(shouldRender = true) {
        if (!cloudReady()) {
          cloudStatus = "Cloud non configuré.";
          if (shouldRender) render();
          return;
        }
        cloudSyncing = true;
        cloudStatus = "Chargement depuis le cloud...";
        if (shouldRender) render();
        try {
          const response = await fetch(`${cloudEndpoint()}?select=data,updated_at&id=eq.${encodeURIComponent(cloudConfig.planningId)}`, {
            headers: cloudHeaders()
          });
          if (!response.ok) throw new Error(await response.text());
          const rows = await response.json();
          if (!rows.length) {
            cloudStatus = "Aucune sauvegarde cloud trouvée pour cet identifiant.";
          } else {
            applyPlanningData(rows[0].data);
            cloudStatus = `Données cloud chargées (${new Date(rows[0].updated_at).toLocaleString("fr-FR")}).`;
          }
        } catch (error) {
          cloudStatus = `Erreur cloud : ${error.message || "chargement impossible"}`;
        } finally {
          cloudSyncing = false;
          if (shouldRender) render();
        }
      }

      function setCycleCount(count) {
        const targetCycles = activeCycles();
        const safeCount = Math.max(1, Math.min(12, Number(count) || 1));
        const defaults = defaultCycles(safeCount);
        const nextCycles = Array.from({ length: safeCount }, (_, index) => targetCycles[index] || cycleForScope(defaults[index], activeCycleScope));
        setActiveCycles(nextCycles);
        if (!activeCycles().some((cycle) => cycle.id === activeCycleId)) activeCycleId = activeCycles()[0]?.id || "";
        saveCycles();
        rebuildConstructionPlan();
      }

      function activeCycle() {
        return activeCycles().find((cycle) => cycle.id === activeCycleId) || activeCycles()[0];
      }

      function cycleForScope(cycle, scope) {
        if (scope === "default") return cycle;
        return {
          ...cycle,
          id: cycle.id.startsWith(`${scope}-`) ? cycle.id : `${scope}-${cycle.id}`,
          name: cycle.name
        };
      }

      function ensureCyclesForLevel(level) {
        if (!classLevels.includes(level)) return cycles;
        if (!Array.isArray(cyclesByLevel[level]) || !cyclesByLevel[level].length) {
          cyclesByLevel[level] = cycles.map((cycle) => cycleForScope(cycle, level));
        }
        return cyclesByLevel[level];
      }

      function cyclesForScope(scope) {
        return scope === "default" ? cycles : ensureCyclesForLevel(scope);
      }

      function activeCycles() {
        return cyclesForScope(activeCycleScope);
      }

      function setActiveCycles(nextCycles) {
        if (activeCycleScope === "default") cycles = nextCycles;
        else cyclesByLevel[activeCycleScope] = nextCycles;
      }

      function cyclesForClassLevel(level) {
        return classLevels.includes(level) && Array.isArray(cyclesByLevel[level]) && cyclesByLevel[level].length
          ? cyclesByLevel[level]
          : cycles;
      }

      function allCycleSets() {
        return [
          { scope: "default", cycles },
          ...classLevels.map((level) => ({ scope: level, cycles: cyclesForClassLevel(level) }))
        ];
      }

      function dateOnly(value) {
        return new Date(`${value}T00:00:00`);
      }

      function formatDate(value) {
        return dateOnly(value).toLocaleDateString("fr-FR", { day: "2-digit", month: "2-digit", year: "numeric" });
      }

      function shortDate(value) {
        return value.toLocaleDateString("fr-FR", { day: "numeric", month: "short" });
      }

      function weekDisplayStart(weekItem) {
        return weekItem.start;
      }

      function weekDisplayEnd(weekItem) {
        const friday = new Date(weekItem.start);
        friday.setDate(weekItem.start.getDate() + 4);
        return friday > schoolYear.end ? schoolYear.end : friday;
      }

      function weekDateLabel(weekItem) {
        return `du ${shortDate(weekDisplayStart(weekItem))} au ${shortDate(weekDisplayEnd(weekItem))}`;
      }

      function weeksForCycle(cycle) {
        const start = dateOnly(cycle.start);
        const end = dateOnly(cycle.end);
        return schoolYearWeeks().filter((weekItem) => weekItem.end >= start && weekItem.start <= end);
      }

      function cycleForWeek(weekItem, classLevel = "") {
        return cyclesForClassLevel(classLevel).find((cycle) => weeksForCycle(cycle).some((cycleWeek) => cycleWeek.rank === weekItem.rank));
      }

      function findCycleForRule(rule) {
        const level = rule.classLevel || classParts(rule.block?.schoolClass || "").level || "";
        return cyclesForClassLevel(level).find((item) => item.id === rule.cycleId)
          || cycles.find((item) => item.id === rule.cycleId)
          || allCycleSets().flatMap((set) => set.cycles).find((item) => item.id === rule.cycleId);
      }

      function plannedHoursForWeeks(weeks) {
        const rows = yearRows();
        const stats = Object.fromEntries(teachers.map((teacher) => [teacher.id, {
          total: 0,
          details: []
        }]));
        weeks.forEach((weekItem) => {
          rows.forEach((row) => {
            if (row.isAs) return;
            if (vacationForCell(row, weekItem) || holidayFor(row, weekItem)) return;
            const key = yearCellKey(row.id, weekItem.rank);
            (constructionPlan[key] || []).forEach((item) => {
              teacherIdsForBlock(item).forEach((teacherId) => {
                if (!stats[teacherId]) return;
                stats[teacherId].total += row.slot.hours;
                stats[teacherId].details.push({
                  week: weekItem,
                  day: row.day,
                  slot: row.slot,
                  schoolClass: item.schoolClass || "Classe",
                  facility: item.facilityLabel || "Installation"
                });
              });
            });
          });
        });
        return stats;
      }

      function asHoursForWeeks(weeks) {
        const rows = yearRows().filter((row) => row.isAs);
        const stats = Object.fromEntries(teachers.map((teacher) => [teacher.id, 0]));
        weeks.forEach((weekItem) => {
          rows.forEach((row) => {
            const duration = row.day === "Mercredi" ? 2.5 : 0.75;
            asSessionsForCell(row, weekItem).forEach((session) => {
              (session.teacherIds || []).forEach((teacherId) => {
                if (stats[teacherId] === undefined) return;
                stats[teacherId] += duration;
              });
            });
          });
        });
        return stats;
      }

      function completeCycleCourseAverages() {
        const rows = yearRows();
        const workingRanks = new Set(workingSchoolWeeks().map((weekItem) => weekItem.rank));
        const byTeacher = Object.fromEntries(teachers.map((teacher) => [teacher.id, {
          total: 0,
          weeks: 0,
          classes: new Set(),
          cycles: []
        }]));
        const cycleEntries = allCycleSets()
          .flatMap((set) => set.cycles)
          .filter((cycle, index, list) => list.findIndex((item) => item.id === cycle.id) === index);
        cycleEntries.forEach((cycle) => {
          const cycleWeeks = weeksForCycle(cycle).filter((weekItem) => workingRanks.has(weekItem.rank));
          teachers.forEach((teacher) => {
            const cycleStats = { total: 0, weeks: cycleWeeks.length, classes: new Set() };
            constructionRules.filter((rule) => rule.cycleId === cycle.id).forEach((rule) => {
              const row = rows.find((item) => item.id === rule.rowId);
              if (!row || row.isAs) return;
              cycleWeeks.forEach((weekItem) => {
                if (rule.weekLetter && rule.weekLetter !== "all" && rule.weekLetter !== weekItem.letter) return;
                if (vacationForCell(row, weekItem) || holidayFor(row, weekItem)) return;
                const teacherIds = teacherIdsForBlock(rule.block);
                if (!teacherIds.includes(teacher.id)) return;
                cycleStats.total += row.slot.hours;
                if (rule.block.schoolClass) cycleStats.classes.add(rule.block.schoolClass);
              });
            });
            const average = cycleStats.weeks ? Math.round((cycleStats.total / cycleStats.weeks) * 10) / 10 : 0;
            byTeacher[teacher.id].total += cycleStats.total;
            byTeacher[teacher.id].weeks += cycleStats.weeks;
            cycleStats.classes.forEach((schoolClass) => byTeacher[teacher.id].classes.add(schoolClass));
            byTeacher[teacher.id].cycles.push({ name: cycle.name.replace("Cycle ", "C"), average });
          });
        });
        return byTeacher;
      }

      function uniqueClasses(details) {
        return [...new Set(details.map((detail) => detail.schoolClass))].sort((a, b) => a.localeCompare(b, "fr"));
      }

      function weeksInSameSchoolMonth(weekItem) {
        const reference = displayDateForSchoolWeek(weekItem);
        return schoolYearWeeks().filter((item) => {
          const displayed = displayDateForSchoolWeek(item);
          return displayed.getMonth() === reference.getMonth() && displayed.getFullYear() === reference.getFullYear();
        });
      }

      function workingSchoolWeeks() {
        return schoolYearWeeks().filter((weekItem) =>
          yearRows().some((row) => !vacationForCell(row, weekItem) && !holidayFor(row, weekItem))
        );
      }

      function monthLabelForWeek(weekItem) {
        return displayDateForSchoolWeek(weekItem).toLocaleDateString("fr-FR", { month: "short" });
      }

      function compactClassName(schoolClass) {
        return (schoolClass || "").replace("eme ", "e").replace("eme", "e").replace(/\s+/g, "");
      }

      function facilityShortLabel(facilityId, fallbackLabel = "") {
        const stopWords = new Set(["salle", "de", "du", "des", "la", "le", "les", "l", "d", "municipal", "municipale", "interne", "externe"]);
        const simplify = (value) => (value || "")
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "")
          .toLowerCase()
          .replace(/[^a-z0-9 ]/g, " ")
          .trim();
        const baseToken = (facility) => {
          const words = simplify(facility.label || facility.id).split(/\s+/).filter(Boolean);
          return words.find((word) => !stopWords.has(word)) || words[0] || simplify(facility.id) || "inst";
        };
        const tokenForDisplay = (facility) => {
          const words = (facility.label || facility.id || "").replace(/[-_]/g, " ").split(/\s+/).filter(Boolean);
          return words.find((word) => !stopWords.has(simplify(word))) || words[0] || facility.id || fallbackLabel || "Inst";
        };
        const current = facilities.find((facility) => facility.id === facilityId) || { id: facilityId, label: fallbackLabel };
        const currentBase = baseToken(current);
        const currentDisplay = tokenForDisplay(current);
        const otherBases = facilities
          .filter((facility) => facility.id !== current.id)
          .map(baseToken);
        let length = 1;
        while (length < currentBase.length && otherBases.some((base) => base.slice(0, length) === currentBase.slice(0, length))) length += 1;
        const shortLabel = currentDisplay.slice(0, Math.max(1, length));
        return shortLabel ? shortLabel[0].toUpperCase() + shortLabel.slice(1) : "";
      }

      function groupedHeaderCells(weeks, labelForWeek, classForWeek) {
        const groups = [];
        weeks.forEach((weekItem) => {
          const label = labelForWeek(weekItem);
          const className = classForWeek(weekItem);
          const last = groups[groups.length - 1];
          if (last && last.label === label && last.className === className) last.span += 1;
          else groups.push({ label, className, span: 1 });
        });
        return groups.map((group) => `<th class="${group.className}" colspan="${group.span}">${group.label}</th>`).join("");
      }

      function hourStatus(diff) {
        if (diff < -0.25) return { label: "À compléter", className: "statusLow" };
        if (diff > 0.25) return { label: "Au-dessus", className: "statusHigh" };
        return { label: "Équilibré", className: "statusOk" };
      }

      function applyBlockToCycle(rowId, cycleId, block, weekLetter = "all") {
        const classLevel = classParts(block.schoolClass).level;
        const cycle = cyclesForClassLevel(classLevel).find((item) => item.id === cycleId) || cycles.find((item) => item.id === cycleId);
        if (!cycle) return;
        constructionRules.push({
          id: `rule-${Date.now()}-${Math.random().toString(16).slice(2)}`,
          rowId,
          cycleId: cycle.id,
          classLevel,
          weekLetter,
          block
        });
        rebuildConstructionPlan();
      }

      function updateConstructionRule(ruleId, block, weekLetter = "all", weekItem = null) {
        const rule = constructionRules.find((item) => item.id === ruleId);
        if (!rule) return;
        const classLevel = classParts(block.schoolClass).level;
        const targetCycle = weekItem ? cycleForWeek(weekItem, classLevel) : null;
        rule.block = block;
        rule.classLevel = classLevel;
        if (targetCycle) rule.cycleId = targetCycle.id;
        rule.weekLetter = weekLetter;
        rebuildConstructionPlan();
      }

      function removeBlockFromCycle(rowId, blockIndex, block) {
        if (block.ruleId) {
          constructionRules = constructionRules.filter((rule) => rule.id !== block.ruleId);
          delete blockExclusions[block.ruleId];
        } else {
          constructionRules = constructionRules.filter((rule) => !(rule.rowId === rowId && rule.cycleId === block.cycleId));
        }
        saveBlockExclusions();
        rebuildConstructionPlan();
      }

      function removeBlockFromSingleSlot(key, block) {
        if (!block.ruleId) return removeBlockFromCycle(parseYearCellKey(key).rowId, 0, block);
        const existing = blockExclusions[block.ruleId] || [];
        if (!existing.includes(key)) blockExclusions[block.ruleId] = [...existing, key];
        saveBlockExclusions();
        rebuildConstructionPlan();
      }

      function removeConstructionBlock(key, index) {
        if (!constructionPlan[key]) return;
        const block = constructionPlan[key][index];
        if (!block) return;
        pendingBlockDelete = { key, index };
      }

      function confirmBlockDeletion(scope) {
        if (!pendingBlockDelete) return;
        const { key, index } = pendingBlockDelete;
        const block = constructionPlan[key]?.[index];
        pendingBlockDelete = null;
        if (!block) return;
        if (scope === "cycle") removeBlockFromCycle(parseYearCellKey(key).rowId, index, block);
        if (scope === "slot") removeBlockFromSingleSlot(key, block);
      }

      function detectConflicts() {
        const conflicts = [];
        const rows = yearRows();
        const weeks = schoolYearWeeks();
        Object.entries(constructionPlan).forEach(([key, items]) => {
          if (!Array.isArray(items) || items.length < 2) return;
          const { rowId, weekRank } = parseYearCellKey(key);
          const row = yearRows().find((item) => item.id === rowId);
          const weekItem = schoolYearWeeks().find((item) => item.rank === weekRank);
          const byFacility = items.reduce((acc, item, index) => {
            const facility = item.facilityId || item.facilityLabel || "Sans installation";
            if (!acc[facility]) acc[facility] = [];
            acc[facility].push({ ...item, index });
            return acc;
          }, {});
          Object.entries(byFacility).forEach(([facility, facilityItems]) => {
            if (facilityItems.length < 2) return;
            conflicts.push({
              type: "facility",
              key,
              facility,
              row,
              weekItem,
              items: facilityItems
            });
          });
          const byTeacher = {};
          items.forEach((item, index) => {
            teacherIdsForBlock(item).forEach((teacherId) => {
              if (!byTeacher[teacherId]) byTeacher[teacherId] = [];
              byTeacher[teacherId].push({ ...item, index });
            });
          });
          Object.entries(byTeacher).forEach(([teacher, teacherItems]) => {
            const classesInConflict = [...new Set(teacherItems.map((item) => item.schoolClass).filter(Boolean))];
            if (classesInConflict.length < 2) return;
            conflicts.push({
              type: "teacher",
              key,
              teacher,
              row,
              weekItem,
              items: teacherItems
            });
          });
          const byClass = items.reduce((acc, item, index) => {
            const schoolClass = item.schoolClass || "Sans classe";
            if (!acc[schoolClass]) acc[schoolClass] = [];
            acc[schoolClass].push({ ...item, index });
            return acc;
          }, {});
          Object.entries(byClass).forEach(([schoolClass, classItems]) => {
            if (classItems.length < 2) return;
            conflicts.push({
              type: "class",
              key,
              schoolClass,
              row,
              weekItem,
              items: classItems
            });
          });
        });
        rows.filter((row) => row.isAs).forEach((row) => {
          weeks.forEach((weekItem) => {
            const sessions = asSessionsForCell(row, weekItem);
            if (sessions.length < 2) return;
            const byTeacher = {};
            sessions.forEach((session) => {
              (session.teacherIds || []).forEach((teacherId) => {
                if (!byTeacher[teacherId]) byTeacher[teacherId] = [];
                byTeacher[teacherId].push(session);
              });
            });
            Object.entries(byTeacher).forEach(([teacherId, teacherSessions]) => {
              if (teacherSessions.length < 2) return;
              conflicts.push({
                type: "asTeacher",
                key: yearCellKey(row.id, weekItem.rank),
                teacher: teacherId,
                row,
                weekItem,
                items: teacherSessions
              });
            });
          });
        });
        return conflicts;
      }

      function eventExclusionsFor(event) {
        const exclusions = [];
        const rows = yearRows();
        const weeks = schoolYearWeeks();
        constructionRules.forEach((rule) => {
          const row = rows.find((item) => item.id === rule.rowId);
          if (!row || !eventTouchesBlock(event, rule.block) || !rowMatchesEventHalfDay(row, event)) return;
          const cycle = findCycleForRule(rule);
          if (!cycle) return;
          weeksForCycle(cycle).forEach((weekItem) => {
            if (!rowDateInEvent(row, weekItem, event)) return;
            exclusions.push({
              key: yearCellKey(row.id, weekItem.rank),
              ruleId: rule.id
            });
          });
        });
        return exclusions;
      }

      function confirmSportEventCleanup(exclusions, isEditing) {
        if (!exclusions.length) return true;
        const restoreNote = isEditing
          ? "Les créneaux de cycle qui ne sont plus concernés par la nouvelle version de l'événement seront rétablis automatiquement."
          : "La suppression concerne uniquement la durée et la demi-journée de l'événement.";
        const message = `${exclusions.length} créneau(x) déjà renseigné(s) concernent les profs ou classes sélectionnés pour cet événement. Confirmer leur suppression ?\n\n${restoreNote}`;
        return window.confirm(message);
      }

      function applySportEventChange(event, exclusions, isEditing) {
        if (isEditing) sportEvents = sportEvents.map((item) => item.id === event.id ? event : item);
        else sportEvents.push(event);

        delete eventExclusions[event.id];
        if (exclusions.length) eventExclusions[event.id] = exclusions;

        saveSportEvents();
        saveEventExclusions();
        rebuildConstructionPlan();
      }

          teacherIds: [...asTeacherIds]
        };

      function resetFacilityUnavailableForm() {
        editingUnavailableId = null;
        unavailableName = "Installation occupée";
        unavailableType = "facility";
        unavailableFacilityIds = [];
        unavailableClassIds = [];
        unavailableClassLevelFilter = "";
        unavailablePeriodMode = "dates";
        unavailableCycleIds = [];
        unavailableStart = "2026-09-01";
        unavailableEnd = "2027-06-30";
        unavailableWeekdays = [];
        unavailableSlotIds = [];
        unavailableCells = [];
      }

      function unavailableSelectedCycles() {
        return unavailableCycleIds
          .map((id) => cycles.find((cycle) => cycle.id === id))
          .filter(Boolean);
      }

      function unavailableDateRange() {
        if (unavailablePeriodMode !== "cycles") return { start: unavailableStart, end: unavailableEnd };
        const selectedCycles = unavailableSelectedCycles();
        if (!selectedCycles.length) return { start: unavailableStart, end: unavailableEnd };
        const starts = selectedCycles.map((cycle) => cycle.start).sort();
        const ends = selectedCycles.map((cycle) => cycle.end).sort();
        return { start: starts[0], end: ends[ends.length - 1] };
      }

      function saveFacilityUnavailableFromForm() {
        const facilityLabel = unavailableFacilityIds.map((id) => facilities.find((facility) => facility.id === id)?.label || id).join(", ");
        const selectedCells = unavailableCells.length
          ? unavailableCells
          : unavailableWeekdays.flatMap((day) => unavailableSlotIds.map((slotId) => ({ day, slotId })));
        const slotLabel = selectedCells.map((cell) => `${cell.day} ${slots.find((slot) => slot.id === cell.slotId)?.label || cell.slotId}`).join(", ");
        const period = unavailableDateRange();
        const generatedName = unavailableType === "class"
          ? `Classe indisponible : ${unavailableClassIds.join(", ")}`
          : `${facilityLabel} · ${slotLabel}`;
        const item = {
          id: editingUnavailableId || `unavailable-${Date.now()}-${Math.random().toString(16).slice(2)}`,
          name: generatedName,
          type: unavailableType,
          facilityIds: unavailableType === "facility" ? [...unavailableFacilityIds] : [],
          classIds: unavailableType === "class" ? [...unavailableClassIds] : [],
          periodMode: unavailablePeriodMode,
          cycleIds: unavailablePeriodMode === "cycles" ? [...unavailableCycleIds] : [],
          start: period.start,
          end: period.end,
          weekdays: [...new Set(selectedCells.map((cell) => cell.day))],
          slotIds: [...new Set(selectedCells.map((cell) => cell.slotId))],
          cells: [...selectedCells]
        };
        if (editingUnavailableId) facilityUnavailability = facilityUnavailability.map((entry) => entry.id === editingUnavailableId ? item : entry);
        else facilityUnavailability.push(item);
        purgeConstructionForUnavailableItems([item]);
        saveBlockExclusions();
        saveFacilityUnavailability();
        rebuildConstructionPlan();
        resetFacilityUnavailableForm();
      }

      function addSportEventWithCleanup(event) {

        if (!confirmSportEventCleanup(exclusions, false)) return;
        applySportEventChange(event, exclusions, false);
      }

      function resetEventForm() {

        eventHalfDay = "all";

        eventClasses = [];
        eventClassLevelFilter = "";

      function saveSportEventFromForm() {

          id: editingEventId || `event-${Date.now()}-${Math.random().toString(16).slice(2)}`,

          name: eventName || "Événement sportif",

        };
        const exclusions = eventExclusionsFor(event);
        const isEditing = Boolean(editingEventId);
        if (!confirmSportEventCleanup(exclusions, isEditing)) return;

      function clearPlanningParts(options) {
        if (options.construction) {
          constructionRules = [];
          constructionPlan = {};
          blockExclusions = {};
          saveConstructionRules();
          saveBlockExclusions();
          saveConstructionPlan();

        if (options.events) {

          resetEventForm();
          saveSportEvents();
          saveEventExclusions();
          rebuildConstructionPlan();

        if (options.as) {

      function conflictMap() {
        return new Set(detectConflicts().map((conflict) => conflict.key));
      }

      function builderCellKey(day, slotId) {
        return `${day}-${slotId}`;
      }

      function yearCellKey(rowId, weekRank) {
        return `${rowId}::${weekRank}`;
      }

      function parseYearCellKey(key) {
        const [rowId, weekRank] = key.split("::");
        return { rowId, weekRank: Number(weekRank) };
      }

      function teacherIdsForBlock(block) {
        const ids = Array.isArray(block.teacherIds) && block.teacherIds.length ? block.teacherIds : [block.teacherId].filter(Boolean);
        return ids.filter((id, index) => ids.indexOf(id) === index);
      }

      function teacherNamesForBlock(block) {
        return teacherIdsForBlock(block).map((id) => teachers.find((teacher) => teacher.id === id)?.name || id);
      }

      function teacherLabelForBlock(block) {
        return block.teacherNames || teacherNamesForBlock(block).join(" + ") || block.teacherName || "Prof";
      }

      function teacherBorderForColor(color) {
        return teacherPalette.find((item) => item.color === color)?.border || shadeColor(color, -80);
      }

      function syncConstructionRulesForTeacher(teacherId) {
        constructionRules = constructionRules.map((rule) => {
          const ids = teacherIdsForBlock(rule.block);
          if (!ids.includes(teacherId)) return rule;
          const primaryTeacher = teachers.find((teacher) => teacher.id === ids[0]);
          return {
            ...rule,
            block: {
              ...rule.block,
              color: primaryTeacher?.color || rule.block.color,
              border: primaryTeacher?.border || rule.block.border,
              teacherName: primaryTeacher?.name || rule.block.teacherName,
              teacherNames: teacherNamesForBlock({ ...rule.block, teacherIds: ids }).join(" + ")
            }
          };
        });
      }

      function blockConflictMessageForItems(items, candidate) {
        const facilityConflict = items.find((item) => item.facilityId && candidate.facilityId && item.facilityId === candidate.facilityId);
        if (facilityConflict) return `Installation deja occupee : ${candidate.facilityLabel}.`;
        const teacherConflict = items.find((item) =>
          teacherIdsForBlock(item).some((teacherId) => teacherIdsForBlock(candidate).includes(teacherId))
          && item.schoolClass !== candidate.schoolClass
        );
        if (teacherConflict) return `Professeur deja pris avec ${teacherConflict.schoolClass || "une autre classe"}.`;
        const classConflict = items.find((item) => item.schoolClass && candidate.schoolClass && item.schoolClass === candidate.schoolClass);
        if (classConflict) return `Classe deja prise : ${candidate.schoolClass}.`;
        return "";
      }

      function blockCycleConflictMessage(rowId, cycleId, candidate, ignoredRuleId = "", weekLetter = "all") {
        const cycle = cyclesForClassLevel(classParts(candidate.schoolClass).level).find((item) => item.id === cycleId) || cycles.find((item) => item.id === cycleId);
        if (!cycle) return "";
        for (const weekItem of weeksForCycle(cycle)) {
          if (weekLetter !== "all" && weekItem.letter !== weekLetter) continue;
          const key = yearCellKey(rowId, weekItem.rank);
          const items = (constructionPlan[key] || []).filter((item) => !ignoredRuleId || item.ruleId !== ignoredRuleId);
          const message = blockConflictMessageForItems(items, candidate);
          if (message) return `${message} Conflit sur la semaine ${weekItem.rank}${weekItem.letter}.`;
        }
        return "";
      }

      function blockCycleUnavailableMessage(rowId, cycleId, candidate, weekLetter = "all") {
        const cycle = cyclesForClassLevel(classParts(candidate.schoolClass).level).find((item) => item.id === cycleId) || cycles.find((item) => item.id === cycleId);
        const row = yearRows().find((item) => item.id === rowId);
        if (!cycle || !row) return "";
        for (const weekItem of weeksForCycle(cycle)) {
          if (weekLetter !== "all" && weekItem.letter !== weekLetter) continue;
          const message = blockUnavailableMessage(row, weekItem, candidate);
          if (message) return `${message} Bloc impossible sur la semaine ${weekItem.rank}${weekItem.letter}.`;
        }
        return "";
      }

      function allTeachersSelected() {
        return selectedTeacherIds.length === teachers.length;
      }

      function teacherSelectionMatches(ids) {
        return selectedTeacherIds.length > 0 && (allTeachersSelected() || ids.some((id) => selectedTeacherIds.includes(id)));
      }

      function blockMatchesTeacherSelection(block) {
        return teacherSelectionMatches(teacherIdsForBlock(block));
      }

      function eventMatchesTeacherSelection(event) {
        return teacherSelectionMatches(event.teacherIds || []);
      }

      function asMatchesTeacherSelection(session) {
        return teacherSelectionMatches(session.teacherIds || []);
      }

      function buildModalAvailability() {
        const occupied = { teacherIds: new Set(), facilityIds: new Set(), classes: new Set() };
        (constructionPlan[activeBuildCell] || []).forEach((item) => {
          if (editingBuildBlock?.ruleId && item.ruleId === editingBuildBlock.ruleId) return;
          teacherIdsForBlock(item).forEach((teacherId) => occupied.teacherIds.add(teacherId));
          if (item.facilityId) occupied.facilityIds.add(item.facilityId);
          if (item.schoolClass) occupied.classes.add(item.schoolClass);
        });
        const { rowId, weekRank } = parseYearCellKey(activeBuildCell);
        const row = yearRows().find((item) => item.id === rowId);
        const weekItem = schoolYearWeeks().find((item) => item.rank === weekRank);
        occupied.unavailableFacilityIds = row && weekItem ? unavailableFacilitiesForCell(row, weekItem) : new Set();
        occupied.unavailableClasses = row && weekItem ? unavailableClassesForCell(row, weekItem) : new Set();
        return occupied;
      }

      function currentBlock() {
        const selectedTeachers = blockTeacherIds
          .map((id) => teachers.find((item) => item.id === id))
          .filter(Boolean);
        const primaryTeacher = selectedTeachers[0];
        const facility = facilities.find((item) => item.id === blockFacilityId);
        const activity = activities.find((item) => item.id === blockActivityId);
        return {
          teacherIds: selectedTeachers.map((teacher) => teacher.id),
          teacherNames: selectedTeachers.map((teacher) => teacher.name).join(" + "),
          teacherId: primaryTeacher?.id || "",
          teacherName: primaryTeacher?.name || "",
          color: primaryTeacher?.color || "#f8fafc",
          border: primaryTeacher?.border || "#cbd5e1",
          schoolClass: blockClass,
          facilityId: facility?.id || "",
          facilityLabel: facility?.label || "",
          activityId: activity?.id || "",
          activityLabel: activity?.label || ""
        };
      }

      function classParts(schoolClass) {
        if (!schoolClass) return { level: blockClassLevel || "", number: "" };
        const [level, number] = schoolClass.split(" ");
        return {
          level: classLevels.includes(level) ? level : "",
          number: classNumbers.includes(number) ? number : ""
        };
      }

      function updateBlockClass(part, value) {
        const current = classParts(blockClass);
        if (part === "level") {
          blockClassLevel = value;
          blockClass = "";
          return;
        }
        const nextLevel = current.level || blockClassLevel;
        if (!nextLevel) return;
        blockClass = `${nextLevel} ${value}`;
      }

      function toggleUnavailableClass(schoolClass) {
        unavailableClassIds = unavailableClassIds.includes(schoolClass)
          ? unavailableClassIds.filter((item) => item !== schoolClass)
          : [...unavailableClassIds, schoolClass];
      }

      function selectedUnavailableClassNumbers() {
        return classNumbers.filter((number) => unavailableClassIds.includes(`${unavailableClassLevelFilter} ${number}`));
      }

      function unavailableCellSelected(day, slotId) {
        return unavailableCells.some((cell) => cell.day === day && cell.slotId === slotId);
      }

      function toggleUnavailableGridCell(day, slotId) {
        if (unavailableCellSelected(day, slotId)) {
          unavailableCells = unavailableCells.filter((cell) => !(cell.day === day && cell.slotId === slotId));
        } else {
          unavailableCells = [...unavailableCells, { day, slotId }];
        }
        unavailableWeekdays = [...new Set(unavailableCells.map((cell) => cell.day))];
        unavailableSlotIds = [...new Set(unavailableCells.map((cell) => cell.slotId))];
      }

      function renderFacilitiesCalendar(cycle) {

      function cycleWeeksByLetter(cycle, letter) {
        return weeksForCycle(cycle).filter((weekItem) => weekItem.letter === letter);
      }

      function blocksForCycleLetter(row, cycle, letter, facilityId = "") {
        const seen = new Set();
        return cycleWeeksByLetter(cycle, letter).flatMap((weekItem) => {
          const key = yearCellKey(row.id, weekItem.rank);
          return (constructionPlan[key] || []).filter((block) => !facilityId || block.facilityId === facilityId);
        }).filter((block) => {
          const signature = block.ruleId || `${teacherIdsForBlock(block).join("+")}|${block.schoolClass}|${block.facilityId}`;
          if (seen.has(signature)) return false;
          seen.add(signature);
          return true;
        });
      }

      function unavailableForCycleLetter(row, cycle, letter, facilityId = "") {
        const seen = new Set();
        return cycleWeeksByLetter(cycle, letter).flatMap((weekItem) => unavailableForCell(row, weekItem)).filter((item) => {
          const itemFacilities = item.facilityIds || [];
          if (facilityId && itemFacilities.length && !unavailableCoversFacility(item, facilityId)) return false;
          const signature = item.id || `${item.type}|${(item.facilityIds || []).join("+")}|${(item.classIds || []).join("+")}`;
          if (seen.has(signature)) return false;
          seen.add(signature);
          return true;
        });
      }

      function renderCycleLetterCell(row, cycle, letter, facilityId = "") {
        const items = blocksForCycleLetter(row, cycle, letter, facilityId);
        const unavailableItems = unavailableForCycleLetter(row, cycle, letter, facilityId);
        return `<td><div class="buildCellStack">
          ${items.map((item) => `<div class="buildBlock" style="background:${item.color};border-color:${item.border}">

            </div>`;
          }).join("")}

      }

      function renderHoursBalance() {

        return `<section class="hoursBalancePage">
          <div class="hoursBalanceHeader">
            <div>
              <h2>Bilan des heures affectées à la semaine</h2>
              <p class="muted">Calcul selon le volume théorique du cycle complet, rapporté en moyenne hebdomadaire annuelle. Les événements sportifs sont ignorés : ils ne sont ni ajoutés, ni soustraits.</p>

            const asTotal = yearWeeks.length ? Math.round(((yearAsStats[teacher.id] || 0) / yearWeeks.length) * 10) / 10 : 0;
            const diff = courseAverage - courseTarget;
            const status = hourStatus(diff);
            const progress = Math.min(100, Math.round((courseAverage / courseTarget) * 100));

        }));

            ${renderActivitiesSettings()}

            ${renderConstructionTabs()}
            ${renderTeamSettings()}

          return `<section>
            ${renderConstructionTabs()}

      function renderCycleCoverage(scope = "default") {
        const weeks = schoolYearWeeks();
        const shownCycles = cyclesForScope(scope);
        const palette = ["#dbeafe", "#dcfce7", "#fef3c7", "#fce7f3", "#ede9fe", "#cffafe", "#fee2e2", "#e0e7ff", "#ecfccb", "#fae8ff", "#f1f5f9", "#ffedd5"];
        const cycleStyle = (cycle) => {
          if (!cycle) return "";
          const index = Math.max(0, shownCycles.findIndex((item) => item.id === cycle.id));
          return `background:${palette[index % palette.length]};border-color:#111827;color:#0f172a;`;
        };
        const groupedCoverageCells = () => {
          const groups = [];
          weeks.forEach((weekItem) => {
            const vacation = vacationForWeek(weekItem);
            const cycle = shownCycles.find((item) => weeksForCycle(item).some((cycleWeek) => cycleWeek.rank === weekItem.rank));
            const label = vacation ? "Vacances" : cycle ? cycle.name.replace("Cycle ", "C") : "";
            const className = vacation ? "vacationCell" : cycle ? "coveredCell" : "gapCell";
            const style = cycle && !vacation ? cycleStyle(cycle) : "";
            const title = vacation?.name || (cycle ? `${cycle.start} - ${cycle.end}` : "Aucun cycle");
            const last = groups[groups.length - 1];
            if (last && last.label === label && last.className === className && last.style === style && last.title === title) {
              last.span += 1;
              last.end = weekItem;
            } else {
              groups.push({ label, className, style, title, start: weekItem, end: weekItem, span: 1 });
            }
          });
          return groups.map((group) => `<td colspan="${group.span}" class="${group.className}" style="${group.style}" title="${group.title}">
            <div class="cycleCoverageBlock">
              <strong>du ${shortDate(weekDisplayStart(group.start))} au ${shortDate(weekDisplayEnd(group.end))}</strong>
            </div>
          </td>`).join("");
        };
        return `<div class="cycleCoverage">
          <h3>Vue annuelle des cycles</h3>
          <div class="cycleLegend"><span class="cycleLegendSwatch"></span><span>Rouge fonce : trou dans les cycles</span></div>
          <div class="yearWrap"><table class="yearTable consultationYearTable cycleCoverageTable">
            <thead>
              <tr><th class="timeHead">Repère</th>${groupedHeaderCells(weeks, monthLabelForWeek, () => "monthCell")}</tr>
              <tr><th class="timeHead">Cycle</th>${groupedHeaderCells(weeks, (weekItem) => {
                const vacation = vacationForWeek(weekItem);
                const cycle = shownCycles.find((item) => weeksForCycle(item).some((cycleWeek) => cycleWeek.rank === weekItem.rank));
                return vacation ? "Vacances" : cycle ? cycle.name.replace("Cycle ", "C") : "";
              }, (weekItem) => vacationForWeek(weekItem) ? "vacationHeader" : shownCycles.find((item) => weeksForCycle(item).some((cycleWeek) => cycleWeek.rank === weekItem.rank)) ? "cycleHeader" : "gapCell")}</tr>
              <tr><th class="timeHead">Semaine</th>${weeks.map((weekItem) => `<th>${weekItem.rank}${weekItem.letter}</th>`).join("")}</tr>
            </thead>
            <tbody>
              <tr>
                <th class="timeHead">Dates</th>
                ${groupedCoverageCells()}
              </tr>
            </tbody>
          </table></div>
        </div>`;
      }

      function renderAsView() {

      function facilityIdFromName(name) {
        const base = name
          .toLowerCase()
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "")
          .replace(/[^a-z0-9]+/g, "-")
          .replace(/^-|-$/g, "") || "installation";
        let id = base;
        let index = 2;
        while (facilities.some((facility) => facility.id === id)) {
          id = `${base}-${index}`;
          index += 1;
        }
        return id;
      }

      function activityIdFromName(name) {
        const base = name
          .toLowerCase()
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "")
          .replace(/[^a-z0-9]+/g, "-")
          .replace(/^-|-$/g, "") || "activite";
        let id = base;
        let index = 2;
        while (activities.some((activity) => activity.id === id)) {
          id = `${base}-${index}`;
          index += 1;
        }
        return id;
      }

      function renderConstructionTable(weeks, current, monthLabels, rows, editable, filterSelection = false) {
        const conflicts = conflictMap();
        const rowsByDay = days.map((day) => ({
          day,
          rows: rows.filter((row) => row.day === day)
        }));
        return `<div class="yearWrap"><table class="yearTable constructionTable">
          <thead>
            <tr><th class="rowHead">Jour</th><th class="timeHead">Horaire</th>${monthLabels.map((month) => `<th class="monthCell">${month}</th>`).join("")}</tr>
            <tr><th class="rowHead"></th><th class="timeHead">Cycle</th>${weeks.map((weekItem) => {
              const vacation = vacationForWeek(weekItem);
              const cycle = cycleForWeek(weekItem);
              return `<th class="${vacation ? "vacationHeader" : "cycleHeader"}">${vacation ? "Vacances" : cycle ? cycle.name.replace("Cycle ", "C") : "-"}</th>`;
            }).join("")}</tr>
            <tr><th class="rowHead"></th><th class="timeHead">Semaine</th>${weeks.map((weekItem) => `<th><span class="constructionWeekHead"><strong>${weekItem.rank}${weekItem.letter}</strong><small>${weekDateLabel(weekItem)}</small></span></th>`).join("")}</tr>
          </thead>
          <tbody>
            ${rowsByDay.map((group) => group.rows.map((row, rowIndex) => {
              const alignmentTeacherIds = teachers
                .filter((teacher) => weeks.some((weekItem) => (constructionPlan[yearCellKey(row.id, weekItem.rank)] || []).some((item) => teacherIdsForBlock(item)[0] === teacher.id)))
                .map((teacher) => teacher.id);
              return `<tr>
              ${rowIndex === 0 ? `<th class="rowHead" rowspan="${group.rows.length}">${group.day}</th>` : ""}
              <th class="timeHead">${row.slot.label}</th>${weeks.map((weekItem) => {
                const key = yearCellKey(row.id, weekItem.rank);
                const dayOff = dayOffFor(group.day, weekItem);
                if (dayOff && rowIndex > 0) return "";
                if (dayOff) return `<td rowspan="${group.rows.length}" title="${dayOff.title}" class="mergedOff ${dayOff.className}">${dayOff.label}</td>`;
                const continuedEvent = eventForContinuation(row, weekItem);
                if (!editable && continuedEvent && (!filterSelection || eventMatchesTeacherSelection(continuedEvent)) && canMergeEventCell(continuedEvent, group.rows, weekItem)) return "";
                const mergeableEvents = editable ? [] : eventsForCell(row, weekItem).filter((event) => (!filterSelection || eventMatchesTeacherSelection(event)) && canMergeEventCell(event, group.rows, weekItem));
                if (mergeableEvents.length) {
                  const event = mergeableEvents[0];
                  return `<td rowspan="${eventRowSpan(event, group.rows)}">
                    <div class="buildBlock eventBlock">
                      ${editable ? `<button data-delete-event="${event.id}" title="Supprimer">x</button>` : ""}
                      <strong>${event.name}</strong>
                      <span>${eventPeriodLabel(event)} · ${event.classes.length} classe(s) · ${event.teacherIds.length} prof(s)</span>
                      ${eventTeacherDots(event)}
                    </div>
                  </td>`;
                }
                const items = (constructionPlan[key] || []).filter((item) => !filterSelection || blockMatchesTeacherSelection(item));
                const events = eventsForPeriod(row, weekItem).filter((event) => !filterSelection || eventMatchesTeacherSelection(event));
                const asItems = asSessionsForCell(row, weekItem).filter((session) => !filterSelection || asMatchesTeacherSelection(session));
                const holiday = holidayFor(row, weekItem);
                const vacation = vacationForCell(row, weekItem);
                const blocked = vacation || holiday;
              return `<td title="${holiday || vacation?.name || ""}" class="${editable && !blocked && !row.isAs ? "buildDropCell" : ""} ${conflicts.has(key) ? "conflictCell" : ""} ${holiday ? "holidayCell" : ""} ${vacation ? "vacationCell" : ""}" ${editable && !blocked && !row.isAs ? `data-open-cell="${key}" data-row="${row.id}"` : ""}>
                ${vacation ? `<span class="muted">Vacances</span>` : ""}
                ${!vacation && holiday ? `<span class="muted">Jour férié</span>` : ""}
                ${renderConstructionCellStack(items, events, asItems, editable, key, row, alignmentTeacherIds)}
                ${conflicts.has(key) ? `<span class="conflictBadge">Conflit</span>` : ""}
              </td>`;
              }).join("")}
            </tr>`;
            }).join("")).join("")}
          </tbody>
        </table></div>`;
      }

      function renderAlertsView() {
        const conflicts = detectConflicts();
        const conflictTypes = [
          "Installation : deux blocs utilisent la même installation sur le même créneau.",
          "Professeur : un même prof est affecté à deux classes différentes en même temps.",
          "Classe : une même classe est affectée à deux cours différents en même temps.",
          "AS : un même prof ne peut pas être placé sur deux AS en même temps.",
          "Quinzaine : un cours A doit être posé depuis une semaine A, et un cours B depuis une semaine B."
        ];
        return `<section class="alertsPage">
          <h2>Alertes de conflits</h2>
          <article class="alertHelp">
            <strong>Types de conflits surveillés</strong>
            ${conflictTypes.map((type) => `<span>${type}</span>`).join("")}
          </article>
          ${conflicts.length === 0 ? `<div class="alertEmpty">Aucun conflit détecté dans le planning construit.</div>` : conflicts.map((conflict) => `
            <article class="alertCard">
              <strong>${conflict.row.day} · ${conflict.row.slot.label} · Semaine ${conflict.weekItem.rank}${conflict.weekItem.letter}</strong>
              ${conflict.type === "teacher" ? `
                <span>Professeur en conflit : ${teachers.find((teacher) => teacher.id === conflict.teacher)?.name || conflict.teacher}</span>
                <span>${conflict.items.map((item) => `${item.schoolClass || "classe"} · ${item.facilityLabel || "installation"}`).join(" / ")}</span>
                <span>Règle : un professeur ne peut pas avoir cours avec deux classes en même temps.</span>
              ` : conflict.type === "asTeacher" ? `
                <span>Professeur en conflit AS : ${teachers.find((teacher) => teacher.id === conflict.teacher)?.name || conflict.teacher}</span>

                <span>Règle : une installation ne peut pas accueillir deux blocs sur le même créneau.</span>

      async function submitFeedback() {
        if (!requestMessage.trim() || requestSubmitting) return;
        requestSubmitting = true;
        requestStatus = "Envoi en cours...";
        render();
        try {
          if (!cloudReady()) throw new Error("cloud non configure");
          const payload = {
            planning_id: cloudConfig.planningId,
            kind: requestKind,
            author: requestAuthor.trim() || null,
            message: requestMessage.trim(),
            context: {
              page: week,
              schoolYear: schoolYear.label,
              userAgent: navigator.userAgent,
              sentAt: new Date().toISOString()
            },
            status: "new"
          };
          const response = await fetch(feedbackEndpoint(), {
            method: "POST",
            headers: {
              apikey: cloudConfig.anonKey,
              Authorization: `Bearer ${cloudConfig.anonKey}`,
              "Content-Type": "application/json",
              Prefer: "return=minimal"
            },
            body: JSON.stringify(payload)
          });
          if (!response.ok) throw new Error(await response.text());
          requestMessage = "";
          requestStatus = "Demande envoyee. Merci pour le retour.";
        } catch (error) {
          requestStatus = `Envoi impossible : ${error.message || "erreur inconnue"}`;
        } finally {
          requestSubmitting = false;
          render();
        }
      }
